<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thermal Current</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Thermal Current</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Thermal Current — Multi-pass Rayleigh-Bénard convection
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // ── Extension: OES_texture_float required for simulation FBOs ──
  var floatExt = gl.getExtension('OES_texture_float');
  if (!floatExt) {
    // Fallback: try half float
    var halfFloatExt = gl.getExtension('OES_texture_half_float');
    if (!halfFloatExt) {
      console.error('Float textures not supported');
      return;
    }
  }
  // Also need linear filtering for float textures (optional, graceful fallback)
  gl.getExtension('OES_texture_float_linear');
  gl.getExtension('OES_texture_half_float_linear');

  var heatRateVal = 0.7;
  var viscosityVal = 1.0;
  var running = true;

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  // Simulation runs at half resolution for performance
  var simScale = 0.5;

  var simW, simH, dispW, dispH;

  // ── Shared vertex shader (full-screen triangle) ──
  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  // ── Pass 1: Simulation shader ──
  // Reads previous state, computes next state
  // R = temperature, G = velocity X, B = velocity Y, A = density
  var simFragSrc = [
    'precision highp float;',
    'uniform sampler2D u_state;',
    'uniform vec2 u_res;',
    'uniform float u_time;',
    'uniform float u_dt;',
    'uniform float u_viscosity;',
    'uniform float u_heatRate;',
    'uniform float u_frame;',
    '',
    '// ── Hash for randomness ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 px = 1.0 / u_res;',
    '',
    '  // Sample current state and neighbors',
    '  vec4 c  = texture2D(u_state, uv);',
    '  vec4 cL = texture2D(u_state, uv + vec2(-px.x, 0.0));',
    '  vec4 cR = texture2D(u_state, uv + vec2( px.x, 0.0));',
    '  vec4 cD = texture2D(u_state, uv + vec2(0.0, -px.y));',
    '  vec4 cU = texture2D(u_state, uv + vec2(0.0,  px.y));',
    '',
    '  float temp = c.r;',
    '  float velX = c.g;',
    '  float velY = c.b;',
    '  float dens = c.a;',
    '',
    '  // ── Diffusion: temperature spreads to neighbors ──',
    '  float diffRate = 0.18 / u_viscosity;',
    '  float tempAvg = (cL.r + cR.r + cD.r + cU.r) * 0.25;',
    '  temp = mix(temp, tempAvg, diffRate);',
    '',
    '  // ── Velocity diffusion ──',
    '  float velDiff = 0.12 / u_viscosity;',
    '  float velXAvg = (cL.g + cR.g + cD.g + cU.g) * 0.25;',
    '  float velYAvg = (cL.b + cR.b + cD.b + cU.b) * 0.25;',
    '  velX = mix(velX, velXAvg, velDiff);',
    '  velY = mix(velY, velYAvg, velDiff);',
    '',
    '  // ── Buoyancy: warm fluid rises, cool fluid sinks ──',
    '  float buoyancy = (temp - 0.3) * 0.065;',
    '  velY += buoyancy;',
    '',
    '  // ── Pressure-like correction from neighbors ──',
    '  // Divergence: pushes velocity to be more incompressible',
    '  float div = (cR.g - cL.g + cU.b - cD.b) * 0.5;',
    '  velX -= (cR.r - cL.r) * 0.02;',
    '  velY -= (cU.r - cD.r) * 0.02;',
    '',
    '  // ── Advection: velocity transports temperature ──',
    '  // Semi-Lagrangian: trace back and sample',
    '  vec2 advectUV = uv - vec2(velX, velY) * px * 3.5;',
    '  advectUV = clamp(advectUV, px, 1.0 - px);',
    '  vec4 advected = texture2D(u_state, advectUV);',
    '  temp = mix(temp, advected.r, 0.85);',
    '',
    '  // ── Velocity advection ──',
    '  velX = mix(velX, advected.g, 0.6);',
    '  velY = mix(velY, advected.b, 0.6);',
    '',
    '  // ── Dissipation: slight cooling over time ──',
    '  temp *= 0.9985;',
    '',
    '  // ── Velocity damping ──',
    '  velX *= 0.992;',
    '  velY *= 0.992;',
    '',
    '  // ── Boundary conditions ──',
    '  // Bottom: heat sources at random positions',
    '  float bottomBand = smoothstep(0.03, 0.0, uv.y);',
    '  if (bottomBand > 0.0) {',
    '    // Multiple persistent heat sources along bottom',
    '    float heatSourceCount = 3.0 + floor(u_heatRate * 4.0);',
    '    for (float i = 0.0; i < 12.0; i++) {',
    '      if (i >= heatSourceCount) break;',
    '      // Heat source positions drift slowly',
    '      float sourcePhase = hash1(i * 17.3 + 100.0) * 6.28;',
    '      float sourceBaseX = hash1(i * 23.7 + 200.0);',
    '      float sourceX = sourceBaseX + sin(u_time * 0.05 * (0.3 + hash1(i * 7.1)) + sourcePhase) * 0.15;',
    '      sourceX = fract(sourceX);',
    '      float sourceWidth = 0.03 + hash1(i * 31.1 + 300.0) * 0.04;',
    '      float dist = abs(uv.x - sourceX);',
    '      dist = min(dist, 1.0 - dist);',  // wrap around
    '      float influence = exp(-dist * dist / (sourceWidth * sourceWidth));',
    '      float heatPulse = 0.7 + 0.3 * sin(u_time * (0.3 + hash1(i * 5.5) * 0.4) + sourcePhase);',
    '      temp += influence * bottomBand * 0.35 * heatPulse * u_heatRate;',
    '    }',
    '    velY += bottomBand * 0.01;',
    '  }',
    '',
    '  // Top: cooling',
    '  float topBand = smoothstep(0.97, 1.0, uv.y);',
    '  temp = mix(temp, 0.0, topBand * 0.3);',
    '  velY = mix(velY, min(velY, 0.0), topBand);',
    '',
    '  // Side walls: reflect',
    '  if (uv.x < px.x * 2.0) velX = max(velX, 0.0);',
    '  if (uv.x > 1.0 - px.x * 2.0) velX = min(velX, 0.0);',
    '',
    '  // ── Density tracks temperature for rendering ──',
    '  dens = mix(dens, temp, 0.15);',
    '',
    '  // ── Clamp values ──',
    '  temp = clamp(temp, 0.0, 1.5);',
    '  velX = clamp(velX, -0.5, 0.5);',
    '  velY = clamp(velY, -0.5, 0.5);',
    '  dens = clamp(dens, 0.0, 1.5);',
    '',
    '  // ── Add slight perturbation to break symmetry early on ──',
    '  if (u_frame < 10.0) {',
    '    float noise = hash(gl_FragCoord.xy + u_frame * 100.0);',
    '    temp += noise * 0.02;',
    '    velX += (hash(gl_FragCoord.xy * 1.3 + u_frame * 77.0) - 0.5) * 0.005;',
    '    velY += (hash(gl_FragCoord.xy * 1.7 + u_frame * 53.0) - 0.5) * 0.005;',
    '  }',
    '',
    '  gl_FragColor = vec4(temp, velX, velY, dens);',
    '}'
  ].join('\n');

  // ── Pass 2: Rendering shader ──
  // Reads simulation state, outputs visual
  var renderFragSrc = [
    'precision highp float;',
    'uniform sampler2D u_state;',
    'uniform vec2 u_res;',
    'uniform vec2 u_simRes;',
    'uniform float u_time;',
    'uniform float u_heatRate;',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 simPx = 1.0 / u_simRes;',
    '',
    '  // Sample simulation state',
    '  vec4 state = texture2D(u_state, uv);',
    '  float temp = state.r;',
    '  float velX = state.g;',
    '  float velY = state.b;',
    '  float dens = state.a;',
    '',
    '  // ── Temperature gradient for detail ──',
    '  float tL = texture2D(u_state, uv + vec2(-simPx.x, 0.0)).r;',
    '  float tR = texture2D(u_state, uv + vec2( simPx.x, 0.0)).r;',
    '  float tD = texture2D(u_state, uv + vec2(0.0, -simPx.y)).r;',
    '  float tU = texture2D(u_state, uv + vec2(0.0,  simPx.y)).r;',
    '  float gradX = tR - tL;',
    '  float gradY = tU - tD;',
    '  float gradMag = length(vec2(gradX, gradY));',
    '',
    '  // ── Color mapping: temperature to palette ──',
    '  // Cold: deep charcoal-blue',
    '  // Medium: warm amber',
    '  // Hot: bright gold-white',
    '  vec3 coldColor = vec3(0.06, 0.07, 0.12);',
    '  vec3 coolColor = vec3(0.10, 0.10, 0.18);',
    '  vec3 warmColor = vec3(0.78, 0.50, 0.22);',
    '  vec3 hotColor  = vec3(1.0, 0.85, 0.55);',
    '  vec3 whiteHot  = vec3(1.0, 0.95, 0.85);',
    '',
    '  // Multi-stop gradient',
    '  float t1 = smoothstep(0.0, 0.08, temp);',
    '  float t2 = smoothstep(0.08, 0.25, temp);',
    '  float t3 = smoothstep(0.25, 0.55, temp);',
    '  float t4 = smoothstep(0.55, 0.9, temp);',
    '',
    '  vec3 col = coldColor;',
    '  col = mix(col, coolColor, t1);',
    '  col = mix(col, warmColor, t2);',
    '  col = mix(col, hotColor, t3);',
    '  col = mix(col, whiteHot, t4);',
    '',
    '  // ── Gradient detail: highlight edges of convection cells ──',
    '  // Temperature gradients mark cell boundaries',
    '  float edgeGlow = smoothstep(0.0, 0.06, gradMag);',
    '  vec3 edgeColor = mix(vec3(0.85, 0.55, 0.18), vec3(1.0, 0.92, 0.65), temp);',
    '  col += edgeColor * edgeGlow * 0.25;',
    '',
    '  // ── Velocity-based flow lines ──',
    '  // Show subtle streaks in the direction of flow',
    '  float velMag = length(vec2(velX, velY));',
    '  float flowAngle = atan(velY, velX);',
    '',
    '  // Create oriented noise-like streaks along flow direction',
    '  vec2 flowDir = normalize(vec2(velX, velY) + 0.001);',
    '  float streakCoord = dot(uv * u_simRes, flowDir);',
    '  float streak = sin(streakCoord * 3.14159 * 2.0) * 0.5 + 0.5;',
    '  streak = pow(streak, 4.0);',
    '  float flowVis = streak * velMag * 3.0;',
    '  flowVis = min(flowVis, 0.15);',
    '  col += vec3(0.7, 0.5, 0.3) * flowVis * smoothstep(0.05, 0.3, temp);',
    '',
    '  // ── Rising plume highlights ──',
    '  // Where velocity is strongly upward and temperature is high',
    '  float risingPlume = max(velY, 0.0) * temp;',
    '  col += vec3(0.3, 0.18, 0.05) * risingPlume * 2.0;',
    '',
    '  // ── Sinking cool flow subtle blue tint ──',
    '  float sinkingFlow = max(-velY, 0.0) * (1.0 - temp);',
    '  col += vec3(0.03, 0.05, 0.12) * sinkingFlow * 1.5;',
    '',
    '  // ── Heat source bright spots at bottom ──',
    '  float bottomGlow = smoothstep(0.06, 0.0, uv.y);',
    '  float heatSourceCount = 3.0 + floor(u_heatRate * 4.0);',
    '  float sourceGlow = 0.0;',
    '  for (float i = 0.0; i < 12.0; i++) {',
    '    if (i >= heatSourceCount) break;',
    '    float sourcePhase = hash1(i * 17.3 + 100.0) * 6.28;',
    '    float sourceBaseX = hash1(i * 23.7 + 200.0);',
    '    float sourceX = sourceBaseX + sin(u_time * 0.05 * (0.3 + hash1(i * 7.1)) + sourcePhase) * 0.15;',
    '    sourceX = fract(sourceX);',
    '    float dist = abs(uv.x - sourceX);',
    '    dist = min(dist, 1.0 - dist);',
    '    float pulse = 0.6 + 0.4 * sin(u_time * (0.3 + hash1(i * 5.5) * 0.4) + sourcePhase);',
    '    sourceGlow += exp(-dist * dist / 0.002) * pulse;',
    '  }',
    '  sourceGlow = min(sourceGlow, 2.5);',
    '  col += vec3(1.0, 0.75, 0.35) * sourceGlow * bottomGlow * 0.7;',
    '',
    '  // ── Turbulent detail from second-order gradients ──',
    '  float tLL = texture2D(u_state, uv + vec2(-simPx.x * 2.0, 0.0)).r;',
    '  float tRR = texture2D(u_state, uv + vec2( simPx.x * 2.0, 0.0)).r;',
    '  float tDD = texture2D(u_state, uv + vec2(0.0, -simPx.y * 2.0)).r;',
    '  float tUU = texture2D(u_state, uv + vec2(0.0,  simPx.y * 2.0)).r;',
    '  float laplacian = (tL + tR + tD + tU) * 4.0 - (tLL + tRR + tDD + tUU) - temp * 12.0;',
    '  float turbulence = abs(laplacian) * 3.0;',
    '  turbulence = min(turbulence, 0.2);',
    '  col += vec3(0.6, 0.4, 0.2) * turbulence * smoothstep(0.1, 0.4, temp);',
    '',
    '  // ── Vignette ──',
    '  vec2 vc = uv - 0.5;',
    '  float vig = 1.0 - dot(vc, vc) * 1.4;',
    '  vig = clamp(vig, 0.0, 1.0);',
    '  vig = pow(vig, 0.5);',
    '  col *= vig;',
    '',
    '  // ── Tone mapping (Reinhard) ──',
    '  col = col / (1.0 + col * 0.4);',
    '',
    '  // ── Gamma ──',
    '  col = pow(max(col, 0.0), vec3(0.92));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  // ── Compile shader helper ──
  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  // ── Link program helper ──
  function linkProgram(vSrc, fSrc) {
    var prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vSrc));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fSrc));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error('Program link error:', gl.getProgramInfoLog(prog));
    }
    return prog;
  }

  // ── Create programs ──
  var simProg = linkProgram(vertSrc, simFragSrc);
  var renderProg = linkProgram(vertSrc, renderFragSrc);

  // ── Simulation program uniforms ──
  var sim_uState = gl.getUniformLocation(simProg, 'u_state');
  var sim_uRes = gl.getUniformLocation(simProg, 'u_res');
  var sim_uTime = gl.getUniformLocation(simProg, 'u_time');
  var sim_uDt = gl.getUniformLocation(simProg, 'u_dt');
  var sim_uViscosity = gl.getUniformLocation(simProg, 'u_viscosity');
  var sim_uHeatRate = gl.getUniformLocation(simProg, 'u_heatRate');
  var sim_uFrame = gl.getUniformLocation(simProg, 'u_frame');

  // ── Render program uniforms ──
  var rnd_uState = gl.getUniformLocation(renderProg, 'u_state');
  var rnd_uRes = gl.getUniformLocation(renderProg, 'u_res');
  var rnd_uSimRes = gl.getUniformLocation(renderProg, 'u_simRes');
  var rnd_uTime = gl.getUniformLocation(renderProg, 'u_time');
  var rnd_uHeatRate = gl.getUniformLocation(renderProg, 'u_heatRate');

  // ── Full-screen triangle buffer ──
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

  // ── Attribute setup helper ──
  function bindQuad(prog) {
    var aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  }

  // ── FBO creation for ping-pong ──
  var fboA = null, fboB = null;
  var texA = null, texB = null;

  function createFBO(w, h) {
    var tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.FLOAT, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    var fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);

    var status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error('Framebuffer not complete:', status);
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    return { fbo: fbo, tex: tex };
  }

  function initFBOs() {
    // Clean up old FBOs if they exist
    if (texA) gl.deleteTexture(texA);
    if (texB) gl.deleteTexture(texB);
    if (fboA) gl.deleteFramebuffer(fboA);
    if (fboB) gl.deleteFramebuffer(fboB);

    var a = createFBO(simW, simH);
    var b = createFBO(simW, simH);
    fboA = a.fbo;
    texA = a.tex;
    fboB = b.fbo;
    texB = b.tex;

    // Initialize texture A with slight random perturbation
    var initData = new Float32Array(simW * simH * 4);
    for (var i = 0; i < simW * simH; i++) {
      var px = (i % simW) / simW;
      var py = Math.floor(i / simW) / simH;
      // Slight warm gradient at bottom, cool at top
      var baseTemp = Math.max(0, 0.05 * (1.0 - py));
      // Random perturbation to break symmetry
      var noise = (Math.random() - 0.5) * 0.03;
      initData[i * 4 + 0] = baseTemp + noise; // temperature
      initData[i * 4 + 1] = (Math.random() - 0.5) * 0.002; // velX
      initData[i * 4 + 2] = (Math.random() - 0.5) * 0.002; // velY
      initData[i * 4 + 3] = baseTemp; // density
    }

    gl.bindTexture(gl.TEXTURE_2D, texA);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, simW, simH, 0, gl.RGBA, gl.FLOAT, initData);
    gl.bindTexture(gl.TEXTURE_2D, texB);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, simW, simH, 0, gl.RGBA, gl.FLOAT, initData);
  }

  // Track which FBO is source/target for ping-pong
  var readFBO = 0; // 0 = read from A, write to B; 1 = read from B, write to A
  var frameCount = 0;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      dispW = w;
      dispH = h;

      var newSimW = Math.max(64, Math.round(w * simScale));
      var newSimH = Math.max(64, Math.round(h * simScale));

      if (newSimW !== simW || newSimH !== simH) {
        simW = newSimW;
        simH = newSimH;
        initFBOs();
        frameCount = 0;
        readFBO = 0;
      }
    }
  }

  var lastTime = 0;

  function render(now) {
    if (!running) return;
    resize();

    var t = prefersReduced ? 0.0 : now * 0.001;
    var dt = Math.min(t - lastTime, 0.05); // cap delta time
    if (lastTime === 0) dt = 0.016;
    lastTime = t;

    // Determine source and target for ping-pong
    var srcTex = readFBO === 0 ? texA : texB;
    var dstFbo = readFBO === 0 ? fboB : fboA;
    var resultTex = readFBO === 0 ? texB : texA;

    // ── Pass 1: Simulation step ──
    // Run multiple substeps per frame for faster convergence
    var substeps = 3;
    for (var step = 0; step < substeps; step++) {
      srcTex = readFBO === 0 ? texA : texB;
      dstFbo = readFBO === 0 ? fboB : fboA;
      resultTex = readFBO === 0 ? texB : texA;

      gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo);
      gl.viewport(0, 0, simW, simH);

      gl.useProgram(simProg);
      bindQuad(simProg);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, srcTex);
      gl.uniform1i(sim_uState, 0);
      gl.uniform2f(sim_uRes, simW, simH);
      gl.uniform1f(sim_uTime, t);
      gl.uniform1f(sim_uDt, dt / substeps);
      gl.uniform1f(sim_uViscosity, viscosityVal);
      gl.uniform1f(sim_uHeatRate, heatRateVal);
      gl.uniform1f(sim_uFrame, frameCount);

      gl.drawArrays(gl.TRIANGLES, 0, 3);

      // Flip ping-pong
      readFBO = 1 - readFBO;
    }

    // After substeps, resultTex is now the latest state
    // The current read source has the newest data
    var displayTex = readFBO === 0 ? texA : texB;

    // ── Pass 2: Render to screen ──
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, dispW, dispH);

    gl.useProgram(renderProg);
    bindQuad(renderProg);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, displayTex);
    gl.uniform1i(rnd_uState, 0);
    gl.uniform2f(rnd_uRes, dispW, dispH);
    gl.uniform2f(rnd_uSimRes, simW, simH);
    gl.uniform1f(rnd_uTime, t);
    gl.uniform1f(rnd_uHeatRate, heatRateVal);

    gl.drawArrays(gl.TRIANGLES, 0, 3);

    frameCount++;
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when hidden or offscreen ──
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(render);
    }
  });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        if (!running) {
          running = true;
          lastTime = 0;
          requestAnimationFrame(render);
        }
      } else {
        running = false;
      }
    });
  }, { threshold: 0.1 });
  observer.observe(canvas);

  // ── postMessage param control ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'HEAT_RATE': heatRateVal = e.data.value; break;
        case 'VISCOSITY': viscosityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
