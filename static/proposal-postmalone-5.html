<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weathered Foil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Weathered Foil</div>
<canvas id="canvas"></canvas>
<script>
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // ── Tunable parameters ──
  var LIGHT_SPEED = 0.3;
  var CRINKLE_DETAIL = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_lightSpeed;',
    'uniform float u_crinkleDetail;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    '// ─────────────────────────────────────────────',
    '// Noise utilities',
    '// ─────────────────────────────────────────────',
    '',
    '// High-quality 2D hash — good decorrelation',
    'vec2 hash2(vec2 p) {',
    '  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));',
    '  return fract(sin(p) * 43758.5453) * 2.0 - 1.0;',
    '}',
    '',
    'float hash1(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    '// ── Gradient noise (Perlin-style) ──',
    '// Smoother than value noise, better normals',
    'float gnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  // Quintic interpolation for C2 continuity (smoother normals)',
    '  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '',
    '  float a = dot(hash2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0));',
    '  float b = dot(hash2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0));',
    '  float c = dot(hash2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0));',
    '  float d = dot(hash2(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0));',
    '',
    '  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);',
    '}',
    '',
    '// ── FBM with domain warping for crinkle character ──',
    'float crinkleNoise(vec2 p, float detail) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  float totalAmp = 0.0;',
    '',
    '  // Low-frequency undulations',
    '  val += gnoise(p * 1.7) * 0.6;',
    '  totalAmp += 0.6;',
    '',
    '  // Medium crinkles — domain-warped for organic feel',
    '  vec2 warp = vec2(gnoise(p * 2.3 + 5.2), gnoise(p * 2.3 + 9.7));',
    '  val += gnoise(p * 4.1 + warp * 0.8) * 0.3;',
    '  totalAmp += 0.3;',
    '',
    '  // Fine micro-facets — amount controlled by detail parameter',
    '  val += gnoise(p * 9.0 + warp * 0.4) * 0.15 * detail;',
    '  totalAmp += 0.15 * detail;',
    '',
    '  // Extra-fine crinkles',
    '  val += gnoise(p * 18.0) * 0.07 * detail;',
    '  totalAmp += 0.07 * detail;',
    '',
    '  // Ultra-fine facets',
    '  val += gnoise(p * 35.0 + vec2(3.1, 7.4)) * 0.035 * detail;',
    '  totalAmp += 0.035 * detail;',
    '',
    '  return val / totalAmp;',
    '}',
    '',
    '// ── Heightfield for normal computation ──',
    'float heightField(vec2 p, float detail) {',
    '  // Second domain warp layer for large-scale foil buckling',
    '  vec2 largeBuckle = vec2(',
    '    gnoise(p * 0.7 + vec2(1.7, 3.2)),',
    '    gnoise(p * 0.7 + vec2(5.1, 8.3))',
    '  );',
    '  vec2 warped = p + largeBuckle * 0.35;',
    '  return crinkleNoise(warped, detail);',
    '}',
    '',
    '// ── Compute normal from heightfield via finite differences ──',
    'vec3 computeNormal(vec2 p, float detail) {',
    '  float eps = 0.003;',
    '  float hC = heightField(p, detail);',
    '  float hR = heightField(p + vec2(eps, 0.0), detail);',
    '  float hU = heightField(p + vec2(0.0, eps), detail);',
    '  // Cross product of tangent vectors',
    '  // T_x = (eps, 0, hR - hC), T_y = (0, eps, hU - hC)',
    '  // N = T_x x T_y = (-eps*(hR-hC), -eps*(hU-hC), eps*eps)',
    '  float strength = 1.8;',
    '  vec3 n = vec3(-(hR - hC) * strength, -(hU - hC) * strength, eps);',
    '  return normalize(n);',
    '}',
    '',
    '// ── Fresnel (Schlick approximation) ──',
    'float fresnel(float cosTheta, float F0) {',
    '  return F0 + (1.0 - F0) * pow(1.0 - max(cosTheta, 0.0), 5.0);',
    '}',
    '',
    '// ── GGX Distribution (for metallic highlights) ──',
    'float ggxD(float NdotH, float roughness) {',
    '  float a = roughness * roughness;',
    '  float a2 = a * a;',
    '  float denom = NdotH * NdotH * (a2 - 1.0) + 1.0;',
    '  return a2 / (PI * denom * denom);',
    '}',
    '',
    '// ── Geometry term (Smith GGX) ──',
    'float ggxG(float NdotV, float NdotL, float roughness) {',
    '  float k = (roughness + 1.0) * (roughness + 1.0) / 8.0;',
    '  float g1 = NdotV / (NdotV * (1.0 - k) + k);',
    '  float g2 = NdotL / (NdotL * (1.0 - k) + k);',
    '  return g1 * g2;',
    '}',
    '',
    '// ── Weathering/patina map ──',
    'float weathering(vec2 p) {',
    '  float w = gnoise(p * 2.5 + vec2(42.0, 17.0)) * 0.5 + 0.5;',
    '  float w2 = gnoise(p * 7.0 + vec2(13.0, 29.0)) * 0.5 + 0.5;',
    '  // Mix scales: large patches + fine variation',
    '  float combined = w * 0.7 + w2 * 0.3;',
    '  // Remap: 0.3 = matte/oxidized, 1.0 = pristine/reflective',
    '  return 0.3 + combined * 0.7;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '',
    '  // Normalized coordinates centered, aspect-corrected',
    '  vec2 p = (uv - 0.5) * vec2(aspect, 1.0);',
    '',
    '  // Scale to fill canvas with detail',
    '  vec2 surfaceCoord = p * 3.5;',
    '',
    '  float t = u_time;',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 1: Crinkle normal field',
    '  // ─────────────────────────────────────────────',
    '  vec3 N = computeNormal(surfaceCoord, u_crinkleDetail);',
    '',
    '  // View direction (straight on)',
    '  vec3 V = vec3(0.0, 0.0, 1.0);',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 4: Weathering/patina',
    '  // ─────────────────────────────────────────────',
    '  float wear = weathering(surfaceCoord);',
    '  // Roughness varies: weathered areas are rougher',
    '  float roughness = mix(0.25, 0.55, 1.0 - wear);',
    '  // Base metallic reflectivity modulated by wear',
    '  float F0_base = mix(0.6, 0.92, wear);',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 2: Primary light — orbiting warm light',
    '  // ─────────────────────────────────────────────',
    '  float lightAngle = t * u_lightSpeed * 0.7;',
    '  // Elliptical orbit for more varied illumination',
    '  vec3 L1 = normalize(vec3(',
    '    sin(lightAngle) * 1.2,',
    '    cos(lightAngle * 0.73) * 0.8,',
    '    0.9 + 0.3 * sin(lightAngle * 0.37)',
    '  ));',
    '',
    '  vec3 H1 = normalize(L1 + V);',
    '  float NdotL1 = max(dot(N, L1), 0.0);',
    '  float NdotH1 = max(dot(N, H1), 0.0);',
    '  float NdotV = max(dot(N, V), 0.001);',
    '',
    '  // GGX specular',
    '  float D1 = ggxD(NdotH1, roughness);',
    '  float G1 = ggxG(NdotV, NdotL1, roughness);',
    '  float F1 = fresnel(max(dot(H1, V), 0.0), F0_base);',
    '  float spec1 = (D1 * G1 * F1) / (4.0 * NdotV * max(NdotL1, 0.001) + 0.001);',
    '',
    '  // Diffuse (minimal for metals — just enough to show form)',
    '  float diff1 = NdotL1 * 0.15;',
    '',
    '  // ── Primary light color: warm gold ──',
    '  vec3 lightColor1 = vec3(1.0, 0.85, 0.6);',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 3: Warm color palette — anisotropic color shift',
    '  // ─────────────────────────────────────────────',
    '  // Base metal color varies by surface orientation',
    '  float upFacing = dot(N, vec3(0.0, 0.0, 1.0)) * 0.5 + 0.5;',
    '  // Side-facing facets get a different tone',
    '  float sideFacing = 1.0 - upFacing;',
    '',
    '  // Warm gold for top-facing',
    '  vec3 goldColor = vec3(0.85, 0.65, 0.3);',
    '  // Deep copper for angled surfaces',
    '  vec3 copperColor = vec3(0.72, 0.38, 0.15);',
    '  // Rich bronze for shadowed areas',
    '  vec3 bronzeColor = vec3(0.5, 0.28, 0.12);',
    '',
    '  // Blend based on surface orientation',
    '  vec3 metalColor = mix(copperColor, goldColor, pow(upFacing, 1.5));',
    '  metalColor = mix(bronzeColor, metalColor, smoothstep(0.2, 0.6, upFacing));',
    '',
    '  // Subtle variation from the weathering pattern',
    '  metalColor = mix(metalColor * 0.7, metalColor * 1.1, wear);',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 5: Secondary light — cool fill from opposite side',
    '  // ─────────────────────────────────────────────',
    '  vec3 L2 = normalize(vec3(-L1.x * 0.8, -L1.y * 0.6, 0.5));',
    '  vec3 H2 = normalize(L2 + V);',
    '  float NdotL2 = max(dot(N, L2), 0.0);',
    '  float NdotH2 = max(dot(N, H2), 0.0);',
    '',
    '  float D2 = ggxD(NdotH2, roughness * 1.3);',
    '  float G2 = ggxG(NdotV, NdotL2, roughness * 1.3);',
    '  float F2 = fresnel(max(dot(H2, V), 0.0), F0_base * 0.7);',
    '  float spec2 = (D2 * G2 * F2) / (4.0 * NdotV * max(NdotL2, 0.001) + 0.001);',
    '',
    '  float diff2 = NdotL2 * 0.08;',
    '',
    '  // Cool blue-steel secondary light',
    '  vec3 lightColor2 = vec3(0.5, 0.55, 0.75);',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Layer 6: Ambient detail — crease darkening + warm fill',
    '  // ─────────────────────────────────────────────',
    '  // Approximate AO: creases (where normal points away from up) are darker',
    '  float ao = smoothstep(-0.1, 0.5, dot(N, vec3(0.0, 0.0, 1.0)));',
    '  ao = ao * ao;',
    '  // Warm ambient in creases',
    '  vec3 ambientColor = vec3(0.25, 0.12, 0.05);',
    '  vec3 ambient = ambientColor * (1.0 - ao) * 0.15;',
    '  // Overall ambient fill',
    '  ambient += metalColor * 0.04;',
    '',
    '  // ─────────────────────────────────────────────',
    '  // Composite all layers',
    '  // ─────────────────────────────────────────────',
    '  vec3 col = vec3(0.0);',
    '',
    '  // Primary light contribution',
    '  col += metalColor * diff1 * lightColor1;',
    '  col += metalColor * spec1 * lightColor1 * 1.8;',
    '',
    '  // Bright specular highlights: white-gold for metallic feel',
    '  vec3 highlightColor = mix(metalColor, vec3(1.0, 0.95, 0.8), 0.6);',
    '  col += highlightColor * pow(max(NdotH1, 0.0), 80.0) * F1 * 0.5 * wear;',
    '',
    '  // Secondary light contribution',
    '  col += metalColor * diff2 * lightColor2 * 0.5;',
    '  col += metalColor * spec2 * lightColor2 * 0.6;',
    '',
    '  // Cool specular accent from secondary light',
    '  col += lightColor2 * pow(max(NdotH2, 0.0), 60.0) * F2 * 0.15 * wear;',
    '',
    '  // Ambient',
    '  col += ambient * ao;',
    '',
    '  // ── Third subtle accent light — very faint, adds depth ──',
    '  vec3 L3 = normalize(vec3(sin(t * u_lightSpeed * 0.3 + 2.0), -0.5, 0.4));',
    '  float NdotL3 = max(dot(N, L3), 0.0);',
    '  col += metalColor * vec3(0.6, 0.4, 0.25) * NdotL3 * 0.06;',
    '',
    '  // ── Warm grain in shadows ──',
    '  float shadowMask = 1.0 - smoothstep(0.0, 0.2, NdotL1);',
    '  float grain = (hash1(gl_FragCoord.xy + fract(t * 0.1) * 100.0) - 0.5) * 0.03;',
    '  col += vec3(0.3, 0.15, 0.05) * grain * shadowMask;',
    '',
    '  // ── Overall film grain (very subtle) ──',
    '  float fineGrain = (hash1(gl_FragCoord.xy * 1.1 + fract(t * 0.07) * 200.0) - 0.5) * 0.015;',
    '  col += fineGrain;',
    '',
    '  // ── Vignette — subtle darkening at edges ──',
    '  float vig = length(uv - 0.5) * 1.3;',
    '  vig = 1.0 - vig * vig * 0.5;',
    '  col *= vig;',
    '',
    '  // ── Tone mapping (slight filmic curve) ──',
    '  col = col / (col + 0.8) * 1.3;',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uLightSpeed = gl.getUniformLocation(prog, 'u_lightSpeed');
  var uCrinkleDetail = gl.getUniformLocation(prog, 'u_crinkleDetail');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    var t = prefersReduced ? 0.0 : now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uLightSpeed, LIGHT_SPEED);
    gl.uniform1f(uCrinkleDetail, CRINKLE_DETAIL);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility pause ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'LIGHT_SPEED': LIGHT_SPEED = e.data.value; break;
        case 'CRINKLE_DETAIL': CRINKLE_DETAIL = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
