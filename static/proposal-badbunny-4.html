<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass Cathedral</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Bass Cathedral</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Bass Cathedral — Infinite gothic corridor of pulsing wireframe arches
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var PULSE_SPEED = 0.4;
  var TUNNEL_DEPTH = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_pulseSpeed;',
    'uniform float u_tunnelDepth;',
    '',
    '#define PI 3.14159265359',
    '#define MAX_STEPS 48',
    '#define MAX_DIST 60.0',
    '#define SURF_DIST 0.005',
    '#define TUBE_R 0.025',
    '',
    '// ── Rotation matrix ──',
    'mat2 rot2(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── Bass pulse function ──',
    '// Slow build, sharp release — like a bass drop',
    'float bassPulse(float t) {',
    '  float cycle = fract(t);',
    '  float attack = smoothstep(0.0, 0.04, cycle);',
    '  float decay = exp(-cycle * 3.5);',
    '  return attack * decay;',
    '}',
    '',
    '// ── Line segment SDF (for wireframe edges) ──',
    'float sdSegment(vec3 p, vec3 a, vec3 b) {',
    '  vec3 pa = p - a, ba = b - a;',
    '  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);',
    '  return length(pa - ba * h);',
    '}',
    '',
    '// ── Gothic arch wireframe SDF ──',
    '// Thin line segments forming a pointed arch frame',
    'float sdGothicArch(vec3 p, float w, float h, float r, float pulse) {',
    '  // Pulse expands the arch',
    '  float sc = 1.0 + pulse * 0.18;',
    '  vec3 sp = p;',
    '  sp.x /= sc;',
    '  sp.y /= sc;',
    '',
    '  float d = 1e10;',
    '',
    '  // Arch dimensions',
    '  float pillarH = h * 0.5;',
    '  float depth = 0.0; // arch in XY plane at z=0',
    '',
    '  // ── Left pillar (vertical line) ──',
    '  vec3 lBot = vec3(-w, 0.0, depth);',
    '  vec3 lTop = vec3(-w, pillarH, depth);',
    '  d = min(d, sdSegment(sp, lBot, lTop));',
    '',
    '  // ── Right pillar (vertical line) ──',
    '  vec3 rBot = vec3(w, 0.0, depth);',
    '  vec3 rTop = vec3(w, pillarH, depth);',
    '  d = min(d, sdSegment(sp, rBot, rTop));',
    '',
    '  // ── Pointed arch top — approximate with line segments ──',
    '  // Gothic arch: two arcs that meet at a peak above center',
    '  // We approximate with 6 segments per side for smooth curve',
    '  float peakY = h;',
    '  vec3 peak = vec3(0.0, peakY, depth);',
    '',
    '  // Left arc: from left pillar top to peak',
    '  // Curve control: bulge outward slightly then curve to peak',
    '  float archBulge = w * 0.35;',
    '',
    '  vec3 la1 = lTop;',
    '  vec3 la2 = vec3(-w + archBulge * 0.1, pillarH + (peakY - pillarH) * 0.25, depth);',
    '  vec3 la3 = vec3(-w * 0.65 + archBulge * 0.05, pillarH + (peakY - pillarH) * 0.5, depth);',
    '  vec3 la4 = vec3(-w * 0.35, pillarH + (peakY - pillarH) * 0.75, depth);',
    '  vec3 la5 = vec3(-w * 0.12, pillarH + (peakY - pillarH) * 0.92, depth);',
    '',
    '  d = min(d, sdSegment(sp, la1, la2));',
    '  d = min(d, sdSegment(sp, la2, la3));',
    '  d = min(d, sdSegment(sp, la3, la4));',
    '  d = min(d, sdSegment(sp, la4, la5));',
    '  d = min(d, sdSegment(sp, la5, peak));',
    '',
    '  // Right arc: mirror of left',
    '  vec3 ra2 = vec3(w - archBulge * 0.1, la2.y, depth);',
    '  vec3 ra3 = vec3(w * 0.65 - archBulge * 0.05, la3.y, depth);',
    '  vec3 ra4 = vec3(w * 0.35, la4.y, depth);',
    '  vec3 ra5 = vec3(w * 0.12, la5.y, depth);',
    '',
    '  d = min(d, sdSegment(sp, rTop, ra2));',
    '  d = min(d, sdSegment(sp, ra2, ra3));',
    '  d = min(d, sdSegment(sp, ra3, ra4));',
    '  d = min(d, sdSegment(sp, ra4, ra5));',
    '  d = min(d, sdSegment(sp, ra5, peak));',
    '',
    '  // ── Horizontal crossbar at base ──',
    '  d = min(d, sdSegment(sp, lBot, rBot));',
    '',
    '  // ── Horizontal crossbar at mid pillar ──',
    '  vec3 midL = vec3(-w, pillarH * 0.5, depth);',
    '  vec3 midR = vec3(w, pillarH * 0.5, depth);',
    '  d = min(d, sdSegment(sp, midL, midR));',
    '',
    '  // ── Inner arch (smaller, decorative) ──',
    '  float iw = w * 0.6;',
    '  float ih = h * 0.75;',
    '  float ipH = pillarH * 0.85;',
    '  float iPeakY = pillarH + (ih - pillarH * 0.5) * 0.85;',
    '  vec3 ilTop = vec3(-iw, ipH, depth);',
    '  vec3 irTop = vec3(iw, ipH, depth);',
    '  vec3 iPeak = vec3(0.0, iPeakY, depth);',
    '',
    '  // Inner arch left side (fewer segments)',
    '  vec3 ila2 = vec3(-iw * 0.55, ipH + (iPeakY - ipH) * 0.5, depth);',
    '  vec3 ila3 = vec3(-iw * 0.15, ipH + (iPeakY - ipH) * 0.88, depth);',
    '  d = min(d, sdSegment(sp, ilTop, ila2));',
    '  d = min(d, sdSegment(sp, ila2, ila3));',
    '  d = min(d, sdSegment(sp, ila3, iPeak));',
    '',
    '  // Inner arch right side',
    '  vec3 ira2 = vec3(iw * 0.55, ila2.y, depth);',
    '  vec3 ira3 = vec3(iw * 0.15, ila3.y, depth);',
    '  d = min(d, sdSegment(sp, irTop, ira2));',
    '  d = min(d, sdSegment(sp, ira2, ira3));',
    '  d = min(d, sdSegment(sp, ira3, iPeak));',
    '',
    '  // Inner pillar stubs',
    '  d = min(d, sdSegment(sp, vec3(-iw, pillarH * 0.5, depth), ilTop));',
    '  d = min(d, sdSegment(sp, vec3(iw, pillarH * 0.5, depth), irTop));',
    '',
    '  // Thickness: thin tube around each line',
    '  return d - r;',
    '}',
    '',
    '// ── Scene: infinite corridor of gothic arches ──',
    'float map(vec3 p, float t, float tunnelDepth) {',
    '  // Domain repetition along Z axis',
    '  float spacing = 3.0;',
    '  float iz = floor(p.z / spacing + 0.5);',
    '  vec3 rp = p;',
    '  rp.z = mod(p.z + spacing * 0.5, spacing) - spacing * 0.5;',
    '',
    '  // Per-arch pulse offset — wave propagates down corridor',
    '  float localPulse = bassPulse(t - iz * 0.12);',
    '',
    '  // Gothic arch parameters',
    '  float archW = 2.0;',
    '  float archH = 3.8;',
    '  float tubeR = TUBE_R; // thin wireframe tubes',
    '',
    '  float d = sdGothicArch(rp, archW, archH, tubeR, localPulse);',
    '',
    '  return d;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time * u_pulseSpeed;',
    '  float tunnelDepth = u_tunnelDepth;',
    '',
    '  // ── Camera: moving forward through the corridor ──',
    '  float camSpeed = 0.6;',
    '  float camZ = t * camSpeed * 3.0;',
    '  float camY = 1.5 + sin(t * 0.25) * 0.2;',
    '  float camX = sin(t * 0.15) * 0.25;',
    '',
    '  vec3 ro = vec3(camX, camY, camZ);',
    '',
    '  // Look direction — slightly upward to see arch peaks',
    '  vec3 target = ro + vec3(sin(t * 0.08) * 0.1, 0.25, 6.0);',
    '  vec3 fwd = normalize(target - ro);',
    '  vec3 right = normalize(cross(vec3(0, 1, 0), fwd));',
    '  vec3 up = cross(fwd, right);',
    '',
    '  // Slight tilt for drama',
    '  float tilt = sin(t * 0.11) * 0.02;',
    '  vec2 uvRot = rot2(tilt) * uv;',
    '',
    '  vec3 rd = normalize(uvRot.x * right + uvRot.y * up + 1.3 * fwd);',
    '',
    '  // ── Raymarching with glow accumulation ──',
    '  float totalDist = 0.0;',
    '  float maxDist = MAX_DIST * tunnelDepth;',
    '  vec3 col = vec3(0.0);',
    '',
    '  // Accumulate glow as ray passes near geometry',
    '  vec3 glow = vec3(0.0);',
    '  float hit = 0.0;',
    '  vec3 hitPos;',
    '',
    '  for (int i = 0; i < MAX_STEPS; i++) {',
    '    vec3 p = ro + rd * totalDist;',
    '    float d = map(p, t, tunnelDepth);',
    '',
    '    // Accumulate glow — derive glow distance from SDF',
    '    float glowDist = abs(d) + TUBE_R;',
    '    float distAtten = exp(-totalDist * 0.06 / tunnelDepth);',
    '',
    '    // Per-arch pulse at this position',
    '    float spacing = 3.0;',
    '    float iz = floor(p.z / spacing + 0.5);',
    '    float localPulse = bassPulse(t - iz * 0.12);',
    '',
    '    // Two-layer glow: tight core + soft bloom',
    '    float coreGlow = 0.002 / (glowDist * glowDist + 0.005);',
    '    float bloomGlow = 0.008 / (glowDist * glowDist + 0.08);',
    '    float glowI = (coreGlow + bloomGlow * 0.3) * distAtten;',
    '',
    '    // Color: amber base, hotter near pulse and camera',
    '    vec3 amberWire = vec3(0.784, 0.584, 0.424);',
    '    vec3 hotEdge   = vec3(1.0, 0.784, 0.549);',
    '    vec3 pulseCol  = vec3(0.706, 0.471, 0.275);',
    '',
    '    vec3 wireCol = mix(amberWire, hotEdge, distAtten * distAtten * 0.6);',
    '    wireCol += pulseCol * localPulse * 1.2;',
    '',
    '    glow += wireCol * glowI * 0.1;',
    '',
    '    if (d < SURF_DIST) {',
    '      hit = 1.0;',
    '      hitPos = p;',
    '      break;',
    '    }',
    '',
    '    // Step size: at least a minimum to avoid getting stuck, but adaptive',
    '    totalDist += max(d, 0.03);',
    '',
    '    if (totalDist > maxDist) break;',
    '  }',
    '',
    '  col = glow;',
    '',
    '  if (hit > 0.5) {',
    '    // Direct hit — bright wireframe line',
    '    float distFade = exp(-totalDist * 0.05 / tunnelDepth);',
    '',
    '    float spacing = 3.0;',
    '    float iz = floor(hitPos.z / spacing + 0.5);',
    '    float localPulse = bassPulse(t - iz * 0.12);',
    '',
    '    vec3 amberWire = vec3(0.784, 0.584, 0.424);',
    '    vec3 hotEdge   = vec3(1.0, 0.784, 0.549);',
    '    vec3 pulseCol  = vec3(0.706, 0.471, 0.275);',
    '',
    '    vec3 wireColor = mix(amberWire, hotEdge, distFade);',
    '    wireColor += pulseCol * localPulse * 1.2;',
    '',
    '    col += wireColor * distFade * 0.9;',
    '    col += hotEdge * localPulse * distFade * 0.5;',
    '  }',
    '',
    '  // ── Global pulse atmosphere ──',
    '  float globalPulse = bassPulse(t);',
    '  col += vec3(0.04, 0.025, 0.012) * globalPulse;',
    '',
    '  // ── Subtle ambient glow toward vanishing point ──',
    '  float centerGlow = exp(-length(uv - vec2(0.0, 0.05)) * 3.0);',
    '  col += vec3(0.06, 0.035, 0.015) * centerGlow * 0.15;',
    '',
    '  // ── Floor reflection hint ──',
    '  float floorGlow = smoothstep(0.1, -0.5, uv.y) * 0.02;',
    '  col += vec3(0.5, 0.3, 0.15) * floorGlow * (1.0 + globalPulse * 0.5);',
    '',
    '  // ── Vignette ──',
    '  float vig = 1.0 - length(uv) * 0.65;',
    '  vig = smoothstep(0.0, 1.0, vig);',
    '  col *= 0.3 + vig * 0.7;',
    '',
    '  // ── Film grain ──',
    '  float grain = fract(sin(dot(gl_FragCoord.xy + fract(t * 37.0) * 1000.0, vec2(12.9898, 78.233))) * 43758.5453);',
    '  col += (grain - 0.5) * 0.012;',
    '',
    '  // ── Tone mapping ──',
    '  col = max(col, vec3(0.0));',
    '  // Slight warm push',
    '  col = pow(col, vec3(0.92, 1.0, 1.1));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uPulseSpeed = gl.getUniformLocation(prog, 'u_pulseSpeed');
  var uTunnelDepth = gl.getUniformLocation(prog, 'u_tunnelDepth');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uPulseSpeed, PULSE_SPEED);
    gl.uniform1f(uTunnelDepth, TUNNEL_DEPTH);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'PULSE_SPEED': PULSE_SPEED = e.data.value; break;
        case 'TUNNEL_DEPTH': TUNNEL_DEPTH = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
