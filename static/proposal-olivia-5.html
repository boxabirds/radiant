<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wax Seal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Wax Seal</div>
<canvas id="canvas"></canvas>
<script>
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var DRIP_RATE = 0.7;
  var WAX_HEAT = 1.0;
  var CYCLE_DUR = 8.0;
  var MAX_DRIPS = 6;

  var vertSrc = 'attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.,1.);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_waxHeat;',
    'uniform vec4 u_drips[6];',
    'uniform vec4 u_pool;',
    'uniform float u_cooling;',
    'uniform float u_shatter;',
    '',
    '#define N 6',
    '',
    'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
    'vec2 hash2(vec2 p){return vec2(hash(p),hash(p+vec2(37.,91.)));}',
    'float noise(vec2 p){',
    '  vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
    '}',
    'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.07;a*=.49;}return v;}',
    '',
    'float sblob(float d,float r){float b=clamp(1.-d/r,0.,1.);return b*b*(3.-2.*b);}',
    '',
    'float field(vec2 p){',
    '  float f=0.;',
    '  for(int i=0;i<N;i++){',
    '    float r=u_drips[i].z;',
    '    if(r<.001)continue;',
    '    f+=sblob(length(p-u_drips[i].xy),r);',
    '  }',
    '  float pr=u_pool.z;',
    '  if(pr>.001){',
    '    float d=length(p-u_pool.xy);',
    '    d+=fbm(p*4.+u_time*.12)*.06*pr;',
    '    f+=sblob(d,pr)*2.;',
    '  }',
    '  return f;',
    '}',
    '',
    'vec3 voronoi(vec2 p){',
    '  vec2 n=floor(p),f=fract(p);float d1=8.,d2=8.;',
    '  for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){',
    '    vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);',
    '    vec2 r=g+o-f;float d=dot(r,r);',
    '    if(d<d1){d2=d1;d1=d;}else if(d<d2){d2=d;}',
    '  }',
    '  return vec3(sqrt(d1),sqrt(d2),sqrt(d2)-sqrt(d1));',
    '}',
    '',
    'void main(){',
    '  vec2 uv=gl_FragCoord.xy/u_res;',
    '  float asp=u_res.x/u_res.y;',
    '  vec2 p=(uv-.5)*vec2(asp,1.);',
    '  float t=u_time;',
    '  float px=1./min(u_res.x,u_res.y);',
    '',
    '  float F=field(p);',
    '  float thr=.45;',
    '  float mask=smoothstep(thr-.1,thr+.02,F);',
    '',
    '  // Shatter dissolve',
    '  float shat=u_shatter;',
    '  float burnEdge=0.;',
    '  if(shat>.01){',
    '    float dn=fbm(p*6.+vec2(t*.5,t*.2));',
    '    // Dissolve: remap fbm to full 0-1 range for clean dissolution',
    '    dn=smoothstep(.2,.8,dn);',
    '    float dt2=shat;',
    '    mask*=smoothstep(dt2,dt2-.2,dn);',
    '    burnEdge=smoothstep(dt2-.2,dt2-.04,dn)*(1.-smoothstep(dt2-.04,dt2+.01,dn))*shat;',
    '  }',
    '',
    '  // Background',
    '  vec3 bg=vec3(.039,.037,.036);',
    '  bg+=vec3(.35,.05,.02)*exp(-dot(p,p)*2.)*.05*(1.-u_cooling)*u_waxHeat;',
    '  if(shat>.15){',
    '    float en=fbm(p*14.-vec2(0.,t*1.2));',
    '    bg+=vec3(1.,.28,.05)*smoothstep(.58,.8,en)*shat*.55*(1.-smoothstep(.1,.45,length(p)));',
    '  }',
    '',
    '  if(mask<.005){gl_FragColor=vec4(bg,1.);return;}',
    '',
    '  float cool=u_cooling;',
    '  float heat=(1.-cool)*u_waxHeat;',
    '',
    '  // Local temperature from nearest blob',
    '  float nd=10.,nt=0.;',
    '  for(int i=0;i<N;i++){',
    '    if(u_drips[i].z<.001)continue;',
    '    float d=length(p-u_drips[i].xy);',
    '    if(d<nd){nd=d;nt=u_drips[i].w;}',
    '  }',
    '  if(u_pool.z>.001){float d=length(p-u_pool.xy);if(d<nd){nd=d;nt=u_pool.w;}}',
    '  float lh=mix(heat,nt*heat,.5);',
    '',
    '  // Surface normal from field gradient',
    '  float e=px*3.;',
    '  float gx=field(p+vec2(e,0.))-field(p-vec2(e,0.));',
    '  float gy=field(p+vec2(0.,e))-field(p-vec2(0.,e));',
    '  vec3 norm=normalize(vec3(-gx,-gy,.04+cool*.18));',
    '',
    '  float thickness=clamp((F-thr)*2.,0.,1.);',
    '',
    '  // === WAX COLOR ===',
    '  // Key insight: molten wax is self-luminous (emissive),',
    '  // not just reflecting light. This is the "subsurface glow".',
    '',
    '  // Emissive base: deep crimson when hot',
    '  vec3 emissive=vec3(.6,.04,.015)*lh;',
    '  // Hotter at thick center -> warm amber-red glow',
    '  emissive+=vec3(.4,.18,.04)*lh*lh*thickness*.5;',
    '',
    '  // Reflective surface: darker, for lighting',
    '  vec3 surface=vec3(.3,.02,.01);',
    '',
    '  // Cooling: surface darkens to burgundy',
    '  vec3 coolSurf=vec3(.15,.02,.05);',
    '  vec3 hardSurf=vec3(.07,.012,.025);',
    '  surface=mix(surface,coolSurf,smoothstep(0.,.6,cool));',
    '  surface=mix(surface,hardSurf,smoothstep(.5,1.,cool));',
    '',
    '  // Texture',
    '  float tex=fbm(p*22.+100.);',
    '  surface*=.85+tex*.3;',
    '',
    '  // === LIGHTING ===',
    '  vec3 L=normalize(vec3(.35,.5,.8));',
    '  vec3 H=normalize(L+vec3(0.,0.,1.));',
    '  float diff=max(dot(norm,L),0.);',
    '  float diff2=max(dot(norm,normalize(vec3(-.4,-.3,.6))),0.)*.15;',
    '',
    '  // Specular: glossy when molten, matte when cooled',
    '  float specP=mix(8.,50.,cool);',
    '  float spec=pow(max(dot(norm,H),0.),specP)*mix(.5,.04,cool);',
    '',
    '  // Fresnel rim',
    '  float fres=pow(1.-abs(norm.z),3.);',
    '  vec3 rimC=mix(vec3(.8,.15,.04),vec3(.15,.04,.06),cool);',
    '',
    '  // === VORONOI CRACKS ===',
    '  vec3 crk=vec3(0.);',
    '  if(cool>.2){',
    '    float cp=smoothstep(.2,.7,cool);',
    '    vec3 vor=voronoi(p*10.+vec2(42.,17.));',
    '    float cl=1.-smoothstep(0.,.05+cp*.01,vor.z);',
    '    cl*=cp;',
    '    float gf=1.-smoothstep(.6,1.,cool)*.75;',
    '    crk=vec3(1.,.4,.06)*cl*.9*gf;',
    '    surface*=1.-cl*.5;',
    '    emissive*=1.-cl*.3;',
    '  }',
    '',
    '  // Shatter burn edges',
    '  vec3 sBurn=vec3(1.,.3,.04)*burnEdge*2.;',
    '',
    '  // === COMPOSE ===',
    '  // Combine emissive (self-glow) + reflected (lit surface)',
    '  vec3 col=emissive;',
    '  col+=surface*(.25+diff*.65+diff2);',
    '  col+=vec3(1.,.9,.75)*spec;',
    '  col+=rimC*fres*mix(.4,.08,cool);',
    '  col+=crk;',
    '  col+=sBurn;',
    '',
    '  // Matte roughness when cooled',
    '  col-=fbm(p*30.)*.04*cool;',
    '',
    '  // Hot edge glow at wax boundary',
    '  float edgeDist=smoothstep(thr+.02,thr-.1,F);',
    '  col+=vec3(.8,.1,.02)*edgeDist*heat*.6;',
    '',
    '  col=mix(bg,col,mask);',
    '',
    '  // Vignette',
    '  col*=1.-dot(p,p)*.2;',
    '',
    '  // Tone map + gamma',
    '  col=col/(1.+col*.2);',
    '  col=pow(max(col,vec3(0.)),vec3(.92));',
    '',
    '  gl_FragColor=vec4(col,1.);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uWaxHeat = gl.getUniformLocation(prog, 'u_waxHeat');
  var uPool = gl.getUniformLocation(prog, 'u_pool');
  var uCooling = gl.getUniformLocation(prog, 'u_cooling');
  var uShatter = gl.getUniformLocation(prog, 'u_shatter');

  var uDrips = [];
  for (var i = 0; i < MAX_DRIPS; i++) {
    uDrips.push(gl.getUniformLocation(prog, 'u_drips[' + i + ']'));
  }

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function srand(seed) {
    var x = Math.sin(seed * 127.1) * 43758.5453;
    return x - Math.floor(x);
  }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInOutCubic(t) { return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }
  function easeInQuad(t) { return t * t; }
  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  var drips = [];
  var cycleTime = 0;
  var cycleCount = 0;
  var poolRadius = 0;
  var poolTemp = 1;
  var cooling = 0;
  var shatter = 0;

  function initDrips() {
    drips = [];
    for (var i = 0; i < MAX_DRIPS; i++) {
      drips.push({ x: 0, y: 0, startY: 0, targetY: 0, speed: 0, radius: 0, born: -1, landed: false, temp: 1, xPos: 0, active: false, curRadius: 0 });
    }
  }

  function spawnDrip(idx, time) {
    var d = drips[idx];
    var s = cycleCount * MAX_DRIPS + idx;
    d.xPos = (srand(s * 3.17 + 1.3) - 0.5) * 0.35;
    d.x = d.xPos;
    d.startY = 0.55;
    d.y = d.startY;
    d.targetY = (srand(s * 11.7 + 5.3) - 0.5) * 0.06;
    d.speed = 1.4 + srand(s * 13.9 + 3.7) * 0.6;
    d.radius = 0.07 + srand(s * 17.1 + 7.9) * 0.04;
    d.curRadius = d.radius;
    d.born = time;
    d.landed = false;
    d.temp = 1;
    d.active = true;
  }

  initDrips();
  var lastTime = 0;
  var totalTime = 0;

  function render(now) {
    resize();
    if (!lastTime) lastTime = now;
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (prefersReduced) dt *= 0.15;
    totalTime += dt;
    cycleTime += dt;

    if (cycleTime >= CYCLE_DUR) {
      cycleTime -= CYCLE_DUR;
      cycleCount++;
      poolRadius = 0;
      poolTemp = 1;
      cooling = 0;
      shatter = 0;
      initDrips();
    }

    var phase = cycleTime / CYCLE_DUR;
    var DRIP_END = 0.25;
    var POOL_END = 0.50;
    var COOL_END = 0.75;

    // Spawn drips quickly
    if (phase < DRIP_END) {
      var dp = phase / DRIP_END;
      var num = Math.min(Math.floor(dp * MAX_DRIPS * 2.5 * DRIP_RATE + 1), MAX_DRIPS);
      for (var i = 0; i < num; i++) {
        if (!drips[i].active) spawnDrip(i, cycleTime);
      }
    }

    // Update drips
    var anyLanded = false;
    for (var i = 0; i < MAX_DRIPS; i++) {
      var d = drips[i];
      if (!d.active) continue;
      if (!d.landed) {
        var ft = cycleTime - d.born;
        var fd = Math.abs(d.startY - d.targetY) / d.speed;
        var fp = Math.min(ft / fd, 1);
        d.y = d.startY - (d.startY - d.targetY) * easeInQuad(fp);
        d.x = d.xPos + Math.sin(ft * 12 + i * 3) * 0.005;
        d.curRadius = d.radius * (1 + (1 - fp) * 0.2);
        if (fp >= 1) { d.landed = true; d.y = d.targetY; d.curRadius = d.radius; }
      } else {
        anyLanded = true;
        d.x += (0 - d.x) * 1.5 * dt;
        d.y += (0 - d.y) * 1.5 * dt;
        d.curRadius = Math.min(d.curRadius + dt * 0.04, d.radius * 2);
      }
      if (phase > POOL_END) d.temp = Math.max(0, d.temp - dt * 0.8);
    }

    // Pool growth
    if (phase < DRIP_END) {
      poolRadius = anyLanded ? 0.05 : 0;
    } else if (phase < POOL_END) {
      var pp = (phase - DRIP_END) / (POOL_END - DRIP_END);
      poolRadius = 0.05 + easeOutCubic(pp) * 0.3;
    } else {
      poolRadius = 0.35;
    }

    // Cooling
    if (phase >= POOL_END && phase < COOL_END) {
      cooling = easeInOutCubic((phase - POOL_END) / (COOL_END - POOL_END));
      poolTemp = 1 - cooling;
    } else if (phase >= COOL_END) {
      cooling = 1;
      poolTemp = 0;
    }

    // Shatter
    if (phase >= COOL_END) {
      shatter = easeOutExpo((phase - COOL_END) / (1 - COOL_END));
    }

    // Upload uniforms
    gl.uniform1f(uTime, totalTime);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uWaxHeat, WAX_HEAT);
    gl.uniform4f(uPool, 0, 0, poolRadius, poolTemp);
    gl.uniform1f(uCooling, cooling);
    gl.uniform1f(uShatter, shatter);

    for (var i = 0; i < MAX_DRIPS; i++) {
      var d = drips[i];
      if (d.active) {
        gl.uniform4f(uDrips[i], d.x, d.y, d.curRadius, d.temp);
      } else {
        gl.uniform4f(uDrips[i], 0, 5, 0, 0);
      }
    }

    gl.drawArrays(gl.TRIANGLES, 0, 3);
    if (running) rafId = requestAnimationFrame(render);
  }

  var running = true;
  var rafId = requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) { running = false; if (rafId) cancelAnimationFrame(rafId); }
    else { running = true; lastTime = 0; rafId = requestAnimationFrame(render); }
  });

  if (typeof IntersectionObserver !== 'undefined') {
    var observer = new IntersectionObserver(function (entries) {
      var vis = entries[0].isIntersecting;
      if (!vis && running) { running = false; if (rafId) cancelAnimationFrame(rafId); }
      else if (vis && !running && !document.hidden) { running = true; lastTime = 0; rafId = requestAnimationFrame(render); }
    }, { threshold: 0.01 });
    observer.observe(canvas);
  }

  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      if (e.data.name === 'DRIP_RATE') DRIP_RATE = e.data.value;
      if (e.data.name === 'WAX_HEAT') WAX_HEAT = e.data.value;
    }
  });
})();
</script>
</body>
</html>
