<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satin Ripple</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 20px; left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5); z-index: 10; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div class="label">Satin Ripple</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_rippleSpeed;',
    'uniform float u_sheenIntensity;',
    '',
    '// ========== Simplex noise (Ashima Arts) ==========',
    'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec2 mod289v2(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
    '',
    'float snoise(vec2 v){',
    '  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
    '  vec2 i=floor(v+dot(v,C.yy));',
    '  vec2 x0=v-i+dot(i,C.xx);',
    '  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
    '  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;',
    '  i=mod289v2(i);',
    '  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
    '  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);',
    '  m=m*m; m=m*m;',
    '  vec3 x=2.0*fract(p*C.www)-1.0;',
    '  vec3 h=abs(x)-0.5;',
    '  vec3 ox=floor(x+0.5);',
    '  vec3 a0=x-ox;',
    '  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
    '  vec3 g;',
    '  g.x=a0.x*x0.x+h.x*x0.y;',
    '  g.yz=a0.yz*x12.xz+h.yz*x12.yw;',
    '  return 130.0*dot(m,g);',
    '}',
    '',
    '// ========== Flow field: thread direction ==========',
    '// Returns a 2D tangent vector representing the local weave direction.',
    '// Uses smoothly varying sine-based functions with noise perturbation.',
    'vec2 threadDirection(vec2 p, float t, float layer){',
    '  // Base angle from smooth sinusoidal field',
    '  float baseAngle = layer * 1.0472; // ~60 degree offset per layer',
    '  // Large-scale draping curvature',
    '  float drape = sin(p.x * 1.2 + t * 0.3) * 0.4',
    '              + sin(p.y * 0.9 - t * 0.2) * 0.3',
    '              + sin((p.x + p.y) * 0.7 + t * 0.15) * 0.25;',
    '  // Noise-based perturbation for organic flow',
    '  float nAngle = snoise(p * 1.5 + vec2(t * 0.12, layer * 3.7)) * 0.6;',
    '  float angle = baseAngle + drape + nAngle;',
    '  return normalize(vec2(cos(angle), sin(angle)));',
    '}',
    '',
    '// ========== Surface displacement for draping ==========',
    'float surfaceHeight(vec2 p, float t){',
    '  float h = 0.0;',
    '  // Large gentle folds',
    '  h += sin(p.x * 1.8 + t * 0.25) * 0.3;',
    '  h += sin(p.y * 1.4 - t * 0.18) * 0.25;',
    '  h += sin((p.x * 0.8 - p.y * 1.1) + t * 0.22) * 0.2;',
    '  // Medium ripples',
    '  h += sin(p.x * 3.5 + p.y * 2.0 + t * 0.4) * 0.1;',
    '  h += sin(p.x * 2.0 - p.y * 3.0 - t * 0.35) * 0.08;',
    '  // Subtle noise for fine detail',
    '  h += snoise(p * 2.5 + t * 0.15) * 0.12;',
    '  return h;',
    '}',
    '',
    '// ========== Surface normal from height field ==========',
    'vec3 computeNormal(vec2 p, float t){',
    '  float eps = 0.008;',
    '  float hc = surfaceHeight(p, t);',
    '  float hx = surfaceHeight(p + vec2(eps, 0.0), t);',
    '  float hy = surfaceHeight(p + vec2(0.0, eps), t);',
    '  vec3 dx = vec3(eps, 0.0, (hx - hc) * 0.3);',
    '  vec3 dy = vec3(0.0, eps, (hy - hc) * 0.3);',
    '  return normalize(cross(dy, dx));',
    '}',
    '',
    '// ========== Kajiya-Kay anisotropic specular ==========',
    '// T = tangent (thread direction), H = half-vector, shininess = exponent',
    'float kajiyaKay(vec3 T, vec3 H, float shininess){',
    '  float TdotH = dot(T, H);',
    '  float sinTH = sqrt(max(1.0 - TdotH * TdotH, 0.0));',
    '  return pow(sinTH, shininess);',
    '}',
    '',
    '// ========== Kajiya-Kay diffuse term ==========',
    'float kajiyaDiffuse(vec3 T, vec3 L){',
    '  float TdotL = dot(T, L);',
    '  return sqrt(max(1.0 - TdotL * TdotL, 0.0));',
    '}',
    '',
    'void main(){',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 p = (uv - 0.5) * vec2(aspect, 1.0);',
    '  float t = u_time * u_rippleSpeed;',
    '',
    '  // ---- Color palette ----',
    '  vec3 deepShadow = vec3(0.22, 0.06, 0.06);',
    '  vec3 basePink   = vec3(0.75, 0.38, 0.35);',
    '  vec3 brightSheen= vec3(1.0, 0.82, 0.78);',
    '',
    '  // ---- Surface normal from displacement ----',
    '  vec3 N = computeNormal(p, t);',
    '',
    '  // ---- Light setup ----',
    '  // Primary light: upper right, moving slowly',
    '  vec3 lightPos1 = vec3(0.8 + sin(t * 0.1) * 0.3, 0.7 + cos(t * 0.13) * 0.2, 1.5);',
    '  vec3 lightDir1 = normalize(lightPos1 - vec3(p, 0.0));',
    '  // Secondary fill light: lower left',
    '  vec3 lightPos2 = vec3(-0.6 + cos(t * 0.08) * 0.2, -0.5 + sin(t * 0.11) * 0.15, 1.2);',
    '  vec3 lightDir2 = normalize(lightPos2 - vec3(p, 0.0));',
    '  // Rim light from behind',
    '  vec3 lightDir3 = normalize(vec3(sin(t * 0.07) * 0.3, 0.3, -0.8));',
    '',
    '  // View direction (looking straight at the fabric)',
    '  vec3 V = vec3(0.0, 0.0, 1.0);',
    '',
    '  // Half-vectors',
    '  vec3 H1 = normalize(lightDir1 + V);',
    '  vec3 H2 = normalize(lightDir2 + V);',
    '',
    '  // ---- Accumulate shading from 3 thread layers ----',
    '  float totalSpec = 0.0;',
    '  float totalDiff = 0.0;',
    '  float totalSpec2 = 0.0;',
    '  float totalDiff2 = 0.0;',
    '  float rimTotal = 0.0;',
    '',
    '  // Layer 0: primary warp threads',
    '  vec2 td0 = threadDirection(p, t, 0.0);',
    '  vec3 T0 = normalize(vec3(td0, 0.0) - N * dot(vec3(td0, 0.0), N));',
    '  totalSpec  += kajiyaKay(T0, H1, 40.0) * 0.5;',
    '  totalDiff  += kajiyaDiffuse(T0, lightDir1) * 0.5;',
    '  totalSpec2 += kajiyaKay(T0, H2, 35.0) * 0.5;',
    '  totalDiff2 += kajiyaDiffuse(T0, lightDir2) * 0.5;',
    '  rimTotal   += kajiyaDiffuse(T0, lightDir3) * 0.5;',
    '',
    '  // Layer 1: weft threads (cross-weave)',
    '  vec2 td1 = threadDirection(p, t, 1.0);',
    '  vec3 T1 = normalize(vec3(td1, 0.0) - N * dot(vec3(td1, 0.0), N));',
    '  totalSpec  += kajiyaKay(T1, H1, 50.0) * 0.35;',
    '  totalDiff  += kajiyaDiffuse(T1, lightDir1) * 0.35;',
    '  totalSpec2 += kajiyaKay(T1, H2, 45.0) * 0.35;',
    '  totalDiff2 += kajiyaDiffuse(T1, lightDir2) * 0.35;',
    '  rimTotal   += kajiyaDiffuse(T1, lightDir3) * 0.35;',
    '',
    '  // Layer 2: subtle diagonal accent threads',
    '  vec2 td2 = threadDirection(p, t, 2.0);',
    '  vec3 T2 = normalize(vec3(td2, 0.0) - N * dot(vec3(td2, 0.0), N));',
    '  totalSpec  += kajiyaKay(T2, H1, 60.0) * 0.15;',
    '  totalDiff  += kajiyaDiffuse(T2, lightDir1) * 0.15;',
    '  totalSpec2 += kajiyaKay(T2, H2, 55.0) * 0.15;',
    '  totalDiff2 += kajiyaDiffuse(T2, lightDir2) * 0.15;',
    '  rimTotal   += kajiyaDiffuse(T2, lightDir3) * 0.15;',
    '',
    '  // ---- Lambertian component from surface normal ----',
    '  float lambert1 = max(dot(N, lightDir1), 0.0);',
    '  float lambert2 = max(dot(N, lightDir2), 0.0);',
    '',
    '  // ---- Compose final color ----',
    '  // Ambient base',
    '  vec3 col = deepShadow * 0.6;',
    '',
    '  // Diffuse from Kajiya-Kay (fiber diffuse)',
    '  float diff = totalDiff * 0.7 + totalDiff2 * 0.3;',
    '  // Blend with Lambertian for fabric body',
    '  diff = mix(diff, lambert1 * 0.6 + lambert2 * 0.25, 0.35);',
    '  col += basePink * diff * 0.85;',
    '',
    '  // Anisotropic specular sheen',
    '  float spec = totalSpec * 0.7 + totalSpec2 * 0.3;',
    '  spec *= u_sheenIntensity;',
    '  // Primary sheen: bright pink-white highlight',
    '  col += brightSheen * spec * 0.65;',
    '  // Secondary warm sheen from second light',
    '  col += vec3(0.9, 0.55, 0.5) * totalSpec2 * u_sheenIntensity * 0.25;',
    '',
    '  // Rim/back light for depth and silk-like glow',
    '  col += vec3(0.6, 0.25, 0.3) * rimTotal * 0.2;',
    '',
    '  // ---- Surface height shading (fold shadows/highlights) ----',
    '  float h = surfaceHeight(p, t);',
    '  // Darken valleys, brighten peaks',
    '  col *= 0.85 + h * 0.25;',
    '',
    '  // ---- Subtle subsurface scattering fake ----',
    '  float sss = max(dot(-N, lightDir1), 0.0) * 0.15;',
    '  col += vec3(0.85, 0.35, 0.35) * sss;',
    '',
    '  // ---- Fine thread texture ----',
    '  // Subtle high-freq pattern to hint at individual threads',
    '  float threadTex = snoise(p * 45.0 + td0 * 10.0) * 0.03;',
    '  col += basePink * threadTex;',
    '',
    '  // ---- Vignette ----',
    '  float vig = 1.0 - smoothstep(0.35, 1.1, length(p * vec2(0.85, 1.0)));',
    '  col *= 0.65 + 0.35 * vig;',
    '',
    '  // ---- Film grain ----',
    '  float grain = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)) + fract(u_time * 0.1) * 100.0) * 43758.5453) - 0.5) * 0.015;',
    '  col += grain;',
    '',
    '  // ---- Saturation boost ----',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col = mix(vec3(lum), col, 1.2);',
    '',
    '  // ---- Gamma (minimal, keep saturation) ----',
    '  col = pow(max(col, 0.0), vec3(0.95));',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRippleSpeed = gl.getUniformLocation(prog, 'u_rippleSpeed');
  var uSheenIntensity = gl.getUniformLocation(prog, 'u_sheenIntensity');
  var rippleSpeedVal = 0.6;
  var sheenIntensityVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uRippleSpeed, rippleSpeedVal);
    gl.uniform1f(uSheenIntensity, sheenIntensityVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'RIPPLE_SPEED': rippleSpeedVal = e.data.value; break;
        case 'SHEEN_INTENSITY': sheenIntensityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
