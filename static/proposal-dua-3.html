<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscilloscope</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Oscilloscope</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0;
  var H = 0;
  var running = true;

  // Tunable parameters
  var MORPH_SPEED = 0.5;
  var GLOW_INTENSITY = 1.0;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Harmonically interesting frequency ratios ──
  var ratios = [
    { a: 1, b: 2 },
    { a: 2, b: 3 },
    { a: 3, b: 4 },
    { a: 3, b: 5 },
    { a: 4, b: 5 },
    { a: 5, b: 6 },
    { a: 5, b: 7 },
    { a: 7, b: 8 },
    { a: 2, b: 5 },
    { a: 3, b: 7 },
    { a: 4, b: 7 },
    { a: 5, b: 8 }
  ];

  // ── Curve definitions ──
  // Each curve has its own morph state, color, and point history
  var NUM_CURVES = 3;
  var MAX_POINTS = 400;
  var POINTS_PER_FRAME = 4;

  var curves = [];
  for (var c = 0; c < NUM_CURVES; c++) {
    var startIdx = Math.floor(Math.random() * ratios.length);
    var nextIdx = (startIdx + 1 + Math.floor(Math.random() * (ratios.length - 1))) % ratios.length;
    curves.push({
      points: [],
      currentRatioIdx: startIdx,
      nextRatioIdx: nextIdx,
      morphProgress: 0,
      morphDuration: 6 + Math.random() * 4,
      freqA: ratios[startIdx].a,
      freqB: ratios[startIdx].b,
      phaseOffset: c * Math.PI * 0.67,
      phaseSpeed: 0.15 + c * 0.08,
      amplitudeBase: 0.40 - c * 0.04,
      amplitudePhase: Math.random() * Math.PI * 2,
      t: Math.random() * 100
    });
  }

  // ── Color palette ──
  var colors = [
    { r: 0, g: 255, b: 255, name: 'cyan' },       // electric cyan
    { r: 255, g: 0, b: 255, name: 'magenta' },     // hot magenta
    { r: 68, g: 255, b: 136, name: 'green' }        // electric green
  ];

  // ── Smooth interpolation helper ──
  function smoothstep(t) {
    var ct = t < 0 ? 0 : (t > 1 ? 1 : t);
    return ct * ct * (3 - 2 * ct);
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  // ── Update curve frequency morphing ──
  function updateCurveMorph(curve, dt) {
    curve.morphProgress += dt / curve.morphDuration;

    if (curve.morphProgress >= 1) {
      curve.morphProgress = 0;
      curve.currentRatioIdx = curve.nextRatioIdx;
      // Pick a new target ratio that is different from current
      var tries = 0;
      do {
        curve.nextRatioIdx = Math.floor(Math.random() * ratios.length);
        tries++;
      } while (curve.nextRatioIdx === curve.currentRatioIdx && tries < 20);
      curve.morphDuration = 5 + Math.random() * 6;
    }

    var s = smoothstep(curve.morphProgress);
    var currentRatio = ratios[curve.currentRatioIdx];
    var nextRatio = ratios[curve.nextRatioIdx];
    curve.freqA = lerp(currentRatio.a, nextRatio.a, s);
    curve.freqB = lerp(currentRatio.b, nextRatio.b, s);
  }

  // ── Generate new points for a curve ──
  function generatePoints(curve, time) {
    var cx = W * 0.5;
    var cy = H * 0.5;
    var scale = Math.min(W, H) * 0.5;

    // Breathing amplitude modulation
    var breathe = 0.85 + 0.15 * Math.sin(time * 0.3 + curve.amplitudePhase);
    var amp = curve.amplitudeBase * scale * breathe;

    // Phase offset slowly rotates
    var delta = curve.phaseOffset + time * curve.phaseSpeed;

    var dt = 0.06;
    for (var i = 0; i < POINTS_PER_FRAME; i++) {
      curve.t += dt;
      var t = curve.t;
      var x = cx + amp * Math.sin(curve.freqA * t + delta);
      var y = cy + amp * Math.sin(curve.freqB * t);

      curve.points.push({ x: x, y: y, age: 0 });
    }

    // Trim old points
    while (curve.points.length > MAX_POINTS) {
      curve.points.shift();
    }
  }

  // ── Age all points ──
  function agePoints(curve, dt) {
    for (var i = 0; i < curve.points.length; i++) {
      curve.points[i].age += dt;
    }
  }

  // ── Draw a single curve with glow ──
  function drawCurve(curveIdx) {
    var curve = curves[curveIdx];
    var color = colors[curveIdx];
    var pts = curve.points;
    var len = pts.length;

    if (len < 2) return;

    var maxAge = MAX_POINTS * 0.02; // approximate max age in seconds

    // Draw glow pass (thick, dim)
    for (var seg = 0; seg < len - 1; seg++) {
      var p0 = pts[seg];
      var p1 = pts[seg + 1];

      // Skip segments where points are too far apart (from resize etc)
      var dx = p1.x - p0.x;
      var dy = p1.y - p0.y;
      if (dx * dx + dy * dy > 10000) continue;

      var ageFrac = p0.age / maxAge;
      if (ageFrac > 1) ageFrac = 1;
      var freshness = 1 - ageFrac;

      // Glow layer
      var glowAlpha = freshness * freshness * 0.04 * GLOW_INTENSITY;
      if (glowAlpha < 0.003) continue;

      var glowWidth = 6 + freshness * 4;

      ctx.strokeStyle = 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',' + glowAlpha.toFixed(4) + ')';
      ctx.lineWidth = glowWidth;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }

    // Draw core pass (thin, bright)
    for (var seg2 = 0; seg2 < len - 1; seg2++) {
      var cp0 = pts[seg2];
      var cp1 = pts[seg2 + 1];

      var cdx = cp1.x - cp0.x;
      var cdy = cp1.y - cp0.y;
      if (cdx * cdx + cdy * cdy > 10000) continue;

      var cAgeFrac = cp0.age / maxAge;
      if (cAgeFrac > 1) cAgeFrac = 1;
      var cFreshness = 1 - cAgeFrac;

      // Core layer - bright white-hot center blending to the color
      var coreAlpha = cFreshness * cFreshness * cFreshness * 0.25 * GLOW_INTENSITY;
      if (coreAlpha < 0.005) continue;

      var coreWidth = 1 + cFreshness * 1.5;

      // White-hot for very fresh points, color for slightly older
      var whiteBlend = cFreshness * cFreshness * cFreshness;
      var cr = Math.round(lerp(color.r, 255, whiteBlend));
      var cg = Math.round(lerp(color.g, 255, whiteBlend));
      var cb = Math.round(lerp(color.b, 255, whiteBlend));

      ctx.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + coreAlpha.toFixed(4) + ')';
      ctx.lineWidth = coreWidth;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cp0.x, cp0.y);
      ctx.lineTo(cp1.x, cp1.y);
      ctx.stroke();
    }
  }

  // ── Draw a subtle grid for oscilloscope feel ──
  function drawGrid() {
    ctx.strokeStyle = 'rgba(40, 50, 45, 0.12)';
    ctx.lineWidth = 0.5;

    var gridSpacing = Math.min(W, H) / 10;
    var cx = W * 0.5;
    var cy = H * 0.5;

    // Vertical lines
    for (var gx = cx % gridSpacing; gx < W; gx += gridSpacing) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, H);
      ctx.stroke();
    }

    // Horizontal lines
    for (var gy = cy % gridSpacing; gy < H; gy += gridSpacing) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(W, gy);
      ctx.stroke();
    }

    // Center crosshair (brighter)
    ctx.strokeStyle = 'rgba(60, 75, 65, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(W, cy);
    ctx.stroke();
  }

  // ── Main render loop ──
  var lastTime = 0;

  function render(now) {
    if (!running) return;

    var time = now * 0.001;
    var dt = lastTime === 0 ? 0.016 : (time - lastTime);
    if (dt > 0.1) dt = 0.016; // clamp large gaps
    lastTime = time;

    var morphDt = prefersReduced ? 0 : dt * MORPH_SPEED;
    var animTime = prefersReduced ? 0 : time;

    // Phosphor decay: overlay a semi-transparent dark rect
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10, 10, 10, 0.25)';
    ctx.fillRect(0, 0, W, H);

    // Draw grid
    drawGrid();

    // Update and draw each curve
    ctx.globalCompositeOperation = 'lighter';

    for (var c = 0; c < NUM_CURVES; c++) {
      var curve = curves[c];

      if (!prefersReduced) {
        updateCurveMorph(curve, morphDt);
        generatePoints(curve, animTime);
        agePoints(curve, dt);
      }

      drawCurve(c);
    }

    ctx.globalCompositeOperation = 'source-over';

    // Vignette
    var cx = W * 0.5;
    var cy = H * 0.5;
    var maxDim = Math.max(W, H);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.25, cx, cy, maxDim * 0.75);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.4)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(render);
  }

  // Initial clear
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'MORPH_SPEED': MORPH_SPEED = e.data.value; break;
        case 'GLOW_INTENSITY': GLOW_INTENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
