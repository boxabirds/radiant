<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confetti Burst</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Confetti Burst</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // Tunable parameters
  var BURST_INTERVAL = 4;
  var GRAVITY = 0.8;

  // Confetti palette — Sabrina Carpenter vibes
  var COLORS = [
    { r: 255, g: 105, b: 180 },  // hot pink
    { r: 233, g: 30,  b: 140 },  // deep pink
    { r: 212, g: 165, b: 116 },  // champagne
    { r: 200, g: 149, b: 108 },  // warm gold
    { r: 255, g: 215, b: 0   },  // gold
    { r: 255, g: 245, b: 230 },  // cream
    { r: 204, g: 34,  b: 68  },  // cherry red
    { r: 232, g: 160, b: 184 },  // soft rose
    { r: 255, g: 182, b: 210 },  // light pink
    { r: 255, g: 200, b: 150 }   // peach gold
  ];

  var confetti = [];
  var MAX_CONFETTI = 800;
  var timeSinceLastBurst = 0;
  var burstQueued = true; // Start with an immediate burst

  // Wind — subtle oscillating horizontal force
  var windTime = 0;

  function randomRange(min, max) {
    return min + Math.random() * (max - min);
  }

  function createConfettiPiece(cx, cy) {
    var angle = Math.random() * Math.PI * 2;
    var speed = randomRange(3, 10);
    var color = COLORS[Math.floor(Math.random() * COLORS.length)];
    // Some variation in piece size
    var w = randomRange(5, 10);
    var h = randomRange(3, 6);

    return {
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed + randomRange(-1, 1),
      vy: Math.sin(angle) * speed * -1 - randomRange(2, 6), // bias upward
      // 3D rotation angles
      rotX: Math.random() * Math.PI * 2,
      rotY: Math.random() * Math.PI * 2,
      rotZ: Math.random() * Math.PI * 2,
      // Angular velocities
      avX: randomRange(-8, 8),
      avY: randomRange(-8, 8),
      avZ: randomRange(-4, 4),
      // Dimensions
      w: w,
      h: h,
      // Visual
      color: color,
      opacity: 1,
      // Sparkle: some pieces will flash white
      sparkle: Math.random() < 0.15,
      sparklePhase: Math.random() * Math.PI * 2,
      // Air resistance coefficient (varies per piece for natural feel)
      drag: randomRange(0.012, 0.025),
      // Life tracking
      age: 0,
      alive: true
    };
  }

  function spawnBurst() {
    var cx = width / 2 + randomRange(-width * 0.1, width * 0.1);
    var cy = height / 2 + randomRange(-height * 0.1, height * 0.05);
    var count = Math.floor(randomRange(50, 80));

    for (var i = 0; i < count; i++) {
      if (confetti.length >= MAX_CONFETTI) {
        // Remove oldest pieces to make room
        confetti.splice(0, count - i);
      }
      confetti.push(createConfettiPiece(cx, cy));
    }
  }

  function updateConfetti(dt) {
    windTime += dt;
    var wind = Math.sin(windTime * 0.5) * 0.3 + Math.sin(windTime * 0.17) * 0.15;

    var i = confetti.length;
    while (i--) {
      var p = confetti[i];
      p.age += dt;

      // Update rotation angles
      p.rotX += p.avX * dt;
      p.rotY += p.avY * dt;
      p.rotZ += p.avZ * dt;

      // Cross-sectional area factor based on rotation
      // When the confetti is face-on, it catches more air; edge-on, less
      var faceArea = Math.abs(Math.cos(p.rotX)) * Math.abs(Math.cos(p.rotY));
      // Minimum area so pieces always have some drag
      var effectiveArea = 0.2 + 0.8 * faceArea;

      // Air resistance (proportional to velocity squared and cross-sectional area)
      var speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 0.01) {
        var dragForce = p.drag * effectiveArea * speed;
        p.vx -= (p.vx / speed) * dragForce;
        p.vy -= (p.vy / speed) * dragForce;
      }

      // Angular damping — tumbling slows over time
      p.avX *= (1 - 0.3 * dt);
      p.avY *= (1 - 0.3 * dt);
      p.avZ *= (1 - 0.5 * dt);

      // Face-on orientation catches air and adds rotational perturbation
      // This creates the fluttering/tumbling effect
      if (p.vy > 0) { // falling
        var flutter = faceArea * 0.8;
        p.avX += (Math.random() - 0.5) * flutter * dt * 60;
        p.avY += (Math.random() - 0.5) * flutter * dt * 60;
        // Horizontal drift when face catches air
        p.vx += Math.sin(p.rotZ) * faceArea * 0.15 * dt * 60;
      }

      // Gravity
      p.vy += GRAVITY * dt * 60;

      // Wind
      p.vx += wind * dt * 60;

      // Update position
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;

      // Fade out as pieces drift off screen bottom or after a long time
      if (p.y > height - 100) {
        p.opacity = Math.max(0, (height - p.y) / 100);
      } else if (p.age > 8) {
        p.opacity = Math.max(0, 1 - (p.age - 8) / 3);
      }

      // Remove dead pieces
      if (p.y > height + 50 || p.x < -100 || p.x > width + 100 || p.opacity <= 0) {
        confetti.splice(i, 1);
      }
    }
  }

  function drawConfettiPiece(p) {
    var cosX = Math.cos(p.rotX);
    var cosY = Math.cos(p.rotY);
    var cosZ = Math.cos(p.rotZ);
    var sinZ = Math.sin(p.rotZ);

    // Perspective foreshortening: width scales with rotY, height scales with rotX
    var drawW = p.w * Math.abs(cosY);
    var drawH = p.h * Math.abs(cosX);

    // Minimum visible size
    if (drawW < 0.5) drawW = 0.5;
    if (drawH < 0.5) drawH = 0.5;

    // Determine "facing" for lighting: how much the piece faces the viewer
    var facing = Math.abs(cosX * cosY);

    // Sparkle flash
    var sparkleBoost = 0;
    if (p.sparkle) {
      p.sparklePhase += 0.1;
      var sparkleVal = Math.sin(p.sparklePhase * 3 + p.age * 12);
      if (sparkleVal > 0.85) {
        sparkleBoost = (sparkleVal - 0.85) / 0.15;
      }
    }

    // Color with lighting
    var lightFactor = 0.5 + 0.5 * facing;
    var r = Math.min(255, Math.floor(p.color.r * lightFactor + sparkleBoost * (255 - p.color.r)));
    var g = Math.min(255, Math.floor(p.color.g * lightFactor + sparkleBoost * (255 - p.color.g)));
    var b = Math.min(255, Math.floor(p.color.b * lightFactor + sparkleBoost * (255 - p.color.b)));

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.atan2(sinZ, cosZ));
    ctx.globalAlpha = p.opacity;

    // Shadow beneath the piece
    var shadowOffset = 3 + Math.max(0, p.vy * 0.3);
    ctx.fillStyle = 'rgba(0, 0, 0, ' + (0.15 * p.opacity * facing) + ')';
    ctx.fillRect(-drawW / 2 + 1.5, -drawH / 2 + shadowOffset, drawW, drawH);

    // Main piece body
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);

    // Subtle highlight on the top edge when face-on
    if (facing > 0.3 && drawH > 1.5) {
      var hlAlpha = (facing - 0.3) * 0.5 * p.opacity;
      ctx.fillStyle = 'rgba(255, 255, 255, ' + hlAlpha + ')';
      ctx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH * 0.3);
    }

    // Sparkle glow
    if (sparkleBoost > 0) {
      ctx.fillStyle = 'rgba(255, 255, 255, ' + (sparkleBoost * 0.6 * p.opacity) + ')';
      ctx.fillRect(-drawW / 2 - 1, -drawH / 2 - 1, drawW + 2, drawH + 2);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawVignette() {
    var cx = width / 2;
    var cy = height / 2;
    var maxDim = Math.max(width, height);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.2, cx, cy, maxDim * 0.85);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(0.5, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.55)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);

    // Warm tint to the vignette edges
    var warmVig = ctx.createRadialGradient(cx, cy, maxDim * 0.3, cx, cy, maxDim * 0.9);
    warmVig.addColorStop(0, 'rgba(200, 149, 108, 0)');
    warmVig.addColorStop(0.7, 'rgba(200, 149, 108, 0)');
    warmVig.addColorStop(1, 'rgba(100, 50, 30, 0.12)');
    ctx.fillStyle = warmVig;
    ctx.fillRect(0, 0, width, height);
  }

  // Ambient floating particles for atmosphere
  var ambientParticles = [];
  var NUM_AMBIENT = 40;

  function initAmbient() {
    ambientParticles = [];
    for (var i = 0; i < NUM_AMBIENT; i++) {
      ambientParticles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: randomRange(0.5, 2),
        speed: randomRange(0.1, 0.4),
        drift: randomRange(-0.2, 0.2),
        opacity: randomRange(0.05, 0.2),
        phase: Math.random() * Math.PI * 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
  }
  initAmbient();

  function updateAmbient(dt) {
    for (var i = 0; i < ambientParticles.length; i++) {
      var ap = ambientParticles[i];
      ap.y -= ap.speed * dt * 60;
      ap.x += ap.drift * dt * 60 + Math.sin(ap.phase + ap.y * 0.01) * 0.1;
      ap.phase += dt * 0.5;
      if (ap.y < -10) {
        ap.y = height + 10;
        ap.x = Math.random() * width;
      }
    }
  }

  function drawAmbient() {
    for (var i = 0; i < ambientParticles.length; i++) {
      var ap = ambientParticles[i];
      ctx.beginPath();
      ctx.arc(ap.x, ap.y, ap.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + ap.color.r + ',' + ap.color.g + ',' + ap.color.b + ',' + ap.opacity + ')';
      ctx.fill();
    }
  }

  // Animation state
  var lastTime = 0;
  var running = true;

  function render(timestamp) {
    if (!running) {
      lastTime = 0;
      requestAnimationFrame(render);
      return;
    }

    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (prefersReduced) dt = 0;

    // Clear
    ctx.clearRect(0, 0, width, height);

    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    // Subtle radial background glow
    var bgGlow = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height) * 0.5);
    bgGlow.addColorStop(0, 'rgba(60, 20, 40, 0.08)');
    bgGlow.addColorStop(1, 'rgba(10, 10, 10, 0)');
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, width, height);

    // Burst timing
    timeSinceLastBurst += dt;
    if (burstQueued || timeSinceLastBurst >= BURST_INTERVAL) {
      spawnBurst();
      timeSinceLastBurst = 0;
      burstQueued = false;
    }

    // Update
    updateConfetti(dt);
    updateAmbient(dt);

    // Draw ambient particles (behind confetti)
    drawAmbient();

    // Draw confetti — sort by Y for a subtle depth cue
    confetti.sort(function(a, b) { return a.y - b.y; });
    for (var i = 0; i < confetti.length; i++) {
      drawConfettiPiece(confetti[i]);
    }

    // Vignette overlay
    drawVignette();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // Visibility pause
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
    }
  });

  // postMessage param control
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'BURST_INTERVAL': BURST_INTERVAL = e.data.value; break;
        case 'GRAVITY': GRAVITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
