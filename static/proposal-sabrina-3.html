<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latte Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Latte Art</div>
<canvas id="canvas"></canvas>
<script>
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Latte Art â€” Espresso-inspired fluid latte art simulation
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var W, H;
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Tunable params via postMessage
  var POUR_SPEED = 1.0;
  var CREAM_DENSITY = 0.7;

  var running = true;
  var time = 0;
  var lastTime = 0;

  // Simulation grid for cream density field
  var GS = 200; // grid size â€” good balance of detail and performance
  var grid = new Float32Array(GS * GS);
  var gridNext = new Float32Array(GS * GS);
  var velX = new Float32Array(GS * GS);
  var velY = new Float32Array(GS * GS);

  // Pattern sequencing: rosetta -> tulip -> heart -> repeat
  var patternIndex = 0;
  var POUR_DURATION = 9.0;
  var SETTLE_DURATION = 3.5;
  var FADE_DURATION = 2.5;
  var phase = 'pour';
  var phaseTime = 0;

  // Cream particles for fine detail on top of grid rendering
  var particles = [];
  var MAX_PARTICLES = 4000;

  // Cup geometry (recomputed on resize)
  var cupCX, cupCY, cupR;

  // Off-screen canvas for grid rendering
  var offCanvas = document.createElement('canvas');
  offCanvas.width = GS;
  offCanvas.height = GS;
  var offCtx = offCanvas.getContext('2d');
  var imgData = offCtx.createImageData(GS, GS);
  var pixels = imgData.data;

  // Color LUT for cream density -> RGBA (precomputed for performance)
  var LUT_SIZE = 256;
  var colorLUT_R = new Uint8Array(LUT_SIZE);
  var colorLUT_G = new Uint8Array(LUT_SIZE);
  var colorLUT_B = new Uint8Array(LUT_SIZE);
  var colorLUT_A = new Uint8Array(LUT_SIZE);

  function buildColorLUT() {
    for (var i = 0; i < LUT_SIZE; i++) {
      var v = i / (LUT_SIZE - 1); // 0..1
      var r, g, b, a;
      if (v < 0.15) {
        // Very thin cream â€” barely visible caramel tint
        var t2 = v / 0.15;
        r = 26 + t2 * 80;
        g = 14 + t2 * 45;
        b = 8 + t2 * 25;
        a = t2 * 120;
      } else if (v < 0.35) {
        // Light caramel
        var t2 = (v - 0.15) / 0.2;
        r = 106 + t2 * 60;
        g = 59 + t2 * 55;
        b = 33 + t2 * 40;
        a = 120 + t2 * 60;
      } else if (v < 0.6) {
        // Rich caramel -> light cream
        var t2 = (v - 0.35) / 0.25;
        r = 166 + t2 * 45;
        g = 114 + t2 * 55;
        b = 73 + t2 * 50;
        a = 180 + t2 * 40;
      } else if (v < 0.85) {
        // Light cream
        var t2 = (v - 0.6) / 0.25;
        r = 211 + t2 * 25;
        g = 169 + t2 * 40;
        b = 123 + t2 * 50;
        a = 220 + t2 * 20;
      } else {
        // Pure cream white
        var t2 = (v - 0.85) / 0.15;
        r = 236 + t2 * 9;
        g = 209 + t2 * 21;
        b = 173 + t2 * 35;
        a = 240 + t2 * 15;
      }
      colorLUT_R[i] = Math.min(255, Math.round(r));
      colorLUT_G[i] = Math.min(255, Math.round(g));
      colorLUT_B[i] = Math.min(255, Math.round(b));
      colorLUT_A[i] = Math.min(255, Math.round(a));
    }
  }
  buildColorLUT();

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cupCX = W * 0.5;
    cupCY = H * 0.5;
    cupR = Math.min(W, H) * 0.38;
  }
  window.addEventListener('resize', resize);
  resize();

  function resetSim() {
    for (var i = 0; i < GS * GS; i++) {
      grid[i] = 0;
      gridNext[i] = 0;
      velX[i] = 0;
      velY[i] = 0;
    }
    particles.length = 0;
    phaseTime = 0;
    phase = 'pour';
  }
  resetSim();

  // Precompute cup mask (1 = inside cup, 0 = outside)
  var cupMask = new Uint8Array(GS * GS);
  function buildCupMask() {
    var half = GS * 0.5;
    var rSq = 0.46 * GS; // radius in grid cells
    rSq = rSq * rSq;
    for (var y = 0; y < GS; y++) {
      for (var x = 0; x < GS; x++) {
        var dx = x - half;
        var dy = y - half;
        cupMask[y * GS + x] = (dx * dx + dy * dy < rSq) ? 1 : 0;
      }
    }
  }
  buildCupMask();

  // Grid <-> world coordinate helpers
  function g2wX(gx) { return (gx / GS) * cupR * 2 + (cupCX - cupR); }
  function g2wY(gy) { return (gy / GS) * cupR * 2 + (cupCY - cupR); }

  // â”€â”€ Pour point trajectories per pattern â”€â”€

  function getPourPoint(t, pat) {
    var prog = Math.min(t / POUR_DURATION, 1.0);
    var cx = GS * 0.5;
    var cy = GS * 0.5;
    var px, py;

    if (pat === 0) {
      // â”€ Rosetta â”€
      // Side-to-side sweep that accelerates while pulling backward
      var sweepFreq = (2.5 + prog * 6.0) * POUR_SPEED;
      var sweepAmp = 12 + prog * 28;
      px = cx + Math.sin(t * sweepFreq) * sweepAmp;
      // Pull from lower center toward upper center
      py = cy + 30 - prog * 55;
    } else if (pat === 1) {
      // â”€ Tulip â”€
      // Series of discrete pushes moving upward; each push widens then narrows
      var numPushes = 5;
      var pushPhase = prog * numPushes;
      var pushFrac = pushPhase - Math.floor(pushPhase);
      var pushEnvelope = Math.sin(pushFrac * Math.PI);
      var sweepAmp2 = 6 + pushEnvelope * 14;
      px = cx + Math.sin(t * 3.5 * POUR_SPEED) * sweepAmp2;
      py = cy + 35 - prog * 65 + pushEnvelope * 5;
    } else {
      // â”€ Heart â”€
      // Two lobes at top, drawn by two arcs, then pull down to a point
      if (prog < 0.6) {
        // Draw two lobes
        var lobeT = prog / 0.6;
        var angle = t * 2.0 * POUR_SPEED;
        var lobeR = 22 * (0.5 + 0.5 * Math.sin(lobeT * Math.PI));
        px = cx + Math.sin(angle) * lobeR;
        py = cy - 8 + Math.cos(angle) * lobeR * 0.7;
      } else {
        // Pull down to point
        var pointT = (prog - 0.6) / 0.4;
        var narrowing = 1 - pointT;
        px = cx + Math.sin(t * 2.0 * POUR_SPEED) * 8 * narrowing;
        py = cy - 8 + pointT * 35;
      }
    }

    return { x: px, y: py };
  }

  // â”€â”€ Velocity field update â”€â”€

  function updateVelocity(dt, pourPt) {
    var cx = GS * 0.5;
    var cy = GS * 0.5;
    var maxR = GS * 0.44;
    var invMaxR = 1.0 / maxR;
    var isPour = (phase === 'pour');

    for (var y = 1; y < GS - 1; y++) {
      for (var x = 1; x < GS - 1; x++) {
        var idx = y * GS + x;
        if (!cupMask[idx]) continue;

        var dx = x - cx;
        var dy = y - cy;
        var dist = Math.sqrt(dx * dx + dy * dy);

        // Gentle circular stirring â€” stronger near centre
        if (dist > 0.5 && dist < maxR) {
          var rotStr = 0.12 * (1 - dist * invMaxR);
          velX[idx] += (-dy / dist) * rotStr * dt;
          velY[idx] += (dx / dist) * rotStr * dt;
        }

        // Radial push from pour point
        if (isPour) {
          var pdx = x - pourPt.x;
          var pdy = y - pourPt.y;
          var pDist = Math.sqrt(pdx * pdx + pdy * pdy);
          if (pDist > 0.5 && pDist < 45) {
            var pushStr = 2.5 * POUR_SPEED / (1 + pDist * 0.4);
            velX[idx] += (pdx / pDist) * pushStr * dt;
            velY[idx] += (pdy / pDist) * pushStr * dt;
          }
        }

        // Damping
        var damp = 1 - 1.8 * dt;
        velX[idx] *= damp;
        velY[idx] *= damp;
      }
    }
  }

  // â”€â”€ Semi-Lagrangian advection + diffusion â”€â”€

  function advect(dt) {
    var scale = dt * 7;
    var gsm2 = GS - 2;
    var i, idx, srcX, srcY, ix, iy, fx, fy, i00, i10, i01, i11;

    // Clear gridNext
    for (i = 0; i < GS * GS; i++) gridNext[i] = 0;

    for (var y = 1; y < GS - 1; y++) {
      for (var x = 1; x < GS - 1; x++) {
        idx = y * GS + x;
        if (!cupMask[idx]) continue;

        // Trace backwards
        srcX = x - velX[idx] * scale;
        srcY = y - velY[idx] * scale;

        // Clamp to grid interior
        if (srcX < 1) srcX = 1; else if (srcX > gsm2) srcX = gsm2;
        if (srcY < 1) srcY = 1; else if (srcY > gsm2) srcY = gsm2;

        // Bilinear sample
        ix = srcX | 0; // fast floor
        iy = srcY | 0;
        fx = srcX - ix;
        fy = srcY - iy;

        i00 = iy * GS + ix;
        i10 = i00 + 1;
        i01 = i00 + GS;
        i11 = i01 + 1;

        gridNext[idx] = grid[i00] * (1 - fx) * (1 - fy)
                      + grid[i10] * fx * (1 - fy)
                      + grid[i01] * (1 - fx) * fy
                      + grid[i11] * fx * fy;
      }
    }

    // Diffusion (single-pass Jacobi-like blur for organic softness)
    var diff = 0.06;
    var keep = 1 - diff;
    var quarter = diff * 0.25;
    for (var y = 1; y < GS - 1; y++) {
      for (var x = 1; x < GS - 1; x++) {
        idx = y * GS + x;
        if (!cupMask[idx]) continue;
        var nb = gridNext[idx - GS] + gridNext[idx + GS] + gridNext[idx - 1] + gridNext[idx + 1];
        grid[idx] = gridNext[idx] * keep + nb * quarter;
      }
    }
  }

  // â”€â”€ Inject cream at pour point â”€â”€

  function pourCream(pt, dt) {
    var radius = 3.5 + CREAM_DENSITY * 4;
    var strength = CREAM_DENSITY * 0.7 * POUR_SPEED;
    var ri = Math.ceil(radius);

    for (var dy = -ri; dy <= ri; dy++) {
      var gy = Math.round(pt.y + dy);
      if (gy < 0 || gy >= GS) continue;
      for (var dx = -ri; dx <= ri; dx++) {
        var gx = Math.round(pt.x + dx);
        if (gx < 0 || gx >= GS) continue;
        var idx = gy * GS + gx;
        if (!cupMask[idx]) continue;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d > radius) continue;
        var falloff = 1 - d / radius;
        falloff *= falloff;
        grid[idx] = Math.min(1.0, grid[idx] + strength * falloff * dt * 5);
      }
    }

    // Spawn visual particles for fine-grain detail
    if (particles.length < MAX_PARTICLES) {
      var n = Math.ceil(8 * CREAM_DENSITY * POUR_SPEED);
      for (var i = 0; i < n; i++) {
        var a = Math.random() * 6.2832;
        var r = Math.random() * radius * 0.5;
        particles.push({
          gx: pt.x + Math.cos(a) * r,
          gy: pt.y + Math.sin(a) * r,
          age: 0,
          maxAge: 25 + Math.random() * 35,
          size: 1.0 + Math.random() * 2.5,
          alpha: 0.3 + Math.random() * 0.4
        });
      }
    }
  }

  // â”€â”€ Update particles (advect with velocity field) â”€â”€

  function updateParticles(dt) {
    var adv = dt * 4;
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.age += dt;
      if (p.age > p.maxAge) { particles.splice(i, 1); continue; }

      var gix = p.gx | 0;
      var giy = p.gy | 0;
      if (gix < 1 || gix >= GS - 1 || giy < 1 || giy >= GS - 1) {
        particles.splice(i, 1);
        continue;
      }
      var idx = giy * GS + gix;
      if (!cupMask[idx]) { particles.splice(i, 1); continue; }

      p.gx += velX[idx] * adv + (Math.random() - 0.5) * 0.12;
      p.gy += velY[idx] * adv + (Math.random() - 0.5) * 0.12;
    }
  }

  // â”€â”€ Render â”€â”€

  function renderScene() {
    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    var fadeAlpha = phase === 'fade' ? Math.max(0, 1 - phaseTime / FADE_DURATION) : 1;

    // â”€â”€ Draw coffee surface via ImageData on offscreen canvas â”€â”€

    // Coffee base color (in the cup)
    var coffeeR = 22, coffeeG = 12, coffeeB = 7;
    var lutIdx, ci;

    for (var y = 0; y < GS; y++) {
      for (var x = 0; x < GS; x++) {
        ci = (y * GS + x) * 4;
        var idx = y * GS + x;
        if (!cupMask[idx]) {
          pixels[ci] = 10; pixels[ci + 1] = 10; pixels[ci + 2] = 10; pixels[ci + 3] = 0;
          continue;
        }

        var val = grid[idx] * fadeAlpha;
        if (val < 0.005) {
          // Pure coffee â€” slight radial gradient for depth
          var dx2 = (x / GS - 0.5);
          var dy2 = (y / GS - 0.5);
          var rdist = Math.sqrt(dx2 * dx2 + dy2 * dy2) * 2.2;
          var shade = Math.max(0, 1 - rdist * 0.5);
          pixels[ci]     = coffeeR + shade * 12 | 0;
          pixels[ci + 1] = coffeeG + shade * 6 | 0;
          pixels[ci + 2] = coffeeB + shade * 4 | 0;
          pixels[ci + 3] = 255;
        } else {
          // Cream present â€” look up in LUT
          lutIdx = Math.min(LUT_SIZE - 1, val * (LUT_SIZE - 1) | 0);
          var cr = colorLUT_R[lutIdx];
          var cg = colorLUT_G[lutIdx];
          var cb = colorLUT_B[lutIdx];
          var ca = colorLUT_A[lutIdx];

          // Blend cream over coffee
          var af = ca / 255;
          pixels[ci]     = coffeeR * (1 - af) + cr * af | 0;
          pixels[ci + 1] = coffeeG * (1 - af) + cg * af | 0;
          pixels[ci + 2] = coffeeB * (1 - af) + cb * af | 0;
          pixels[ci + 3] = 255;
        }
      }
    }

    offCtx.putImageData(imgData, 0, 0);

    // Draw the offscreen grid onto main canvas, scaled to cup circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(cupCX, cupCY, cupR, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();

    // imageSmoothingEnabled for nice upscale
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(offCanvas, cupCX - cupR, cupCY - cupR, cupR * 2, cupR * 2);

    // â”€â”€ Draw particles for fine cream detail â”€â”€
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var ageRatio = p.age / p.maxAge;
      var pa = p.alpha * (1 - ageRatio * 0.6) * fadeAlpha;
      if (pa < 0.02) continue;

      var wx = g2wX(p.gx);
      var wy = g2wY(p.gy);

      // Sample local cream density for particle colour brightness
      var gix2 = p.gx | 0;
      var giy2 = p.gy | 0;
      var localVal = 0.5;
      if (gix2 >= 0 && gix2 < GS && giy2 >= 0 && giy2 < GS) {
        localVal = 0.4 + grid[giy2 * GS + gix2] * 0.6;
      }
      var pr = 180 + localVal * 65 | 0;
      var pg = 150 + localVal * 70 | 0;
      var pb = 115 + localVal * 80 | 0;

      ctx.beginPath();
      ctx.arc(wx, wy, p.size * (0.7 + ageRatio * 0.4), 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + pr + ',' + pg + ',' + pb + ',' + pa.toFixed(3) + ')';
      ctx.fill();
    }

    // â”€â”€ Pour stream visual â”€â”€
    if (phase === 'pour') {
      var pp = getPourPoint(phaseTime, patternIndex);
      var pwx = g2wX(pp.x);
      var pwy = g2wY(pp.y);

      // Outer glow
      var sg = ctx.createRadialGradient(pwx, pwy, 0, pwx, pwy, 14);
      sg.addColorStop(0, 'rgba(245, 230, 208, 0.65)');
      sg.addColorStop(0.35, 'rgba(220, 190, 155, 0.25)');
      sg.addColorStop(1, 'rgba(200, 149, 108, 0)');
      ctx.beginPath();
      ctx.arc(pwx, pwy, 14, 0, Math.PI * 2);
      ctx.fillStyle = sg;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(pwx, pwy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(250, 240, 225, 0.9)';
      ctx.fill();
    }

    ctx.restore();

    // â”€â”€ Cup rim â”€â”€
    ctx.beginPath();
    ctx.arc(cupCX, cupCY, cupR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 149, 108, 0.18)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Inner rim highlight
    ctx.beginPath();
    ctx.arc(cupCX, cupCY, cupR - 3, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 149, 108, 0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Saucer/shadow hint
    var saucerG = ctx.createRadialGradient(cupCX, cupCY, cupR, cupCX, cupCY, cupR + 25);
    saucerG.addColorStop(0, 'rgba(200, 149, 108, 0.035)');
    saucerG.addColorStop(1, 'rgba(10, 10, 10, 0)');
    ctx.beginPath();
    ctx.arc(cupCX, cupCY, cupR + 25, 0, Math.PI * 2);
    ctx.fillStyle = saucerG;
    ctx.fill();

    // Vignette
    var vg = ctx.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.28, W * 0.5, H * 0.5, Math.max(W, H) * 0.72);
    vg.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vg.addColorStop(1, 'rgba(10, 10, 10, 0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // â”€â”€ Main loop â”€â”€

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }

    if (prefersReduced) {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
      ctx.beginPath();
      ctx.arc(cupCX, cupCY, cupR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200, 149, 108, 0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();
      requestAnimationFrame(render);
      return;
    }

    var dt = lastTime === 0 ? 0.016 : Math.min((now - lastTime) * 0.001, 0.05);
    lastTime = now;
    time += dt;
    phaseTime += dt;

    // Phase transitions
    if (phase === 'pour' && phaseTime >= POUR_DURATION) {
      phase = 'settle';
      phaseTime = 0;
    } else if (phase === 'settle' && phaseTime >= SETTLE_DURATION) {
      phase = 'fade';
      phaseTime = 0;
    } else if (phase === 'fade' && phaseTime >= FADE_DURATION) {
      patternIndex = (patternIndex + 1) % 3;
      resetSim();
      lastTime = now;
    }

    // Simulation step
    var pourPt = getPourPoint(phaseTime, patternIndex);

    updateVelocity(dt, pourPt);

    if (phase === 'pour') {
      pourCream(pourPt, dt);
    }

    advect(dt);
    updateParticles(dt);

    renderScene();
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // â”€â”€ Visibility pause â”€â”€
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(render);
    }
  });

  // â”€â”€ External parameter control â”€â”€
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'POUR_SPEED': POUR_SPEED = e.data.value; break;
        case 'CREAM_DENSITY': CREAM_DENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
