<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Palms</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Electric Palms</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Electric Palms — Tropical palm silhouettes against pulsating amber sky
// WebGL fragment shader with procedural SDF palm fronds
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // ── Tunable parameters ──
  var pulseSpeedVal = 0.5;
  var frondDensityVal = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_pulseSpeed;',
    'uniform float u_frondDensity;',
    '',
    '#define PI 3.14159265359',
    '',
    '// ── Hash / noise ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  for (int i = 0; i < 4; i++) {',
    '    v += a * noise(p);',
    '    p *= 2.1;',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── 2D rotation ──',
    'mat2 rot(float a) {',
    '  float c = cos(a), s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── SDF: line segment distance ──',
    'float sdSegment(vec2 p, vec2 a, vec2 b) {',
    '  vec2 pa = p - a, ba = b - a;',
    '  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);',
    '  return length(pa - ba * h);',
    '}',
    '',
    '// ── Helper: get spine point at parameter t along frond ──',
    'vec2 spinePoint(float t, float curvature, float frondLen, float sway) {',
    '  float angle = curvature * t + 0.6 * t * t + sway * t * t;',
    '  float len = frondLen * t;',
    '  return vec2(sin(angle) * len, cos(angle) * len);',
    '}',
    '',
    '// ── Single palm frond ──',
    '// Curved spine with pinnate leaf blades branching off both sides',
    'float palmFrond(vec2 p, float curvature, float frondLen, float width, float windPhase) {',
    '  float d = 1e5;',
    '',
    '  // Wind sway',
    '  float sw = sin(u_time * 0.35 * u_pulseSpeed + windPhase) * 0.1',
    '           + sin(u_time * 0.2 * u_pulseSpeed + windPhase * 1.3) * 0.05;',
    '',
    '  // Single loop: spine segments + leaf blades at each point',
    '  for (int i = 1; i <= 14; i++) {',
    '    float t = float(i) / 14.0;',
    '    float tPrev = float(i - 1) / 14.0;',
    '',
    '    vec2 cur = spinePoint(t, curvature, frondLen, sw);',
    '    vec2 prev = spinePoint(tPrev, curvature, frondLen, sw);',
    '',
    '    // Central spine (rachis)',
    '    float stemW = mix(0.007, 0.0015, t);',
    '    d = min(d, sdSegment(p, prev, cur) - stemW);',
    '',
    '    // Leaf blades from segment 2 onward',
    '    if (i >= 2) {',
    '      // Spine direction and perpendicular',
    '      vec2 dir = normalize(cur - prev);',
    '      vec2 perp = vec2(-dir.y, dir.x);',
    '',
    '      // Blade profile: fast ramp up, slow taper to tip',
    '      float bladeEnv = smoothstep(0.05, 0.2, t) * smoothstep(1.0, 0.2, t);',
    '      float bladeLen = width * 6.5 * bladeEnv;',
    '',
    '      // Blade width: proportional, slightly wider for better overlap',
    '      float bw = bladeLen * 0.14;',
    '',
    '      // Natural droop toward tip',
    '      float droop = t * 0.2;',
    '',
    '      // Right blade — angled outward',
    '      vec2 tipR = cur + (perp * 0.7 + dir * 0.5) * bladeLen - vec2(0.0, droop * bladeLen);',
    '      d = min(d, sdSegment(p, cur, tipR) - bw);',
    '',
    '      // Left blade',
    '      vec2 tipL = cur + (-perp * 0.7 + dir * 0.5) * bladeLen - vec2(0.0, droop * bladeLen);',
    '      d = min(d, sdSegment(p, cur, tipL) - bw);',
    '    }',
    '  }',
    '',
    '  return d;',
    '}',
    '',
    '// ── Complete palm crown: multiple fronds radiating from a point ──',
    'float palmCrown(vec2 p, vec2 origin, float scale, float baseAngle, float windOffset) {',
    '  vec2 lp = (p - origin) / scale;',
    '  float d = 1e5;',
    '',
    '  // Frond count driven by density',
    '  int fronds = int(5.0 + u_frondDensity * 3.0);',
    '',
    '  for (int i = 0; i < 10; i++) {',
    '    if (i >= fronds) break;',
    '    float fi = float(i);',
    '',
    '    // Distribute fronds in a fan pattern, mostly upward/outward',
    '    float spreadAngle = (fi / float(fronds) - 0.5) * PI * 1.6;',
    '    spreadAngle += sin(fi * 2.7 + 0.5) * 0.25;',
    '    float totalAngle = baseAngle + spreadAngle;',
    '',
    '    // Rotate point into frond-local space',
    '    vec2 rp = rot(totalAngle) * lp;',
    '',
    '    // Vary each frond — long, arching, tropical',
    '    float curve = 0.6 + sin(fi * 1.7) * 0.3;',
    '    float len = 0.50 + sin(fi * 2.9 + 1.0) * 0.1;',
    '    float w = 0.028 + sin(fi * 3.1) * 0.005;',
    '    float wind = windOffset + fi * 1.7;',
    '',
    '    float fd = palmFrond(rp, curve, len, w, wind);',
    '    d = min(d, fd);',
    '  }',
    '',
    '  // Simple trunk below the crown',
    '  vec2 trunkBase = vec2(0.0, -0.15);',
    '  vec2 trunkTop = vec2(0.0, 0.0);',
    '  float trunkDist = sdSegment(lp, trunkBase, trunkTop) - 0.012;',
    '  d = min(d, trunkDist);',
    '',
    '  return d * scale;',
    '}',
    '',
    '// ── Sky background ──',
    'vec3 skyGlow(vec2 uv, float t) {',
    '  // Glow center: low in frame, slowly drifting',
    '  vec2 glowCenter = vec2(',
    '    sin(t * 0.08 * u_pulseSpeed) * 0.15,',
    '    -0.15 + sin(t * 0.12 * u_pulseSpeed) * 0.08',
    '  );',
    '  float dist = length(uv - glowCenter);',
    '',
    '  // Multiple pulse frequencies for organic feel',
    '  float pulse = 0.5 + 0.5 * sin(t * 0.4 * u_pulseSpeed);',
    '  float pulse2 = 0.5 + 0.5 * sin(t * 0.27 * u_pulseSpeed + 1.5);',
    '  float pulse3 = 0.5 + 0.5 * sin(t * 0.18 * u_pulseSpeed + 3.0);',
    '',
    '  // Dark sky base — nearly black at top',
    '  vec3 skyTop = vec3(0.025, 0.018, 0.012);',
    '  vec3 skyMid = vec3(0.12, 0.07, 0.035);',
    '  vec3 skyBright = vec3(0.45, 0.28, 0.14);',
    '',
    '  // Vertical gradient: dark at top, warmer below',
    '  float vertGrad = smoothstep(0.6, -0.4, uv.y);',
    '  vec3 sky = mix(skyTop, skyMid, vertGrad);',
    '',
    '  // Radial glow from center',
    '  float radGlow = exp(-dist * dist * 2.2);',
    '  sky = mix(sky, skyBright, radGlow * (0.4 + pulse * 0.35));',
    '',
    '  // Secondary glow — drifting accent',
    '  vec2 glow2 = vec2(-0.3 + sin(t * 0.06) * 0.2, 0.1);',
    '  float dist2 = length(uv - glow2);',
    '  sky += vec3(0.10, 0.06, 0.03) * exp(-dist2 * dist2 * 3.0) * pulse3;',
    '',
    '  // Atmospheric noise texture',
    '  float skyNoise = fbm(uv * 3.0 + t * 0.03 * u_pulseSpeed);',
    '  sky += vec3(0.04, 0.025, 0.012) * skyNoise * (0.4 + pulse2 * 0.3);',
    '',
    '  // Horizon warmth band',
    '  float horizon = exp(-pow((uv.y + 0.1) * 2.5, 2.0));',
    '  sky += vec3(0.15, 0.09, 0.04) * horizon * (0.5 + pulse * 0.25);',
    '',
    '  return sky;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '  float aspect = u_res.x / u_res.y;',
    '',
    '  // ── Sky ──',
    '  vec3 col = skyGlow(uv, t);',
    '',
    '  // ── Palm trees ──',
    '  float allPalms = 1e5;',
    '',
    '  // Left palm — large, reaching right',
    '  float p0 = palmCrown(uv, vec2(-0.5, -0.55), 1.3, 0.35, 0.0);',
    '  allPalms = min(allPalms, p0);',
    '',
    '  // Right palm — counterbalance, reaching left',
    '  float p1 = palmCrown(uv, vec2(0.55, -0.6), 1.15, -0.35, 2.0);',
    '  allPalms = min(allPalms, p1);',
    '',
    '  // Center-back palm — smaller, lower, peeking up between the two',
    '  float p2 = palmCrown(uv, vec2(0.0, -0.8), 0.8, 0.05, 4.0);',
    '  allPalms = min(allPalms, p2);',
    '',
    '  // Extra palms based on density',
    '  if (u_frondDensity > 0.5) {',
    '    float p3 = palmCrown(uv, vec2(-0.95, -0.7), 0.9, 0.5, 1.5);',
    '    allPalms = min(allPalms, p3);',
    '  }',
    '',
    '  if (u_frondDensity > 0.8) {',
    '    float p4 = palmCrown(uv, vec2(0.9, -0.75), 0.8, -0.5, 3.5);',
    '    allPalms = min(allPalms, p4);',
    '  }',
    '',
    '  // ── Pulse values for rim lighting ──',
    '  float pulse = 0.5 + 0.5 * sin(t * 0.4 * u_pulseSpeed);',
    '  float pulse2 = 0.5 + 0.5 * sin(t * 0.27 * u_pulseSpeed + 1.5);',
    '',
    '  // ── Rim lighting: backlight glow around silhouette edges ──',
    '',
    '  // Wide soft halo',
    '  float halo = smoothstep(0.06, 0.0, allPalms) * smoothstep(-0.015, 0.0, allPalms);',
    '',
    '  // Medium rim glow',
    '  float rimOuter = smoothstep(0.02, 0.0, allPalms) * smoothstep(-0.02, 0.0, allPalms);',
    '',
    '  // Thin hot edge',
    '  float rimHot = smoothstep(0.006, 0.0, allPalms) * smoothstep(-0.006, 0.0, allPalms);',
    '',
    '  // Colors',
    '  vec3 haloColor = vec3(0.30, 0.19, 0.10);',
    '  vec3 rimColor = vec3(0.784, 0.584, 0.424);',
    '  vec3 hotColor = vec3(1.0, 0.784, 0.510);',
    '',
    '  // Pulsing intensity',
    '  float rimPulse = 0.65 + pulse * 0.45;',
    '  float hotPulse = 0.4 + pulse2 * 0.8;',
    '',
    '  col += haloColor * halo * rimPulse * 0.7;',
    '  col += rimColor * rimOuter * rimPulse * 1.0;',
    '  col += hotColor * rimHot * hotPulse * 1.5;',
    '',
    '  // ── Palm silhouette: near-black ──',
    '  float silhouette = 1.0 - smoothstep(-0.002, 0.002, allPalms);',
    '  vec3 palmColor = vec3(0.020, 0.016, 0.012);',
    '',
    '  // Subtle internal noise for texture',
    '  palmColor += vec3(fbm(uv * 20.0) * 0.012);',
    '',
    '  col = mix(col, palmColor, silhouette);',
    '',
    '  // ── Vignette ──',
    '  float vd = length(uv);',
    '  float vignette = 1.0 - smoothstep(0.5, 1.4, vd);',
    '  col *= 0.55 + vignette * 0.45;',
    '',
    '  // ── Tone curve ──',
    '  col = pow(max(col, vec3(0.0)), vec3(0.95, 1.0, 1.08));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  // ── Compile & link ──
  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  // Full-screen triangle
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // Uniforms
  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uPulseSpeed = gl.getUniformLocation(prog, 'u_pulseSpeed');
  var uFrondDensity = gl.getUniformLocation(prog, 'u_frondDensity');

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  // ── Animation ──
  var paused = false;

  function render(now) {
    if (!paused) {
      resize();
      gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uPulseSpeed, pulseSpeedVal);
      gl.uniform1f(uFrondDensity, frondDensityVal);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility pause ──
  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
  });

  // ── PostMessage API ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'PULSE_SPEED': pulseSpeedVal = e.data.value; break;
        case 'FROND_DENSITY': frondDensityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
