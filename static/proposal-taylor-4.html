<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Snow Globe</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;

  var width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Tunable parameters ──
  var TURBULENCE = 0.5;
  var PARTICLE_COUNT = 250;

  // ── Globe geometry ──
  function getGlobe() {
    var cx = width / 2;
    var cy = height * 0.46;
    var radius = Math.min(width, height) * 0.34;
    return { cx: cx, cy: cy, radius: radius };
  }

  // ── Particles ──
  var particles = [];

  function createParticle(globe, scattered) {
    var angle = Math.random() * Math.PI * 2;
    var dist = Math.random() * globe.radius * 0.92;
    // If scattered, fill the whole globe; otherwise start near bottom
    var px, py;
    if (scattered) {
      px = globe.cx + Math.cos(angle) * dist;
      py = globe.cy + Math.sin(angle) * dist;
    } else {
      // Cluster near bottom third
      px = globe.cx + (Math.random() - 0.5) * globe.radius * 1.6;
      py = globe.cy + globe.radius * (0.3 + Math.random() * 0.6);
      // Clamp inside sphere
      var dx = px - globe.cx;
      var dy = py - globe.cy;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d > globe.radius * 0.92) {
        px = globe.cx + (dx / d) * globe.radius * 0.9;
        py = globe.cy + (dy / d) * globe.radius * 0.9;
      }
    }

    // Size distribution: mostly small, some medium
    var sizeRoll = Math.random();
    var size;
    if (sizeRoll < 0.5) {
      size = 1.5 + Math.random() * 1.0;
    } else if (sizeRoll < 0.85) {
      size = 2.5 + Math.random() * 1.5;
    } else {
      size = 4.0 + Math.random() * 1.5;
    }

    // Color variant: amber, gold, bright gold
    var colorRoll = Math.random();
    var r, g, b;
    if (colorRoll < 0.4) {
      r = 200; g = 149; b = 108; // amber
    } else if (colorRoll < 0.75) {
      r = 230; g = 190; b = 130; // gold
    } else {
      r = 255; g = 220; b = 160; // bright gold
    }

    return {
      x: px,
      y: py,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: size * _pad,
      r: r,
      g: g,
      b: b,
      baseAlpha: 0.3 + Math.random() * 0.5,
      // Twinkle / sparkle
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: 1.5 + Math.random() * 3.0,
      twinkleAmp: 0.2 + Math.random() * 0.4,
      // Glow radius multiplier
      glowMult: 1.5 + Math.random() * 2.0,
      // Depth factor (affects parallax in convection)
      depth: 0.5 + Math.random() * 0.5
    };
  }

  function initParticles() {
    var globe = getGlobe();
    particles = [];
    var count = Math.min(Math.max(Math.round(PARTICLE_COUNT), 100), 500);
    for (var i = 0; i < count; i++) {
      particles.push(createParticle(globe, true));
    }
  }

  initParticles();

  // ── Shake / turbulence state ──
  var shakeEnergy = 0;       // current shake energy (decays over time)
  var shakeTimer = 0;        // timer until next auto-shake
  var shakeInterval = 6.0;   // seconds between auto-shakes
  var nextShakeTime = 4.0 + Math.random() * 4.0;

  // ── Convection flow field ──
  // Returns a velocity vector for a point inside the globe representing
  // slow circular convection currents
  function convectionFlow(x, y, globe, time) {
    var dx = (x - globe.cx) / globe.radius;
    var dy = (y - globe.cy) / globe.radius;

    // Primary convection: two counter-rotating cells side by side
    var leftCell = dx < 0 ? 1 : -1;
    // Tangential flow around cells
    var flowStrength = 0.15;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var norm = dist > 0.01 ? 1 / dist : 0;

    // Create two toroidal convection cells
    var cellCenterX = leftCell * 0.3;
    var cellDx = dx - cellCenterX;
    var cellDy = dy;
    var cellDist = Math.sqrt(cellDx * cellDx + cellDy * cellDy);

    // Tangential velocity (perpendicular to radius from cell center)
    var tangentX = -cellDy * leftCell;
    var tangentY = cellDx * leftCell;
    var tangentNorm = Math.sqrt(tangentX * tangentX + tangentY * tangentY);
    if (tangentNorm > 0.01) {
      tangentX /= tangentNorm;
      tangentY /= tangentNorm;
    }

    // Strength falls off at center and edge of cell
    var cellStrength = cellDist * (1 - cellDist * 0.8);
    cellStrength = Math.max(0, cellStrength);

    // Add slow time variation
    var timeWobble = Math.sin(time * 0.2) * 0.3;
    var fx = tangentX * cellStrength * flowStrength * (1 + timeWobble);
    var fy = tangentY * cellStrength * flowStrength * (1 + timeWobble);

    // Secondary: gentle overall rotation that shifts over time
    var rotAngle = time * 0.05;
    var rotStrength = 0.03;
    fx += (-dy * Math.cos(rotAngle) - dx * Math.sin(rotAngle)) * rotStrength;
    fy += (dx * Math.cos(rotAngle) - dy * Math.sin(rotAngle)) * rotStrength;

    return { x: fx * globe.radius, y: fy * globe.radius };
  }

  // ── Update particles ──
  function updateParticles(dt, time, globe) {
    var gravity = 12.0;       // pixels/s^2 downward
    var drag = 0.97;          // velocity damping per frame
    var turbMult = TURBULENCE;

    // Adjust particle count if changed
    var targetCount = Math.min(Math.max(Math.round(PARTICLE_COUNT), 100), 500);
    while (particles.length < targetCount) {
      particles.push(createParticle(globe, true));
    }
    while (particles.length > targetCount) {
      particles.pop();
    }

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Gravity (settling down)
      p.vy += gravity * dt;

      // Convection currents
      var flow = convectionFlow(p.x, p.y, globe, time);
      var convStrength = 0.8 * p.depth;
      p.vx += flow.x * convStrength * dt;
      p.vy += flow.y * convStrength * dt;

      // Shake turbulence: random impulses when shake energy is high
      if (shakeEnergy > 0.01) {
        var turbForce = shakeEnergy * turbMult * 80;
        // Use noise-like random per particle per frame
        var noiseAngle = Math.sin(p.twinklePhase * 7.3 + time * 5.1 + i * 0.73) * Math.PI * 2;
        var noiseAngle2 = Math.cos(p.twinklePhase * 3.1 + time * 3.7 + i * 1.31) * Math.PI * 2;
        p.vx += Math.cos(noiseAngle) * turbForce * dt * (0.5 + Math.random() * 0.5);
        p.vy += Math.sin(noiseAngle2) * turbForce * dt * (0.5 + Math.random() * 0.5) - turbForce * 0.5 * dt;
      }

      // Apply drag
      p.vx *= Math.pow(drag, dt * 60);
      p.vy *= Math.pow(drag, dt * 60);

      // Clamp max velocity
      var maxVel = 200;
      var vel = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (vel > maxVel) {
        p.vx = (p.vx / vel) * maxVel;
        p.vy = (p.vy / vel) * maxVel;
      }

      // Move
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // Bounce off globe interior
      var dx = p.x - globe.cx;
      var dy = p.y - globe.cy;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var innerRadius = globe.radius * 0.93;

      if (dist > innerRadius) {
        // Push back inside
        var nx = dx / dist;
        var ny = dy / dist;
        p.x = globe.cx + nx * innerRadius;
        p.y = globe.cy + ny * innerRadius;

        // Reflect velocity
        var dotVN = p.vx * nx + p.vy * ny;
        p.vx -= 2 * dotVN * nx * 0.4; // damped bounce
        p.vy -= 2 * dotVN * ny * 0.4;
        // Add slight tangential slide
        p.vx += -ny * dotVN * 0.1;
        p.vy += nx * dotVN * 0.1;
      }

      // Update twinkle
      p.twinklePhase += p.twinkleSpeed * dt;
    }
  }

  // ── Draw globe background glow ──
  function drawGlobeGlow(globe) {
    // Warm center glow inside the globe
    var grad = ctx.createRadialGradient(
      globe.cx, globe.cy * 1.0, 0,
      globe.cx, globe.cy, globe.radius
    );
    grad.addColorStop(0, 'rgba(200, 149, 108, 0.06)');
    grad.addColorStop(0.3, 'rgba(200, 149, 108, 0.03)');
    grad.addColorStop(0.7, 'rgba(180, 130, 90, 0.015)');
    grad.addColorStop(1, 'rgba(10, 10, 10, 0)');

    ctx.save();
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = grad;
    ctx.fillRect(globe.cx - globe.radius, globe.cy - globe.radius, globe.radius * 2, globe.radius * 2);
    ctx.restore();
  }

  // ── Draw particles ──
  function drawParticles(globe, time) {
    ctx.save();
    // Clip to globe interior
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius * 0.97, 0, Math.PI * 2);
    ctx.clip();

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Twinkle
      var twinkle = 1 - p.twinkleAmp + p.twinkleAmp * (0.5 + 0.5 * Math.sin(p.twinklePhase));
      var alpha = p.baseAlpha * twinkle;

      // Occasional bright sparkle
      var sparkle = Math.sin(p.twinklePhase * 2.7 + i * 1.3);
      if (sparkle > 0.92) {
        alpha = Math.min(1.0, alpha * 2.0);
      }

      // Draw glow (larger, soft)
      var glowSize = p.size * p.glowMult;
      var glowGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
      glowGrad.addColorStop(0, 'rgba(' + p.r + ', ' + p.g + ', ' + p.b + ', ' + (alpha * 0.4) + ')');
      glowGrad.addColorStop(0.5, 'rgba(' + p.r + ', ' + p.g + ', ' + p.b + ', ' + (alpha * 0.1) + ')');
      glowGrad.addColorStop(1, 'rgba(' + p.r + ', ' + p.g + ', ' + p.b + ', 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Draw core (small, bright)
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + Math.min(255, p.r + 40) + ', ' + Math.min(255, p.g + 30) + ', ' + Math.min(255, p.b + 20) + ', ' + alpha + ')';
      ctx.fill();

      // Extra sparkle flash for bright moments
      if (sparkle > 0.92) {
        var sparkAlpha = (sparkle - 0.92) / 0.08 * alpha * 0.8;
        var sparkSize = p.size * 3;
        var sparkGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sparkSize);
        sparkGrad.addColorStop(0, 'rgba(255, 240, 200, ' + sparkAlpha + ')');
        sparkGrad.addColorStop(0.3, 'rgba(255, 220, 160, ' + (sparkAlpha * 0.3) + ')');
        sparkGrad.addColorStop(1, 'rgba(200, 149, 108, 0)');
        ctx.fillStyle = sparkGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, sparkSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // ── Draw globe boundary ──
  function drawGlobeBoundary(globe) {
    // Outer glass-like ring
    ctx.save();

    // Subtle refraction effect: inner edge gradient
    var edgeWidth = globe.radius * 0.06;

    // Glass rim: a ring with gradient opacity
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius, 0, Math.PI * 2);
    ctx.lineWidth = edgeWidth;
    var rimGrad = ctx.createRadialGradient(
      globe.cx, globe.cy, globe.radius - edgeWidth,
      globe.cx, globe.cy, globe.radius + edgeWidth * 0.5
    );
    rimGrad.addColorStop(0, 'rgba(200, 180, 150, 0)');
    rimGrad.addColorStop(0.4, 'rgba(200, 180, 150, 0.06)');
    rimGrad.addColorStop(0.7, 'rgba(220, 200, 170, 0.1)');
    rimGrad.addColorStop(1, 'rgba(200, 180, 150, 0.03)');
    ctx.strokeStyle = rimGrad;
    ctx.stroke();

    // Specular highlight on upper-left of globe
    var hlAngle = -Math.PI * 0.75;
    var hlX = globe.cx + Math.cos(hlAngle) * globe.radius * 0.7;
    var hlY = globe.cy + Math.sin(hlAngle) * globe.radius * 0.7;
    var hlSize = globe.radius * 0.6;
    var hlGrad = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlSize);
    hlGrad.addColorStop(0, 'rgba(255, 245, 220, 0.06)');
    hlGrad.addColorStop(0.3, 'rgba(230, 210, 180, 0.025)');
    hlGrad.addColorStop(1, 'rgba(200, 180, 150, 0)');

    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = hlGrad;
    ctx.beginPath();
    ctx.arc(hlX, hlY, hlSize, 0, Math.PI * 2);
    ctx.fill();

    // Secondary specular (smaller, brighter) on the edge
    var spec2X = globe.cx + Math.cos(hlAngle) * globe.radius * 0.88;
    var spec2Y = globe.cy + Math.sin(hlAngle) * globe.radius * 0.88;
    var spec2Size = globe.radius * 0.15;
    var spec2Grad = ctx.createRadialGradient(spec2X, spec2Y, 0, spec2X, spec2Y, spec2Size);
    spec2Grad.addColorStop(0, 'rgba(255, 250, 230, 0.12)');
    spec2Grad.addColorStop(0.5, 'rgba(240, 220, 190, 0.04)');
    spec2Grad.addColorStop(1, 'rgba(200, 180, 150, 0)');
    ctx.fillStyle = spec2Grad;
    ctx.beginPath();
    ctx.arc(spec2X, spec2Y, spec2Size, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Thin outer circle line
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 180, 150, 0.12)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Draw globe base / pedestal ──
  function drawBase(globe) {
    var baseTop = globe.cy + globe.radius * 0.92;
    var baseHeight = globe.radius * 0.22;
    var baseWidth = globe.radius * 0.65;

    // Trapezoid base
    ctx.beginPath();
    ctx.moveTo(globe.cx - baseWidth * 0.8, baseTop);
    ctx.lineTo(globe.cx + baseWidth * 0.8, baseTop);
    ctx.lineTo(globe.cx + baseWidth * 1.0, baseTop + baseHeight);
    ctx.lineTo(globe.cx - baseWidth * 1.0, baseTop + baseHeight);
    ctx.closePath();

    var baseGrad = ctx.createLinearGradient(0, baseTop, 0, baseTop + baseHeight);
    baseGrad.addColorStop(0, 'rgba(80, 60, 40, 0.6)');
    baseGrad.addColorStop(0.5, 'rgba(60, 45, 30, 0.7)');
    baseGrad.addColorStop(1, 'rgba(40, 30, 20, 0.8)');
    ctx.fillStyle = baseGrad;
    ctx.fill();

    // Highlight on top edge of base
    ctx.beginPath();
    ctx.moveTo(globe.cx - baseWidth * 0.8, baseTop);
    ctx.lineTo(globe.cx + baseWidth * 0.8, baseTop);
    ctx.strokeStyle = 'rgba(200, 170, 130, 0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Rim connector between globe and base
    ctx.beginPath();
    ctx.ellipse(globe.cx, baseTop, baseWidth * 0.8, baseHeight * 0.15, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(120, 90, 60, 0.4)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(200, 170, 130, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── Refraction distortion overlay ──
  function drawRefractionOverlay(globe) {
    // Simulates lens distortion at the edges with a radial darkening/lightening
    ctx.save();
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius, 0, Math.PI * 2);
    ctx.clip();

    // Edge darkening (chromatic aberration feel)
    var edgeGrad = ctx.createRadialGradient(
      globe.cx, globe.cy, globe.radius * 0.6,
      globe.cx, globe.cy, globe.radius
    );
    edgeGrad.addColorStop(0, 'rgba(10, 10, 10, 0)');
    edgeGrad.addColorStop(0.7, 'rgba(10, 10, 10, 0)');
    edgeGrad.addColorStop(1, 'rgba(10, 10, 10, 0.15)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(globe.cx - globe.radius, globe.cy - globe.radius, globe.radius * 2, globe.radius * 2);

    ctx.restore();
  }

  // ── Vignette ──
  function drawVignette() {
    var cx = width / 2;
    var cy = height / 2;
    var maxDim = Math.max(width, height);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.2, cx, cy, maxDim * 0.85);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.5)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Ambient glow behind globe ──
  function drawAmbientGlow(globe) {
    var ambGrad = ctx.createRadialGradient(
      globe.cx, globe.cy, 0,
      globe.cx, globe.cy, globe.radius * 1.4
    );
    ambGrad.addColorStop(0, 'rgba(200, 149, 108, 0.04)');
    ambGrad.addColorStop(0.5, 'rgba(180, 130, 90, 0.02)');
    ambGrad.addColorStop(1, 'rgba(10, 10, 10, 0)');
    ctx.fillStyle = ambGrad;
    ctx.beginPath();
    ctx.arc(globe.cx, globe.cy, globe.radius * 1.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Animation state ──
  var lastTime = 0;
  var running = true;
  var animId = null;

  function loop(timestamp) {
    if (!running) {
      animId = null;
      return;
    }

    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (prefersReduced) dt *= 0.15;

    var time = timestamp / 1000;
    var globe = getGlobe();

    // Auto-shake timer
    shakeTimer += dt;
    if (shakeTimer >= nextShakeTime) {
      shakeTimer = 0;
      nextShakeTime = shakeInterval * (0.7 + Math.random() * 0.6);
      shakeEnergy = 0.6 + Math.random() * 0.4; // random shake intensity
    }

    // Decay shake energy
    shakeEnergy *= Math.pow(0.4, dt);
    if (shakeEnergy < 0.005) shakeEnergy = 0;

    // Update particles
    updateParticles(dt, time, globe);

    // ── Render ──
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    // Ambient glow behind globe
    drawAmbientGlow(globe);

    // Globe interior glow
    drawGlobeGlow(globe);

    // Particles (clipped to globe)
    drawParticles(globe, time);

    // Refraction overlay
    drawRefractionOverlay(globe);

    // Globe glass boundary
    drawGlobeBoundary(globe);

    // Base / pedestal
    drawBase(globe);

    // Vignette
    drawVignette();

    animId = requestAnimationFrame(loop);
  }

  animId = requestAnimationFrame(loop);

  // ── Visibility pause/resume ──
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      if (!animId) {
        animId = requestAnimationFrame(loop);
      }
    }
  });

  // ── postMessage param handler ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TURBULENCE':
          TURBULENCE = Math.max(0.1, Math.min(2.0, parseFloat(e.data.value) || 0.5));
          break;
        case 'PARTICLE_COUNT':
          PARTICLE_COUNT = Math.max(100, Math.min(500, Math.round(parseFloat(e.data.value) || 250)));
          break;
      }
    }
  });
})();
</script>
</body>
</html>
