<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Window</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Rain Window</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Rain Window — Raindrops on dark glass with warm amber light behind
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var RAIN_INTENSITY = 0.6;
  var BLUR_AMOUNT = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_rainIntensity;',
    'uniform float u_blurAmount;',
    '',
    '#define PI 3.14159265359',
    '#define NUM_BOKEH_LAYERS 4',
    '#define NUM_DROP_LAYERS 3',
    '',
    '// ── Hash functions ──',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy);',
    '}',
    '',
    '// ── Smooth noise ──',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  return mix(',
    '    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),',
    '    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),',
    '    f.y',
    '  );',
    '}',
    '',
    '// ── FBM for background glow ──',
    'float fbm(vec2 p) {',
    '  float v = 0.0, a = 0.5;',
    '  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * vnoise(p);',
    '    p = rot * p * 2.1 + vec2(1.7, 9.2);',
    '    a *= 0.48;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Bokeh background — warm blurred light sources behind glass ──',
    'vec3 bokehBackground(vec2 uv, float t, float blur) {',
    '  // Base ambient warm glow',
    '  vec3 col = vec3(0.025, 0.018, 0.008);',
    '',
    '  // Large soft glow — the main light source behind the window',
    '  float fbmVal = fbm(uv * 1.5 + t * 0.02);',
    '  float mainGlow = smoothstep(0.3, 0.8, fbmVal);',
    '  col += vec3(0.12, 0.085, 0.035) * mainGlow * blur;',
    '',
    '  // Warm center bias — streetlight or room light',
    '  float centerDist = length(uv - vec2(0.0, 0.1));',
    '  float centerGlow = exp(-centerDist * centerDist / (0.8 * blur));',
    '  col += vec3(0.18, 0.13, 0.055) * centerGlow * 0.6;',
    '',
    '  // Secondary light source — offset, dimmer',
    '  float secDist = length(uv - vec2(-0.35, 0.25));',
    '  float secGlow = exp(-secDist * secDist / (0.4 * blur));',
    '  col += vec3(0.14, 0.10, 0.04) * secGlow * 0.35;',
    '',
    '  // Third light — far right, warm',
    '  float thirdDist = length(uv - vec2(0.4, -0.15));',
    '  float thirdGlow = exp(-thirdDist * thirdDist / (0.35 * blur));',
    '  col += vec3(0.10, 0.07, 0.03) * thirdGlow * 0.3;',
    '',
    '  // Bokeh circles — individual out-of-focus light points',
    '  // Layer 0',
    '  vec2 bp0 = vec2(0.22, 0.3);',
    '  float bd0 = length(uv - bp0);',
    '  float bokeh0 = smoothstep(0.12 * blur, 0.0, bd0) * 0.4;',
    '  bokeh0 *= smoothstep(0.0, 0.04 * blur, bd0) * 0.5 + 0.5;',
    '  col += vec3(0.25, 0.18, 0.08) * bokeh0;',
    '',
    '  // Layer 1',
    '  vec2 bp1 = vec2(-0.3, 0.15);',
    '  float bd1 = length(uv - bp1);',
    '  float bokeh1 = smoothstep(0.09 * blur, 0.0, bd1) * 0.3;',
    '  bokeh1 *= smoothstep(0.0, 0.03 * blur, bd1) * 0.5 + 0.5;',
    '  col += vec3(0.22, 0.16, 0.07) * bokeh1;',
    '',
    '  // Layer 2',
    '  vec2 bp2 = vec2(0.15, -0.25);',
    '  float bd2 = length(uv - bp2);',
    '  float bokeh2 = smoothstep(0.07 * blur, 0.0, bd2) * 0.25;',
    '  bokeh2 *= smoothstep(0.0, 0.025 * blur, bd2) * 0.5 + 0.5;',
    '  col += vec3(0.20, 0.14, 0.06) * bokeh2;',
    '',
    '  // Layer 3',
    '  vec2 bp3 = vec2(-0.18, -0.32);',
    '  float bd3 = length(uv - bp3);',
    '  float bokeh3 = smoothstep(0.10 * blur, 0.0, bd3) * 0.2;',
    '  bokeh3 *= smoothstep(0.0, 0.035 * blur, bd3) * 0.5 + 0.5;',
    '  col += vec3(0.18, 0.12, 0.05) * bokeh3;',
    '',
    '  // Slow pulsation of the background light',
    '  float pulse = sin(t * 0.08) * 0.06 + sin(t * 0.13 + 1.5) * 0.04;',
    '  col *= 1.0 + pulse;',
    '',
    '  return col;',
    '}',
    '',
    '// ── Glass surface ──',
    'vec3 glassSurface(vec2 uv, float t, vec3 bg) {',
    '  // Dark tint',
    '  vec3 tint = vec3(0.02, 0.015, 0.01);',
    '  vec3 col = bg * 0.7 + tint;',
    '',
    '  // Condensation fog — subtle, patchy',
    '  float fog = fbm(uv * 4.0 + t * 0.005);',
    '  float fogMask = smoothstep(0.35, 0.65, fog) * 0.15;',
    '  // Fog dims the background and adds a slight milky layer',
    '  col = mix(col, vec3(0.04, 0.03, 0.018), fogMask);',
    '',
    '  // Very subtle surface reflection / specular from the room side',
    '  float refl = vnoise(uv * 8.0 + vec2(t * 0.01, 0.0));',
    '  refl = pow(refl, 3.0) * 0.04;',
    '  col += vec3(0.06, 0.045, 0.02) * refl;',
    '',
    '  return col;',
    '}',
    '',
    '// ── Single raindrop with trail ──',
    '// Returns: x = drop body, y = trail, z = refraction strength',
    'vec3 raindrop(vec2 uv, vec2 cellId, float t, float intensity) {',
    '  // Per-drop random properties from cell ID',
    '  vec2 rnd = hash2(cellId);',
    '  float rnd3 = hash(cellId + vec2(77.7, 33.3));',
    '  float rnd4 = hash(cellId + vec2(11.1, 55.5));',
    '',
    '  // Skip some cells based on intensity',
    '  if (rnd.x > intensity) return vec3(0.0);',
    '',
    '  // Drop size variation',
    '  float dropSize = mix(0.015, 0.045, rnd.y);',
    '',
    '  // Fall speed — larger drops fall faster',
    '  float speed = mix(0.06, 0.18, rnd.y) * (1.0 + rnd3 * 0.3);',
    '',
    '  // Horizontal position within cell — slight randomness',
    '  float xOff = (rnd.x / intensity) * 0.8 - 0.4;',
    '',
    '  // Vertical position — cycling with time',
    '  float cycle = fract(t * speed + rnd3);',
    '  // Ease: drops accelerate as they fall',
    '  float fallPos = cycle * cycle * 0.5 + cycle * 0.5;',
    '  float yPos = 1.0 - fallPos * 2.2;',
    '',
    '  // Wobble — slight horizontal oscillation as drop descends',
    '  float wobble = sin(cycle * 12.0 + rnd4 * 6.28) * 0.008 * (1.0 + rnd.y);',
    '  wobble += sin(cycle * 5.3 + rnd3 * 6.28) * 0.012;',
    '',
    '  vec2 dropCenter = vec2(xOff + wobble, yPos);',
    '  vec2 delta = uv - dropCenter;',
    '',
    '  // Drop body — slightly elongated vertically',
    '  float dx = delta.x / (dropSize * 0.85);',
    '  float dy = delta.y / (dropSize * 1.2);',
    '  float dist = sqrt(dx * dx + dy * dy);',
    '  float drop = smoothstep(1.0, 0.4, dist);',
    '',
    '  // Trail behind the drop — a thin streak above it',
    '  float trailLength = mix(0.08, 0.25, rnd.y) * (0.5 + cycle * 0.5);',
    '  float trailWidth = dropSize * mix(0.2, 0.5, rnd3);',
    '  float inTrailX = smoothstep(trailWidth, trailWidth * 0.3, abs(delta.x - wobble * 0.5));',
    '  float inTrailY = smoothstep(0.0, trailLength, delta.y - dropSize * 0.8);',
    '  float trailFade = (1.0 - smoothstep(0.0, trailLength, delta.y - dropSize * 0.8));',
    '  float trail = inTrailX * inTrailY * trailFade * 0.5;',
    '',
    '  // Fade drops near top (forming) and bottom (pooling)',
    '  float topFade = smoothstep(0.95, 0.75, yPos + dropSize);',
    '  float bottomFade = smoothstep(-1.1, -0.85, yPos);',
    '  float edgeFade = topFade * bottomFade;',
    '',
    '  drop *= edgeFade;',
    '  trail *= edgeFade;',
    '',
    '  // Refraction strength is strongest at drop center',
    '  float refraction = smoothstep(1.0, 0.0, dist) * edgeFade;',
    '',
    '  return vec3(drop, trail, refraction);',
    '}',
    '',
    '// ── Pool of water at bottom edge ──',
    'float bottomPool(vec2 uv, float t) {',
    '  float poolEdge = -0.92 + vnoise(vec2(uv.x * 6.0, t * 0.1)) * 0.03;',
    '  float pool = smoothstep(poolEdge + 0.04, poolEdge, uv.y);',
    '  // Surface ripples',
    '  float ripple = sin(uv.x * 40.0 + t * 2.0) * 0.003;',
    '  ripple += sin(uv.x * 25.0 - t * 1.5 + 1.0) * 0.004;',
    '  pool *= smoothstep(poolEdge - 0.02, poolEdge + ripple, uv.y - 0.02) * 0.5 + 0.5;',
    '  return pool;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  vec2 uvScreen = gl_FragCoord.xy / u_res;',
    '  float t = u_time;',
    '  float intensity = u_rainIntensity;',
    '  float blur = u_blurAmount;',
    '',
    '  // ── Layer 1: Warm amber bokeh background ──',
    '  vec3 bg = bokehBackground(uv, t, blur);',
    '',
    '  // ── Layer 2: Glass surface with tint and condensation ──',
    '  vec3 col = glassSurface(uv, t, bg);',
    '',
    '  // ── Layer 3: Raindrops ──',
    '  // We evaluate multiple grid layers at different scales for depth',
    '  vec3 totalDrop = vec3(0.0);',
    '',
    '  // Drop layer 0 — large foreground drops',
    '  {',
    '    float scale = 5.0;',
    '    vec2 gridUV = uv * scale;',
    '    vec2 cellId = floor(gridUV);',
    '    vec2 cellUV = fract(gridUV) - 0.5;',
    '    // Check neighboring cells for drops that might overlap',
    '    vec3 d00 = raindrop(cellUV, cellId, t, intensity);',
    '    vec3 dR = raindrop(cellUV - vec2(1.0, 0.0), cellId + vec2(1.0, 0.0), t, intensity);',
    '    vec3 dL = raindrop(cellUV + vec2(1.0, 0.0), cellId - vec2(1.0, 0.0), t, intensity);',
    '    vec3 dU = raindrop(cellUV - vec2(0.0, 1.0), cellId + vec2(0.0, 1.0), t, intensity);',
    '    vec3 dD = raindrop(cellUV + vec2(0.0, 1.0), cellId - vec2(0.0, 1.0), t, intensity);',
    '    totalDrop = max(totalDrop, d00);',
    '    totalDrop = max(totalDrop, dR);',
    '    totalDrop = max(totalDrop, dL);',
    '    totalDrop = max(totalDrop, dU);',
    '    totalDrop = max(totalDrop, dD);',
    '  }',
    '',
    '  // Drop layer 1 — medium drops, offset grid',
    '  {',
    '    float scale = 8.0;',
    '    vec2 gridUV = (uv + vec2(0.37, 0.73)) * scale;',
    '    vec2 cellId = floor(gridUV) + vec2(100.0, 200.0);',
    '    vec2 cellUV = fract(gridUV) - 0.5;',
    '    vec3 d00 = raindrop(cellUV, cellId, t * 1.1, intensity * 0.85);',
    '    vec3 dR = raindrop(cellUV - vec2(1.0, 0.0), cellId + vec2(1.0, 0.0), t * 1.1, intensity * 0.85);',
    '    vec3 dL = raindrop(cellUV + vec2(1.0, 0.0), cellId - vec2(1.0, 0.0), t * 1.1, intensity * 0.85);',
    '    vec3 dU = raindrop(cellUV - vec2(0.0, 1.0), cellId + vec2(0.0, 1.0), t * 1.1, intensity * 0.85);',
    '    vec3 dD = raindrop(cellUV + vec2(0.0, 1.0), cellId - vec2(0.0, 1.0), t * 1.1, intensity * 0.85);',
    '    vec3 layer = max(max(max(d00, dR), max(dL, dU)), dD);',
    '    layer *= 0.7;',
    '    totalDrop = max(totalDrop, layer);',
    '  }',
    '',
    '  // Drop layer 2 — small background drops, finer grid',
    '  {',
    '    float scale = 13.0;',
    '    vec2 gridUV = (uv + vec2(0.13, 0.51)) * scale;',
    '    vec2 cellId = floor(gridUV) + vec2(300.0, 400.0);',
    '    vec2 cellUV = fract(gridUV) - 0.5;',
    '    vec3 d00 = raindrop(cellUV, cellId, t * 0.9, intensity * 0.65);',
    '    vec3 dR = raindrop(cellUV - vec2(1.0, 0.0), cellId + vec2(1.0, 0.0), t * 0.9, intensity * 0.65);',
    '    vec3 dL = raindrop(cellUV + vec2(1.0, 0.0), cellId - vec2(1.0, 0.0), t * 0.9, intensity * 0.65);',
    '    vec3 layer = max(max(d00, dR), dL);',
    '    layer *= 0.4;',
    '    totalDrop = max(totalDrop, layer);',
    '  }',
    '',
    '  float dropBody = totalDrop.x;',
    '  float dropTrail = totalDrop.y;',
    '  float dropRefract = totalDrop.z;',
    '',
    '  // ── Refraction: drops act as lenses showing brighter/warmer background ──',
    '  vec3 refractedBg = bg * 2.2 + vec3(0.15, 0.10, 0.04);',
    '  // Amplify warm tones through the drop lens',
    '  refractedBg = mix(refractedBg, vec3(0.78, 0.58, 0.24), dropRefract * 0.3);',
    '',
    '  // Drop body compositing',
    '  col = mix(col, refractedBg, dropBody * 0.85);',
    '',
    '  // Drop edge highlight — bright rim light catching the glow',
    '  float edgeHighlight = smoothstep(0.3, 0.7, dropBody) - smoothstep(0.7, 1.0, dropBody);',
    '  col += vec3(1.0, 0.82, 0.55) * edgeHighlight * 0.2;',
    '',
    '  // Drop specular — tiny bright point near top of each drop',
    '  float specular = pow(dropBody, 8.0);',
    '  col += vec3(1.0, 0.9, 0.7) * specular * 0.6;',
    '',
    '  // ── Trails ──',
    '  vec3 trailColor = vec3(0.06, 0.04, 0.02);',
    '  // Trails show slightly brighter background (thinner lens effect)',
    '  vec3 trailRefract = mix(col, bg * 1.3, 0.3);',
    '  col = mix(col, trailRefract, dropTrail * 0.4);',
    '  col = mix(col, trailColor, dropTrail * 0.15);',
    '',
    '  // ── Bottom pooling water ──',
    '  float pool = bottomPool(uv, t);',
    '  vec3 poolColor = bg * 1.1 + vec3(0.02, 0.015, 0.006);',
    '  // Pool has soft refraction of background',
    '  float poolRefract = pool * (0.5 + 0.5 * vnoise(vec2(uv.x * 20.0, t * 0.5)));',
    '  col = mix(col, poolColor, pool * 0.4);',
    '  col += vec3(0.08, 0.06, 0.025) * poolRefract * 0.15;',
    '',
    '  // ── Film grain ──',
    '  float grain = (hash(gl_FragCoord.xy + fract(t * 43.0) * 1000.0) - 0.5) * 0.015;',
    '  col += grain;',
    '',
    '  // ── Vignette — dark edges like looking through a window frame ──',
    '  float vig = length(uv * vec2(0.9, 1.0));',
    '  float vignette = 1.0 - smoothstep(0.5, 1.2, vig);',
    '  vignette = vignette * 0.85 + 0.15;',
    '  col *= vignette;',
    '',
    '  // ── Tone mapping — keep blacks deep, warm lift in shadows ──',
    '  col = max(col, vec3(0.0));',
    '  col = pow(col, vec3(0.95, 1.0, 1.08));',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col = mix(col, col * vec3(1.1, 0.95, 0.85), smoothstep(0.05, 0.0, lum) * 0.25);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRainIntensity = gl.getUniformLocation(prog, 'u_rainIntensity');
  var uBlurAmount = gl.getUniformLocation(prog, 'u_blurAmount');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uRainIntensity, RAIN_INTENSITY);
    gl.uniform1f(uBlurAmount, BLUR_AMOUNT);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'RAIN_INTENSITY': RAIN_INTENSITY = e.data.value; break;
        case 'BLUR_AMOUNT': BLUR_AMOUNT = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
