<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vein Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Vein Network</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Vein Network — Organic branching vascular network
// with heartbeat pulse, recursive growth, warm amber palette
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var width, height, dpr;
  var needsReset = false;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    needsReset = true;
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Tunable parameters ──
  var PULSE_RATE = 1.0;
  var BRANCH_DENSITY = 0.6;

  // ── Constants ──
  var HEARTBEAT_PERIOD = 1.0;
  var MAX_SEGMENTS = 80000;  // total segment budget for performance
  var MAX_GENERATION = 10;
  var SOURCE_COUNT = 4;
  var BRANCH_LIFETIME = 22;
  var GROWTH_SPEED = 120;    // pixels per second — fast growth
  var MIN_WIDTH = 0.25;
  var MAX_WIDTH = 5.0;

  // ── State ──
  var branches = [];
  var sources = [];
  var time = 0;
  var lastTime = 0;
  var running = true;
  var animId = null;
  var totalSegments = 0;

  // ── Utility ──
  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function clamp(v, lo, hi) {
    return v < lo ? lo : v > hi ? hi : v;
  }

  // ── Branch object ──
  function createBranch(x, y, angle, bwidth, generation, sourceIdx) {
    // Trunk branches are long; capillaries are short
    var baseLen = rand(80, 250);
    var genScale = Math.pow(0.72, generation);
    var maxLen = baseLen * genScale;
    maxLen = Math.max(maxLen, 8);
    return {
      x: x,
      y: y,
      angle: angle,
      width: bwidth,
      generation: generation,
      sourceIdx: sourceIdx,
      birthTime: time,
      maxLength: maxLen,
      currentLength: 0,
      growing: true,
      forkCount: 0,
      maxForks: generation < 2 ? Math.floor(rand(2, 5)) : Math.floor(rand(1, 3)),
      nextForkAt: rand(0.2, 0.45),  // fraction of maxLength for first fork
      curvature: (Math.random() - 0.5) * 0.008,
      segments: [{x: x, y: y}],
      alpha: 1.0,
      dead: false
    };
  }

  // ── Source points ──
  function initSources() {
    sources = [];
    var positions = [
      [0.22, 0.38],
      [0.72, 0.52],
      [0.48, 0.22],
      [0.42, 0.78]
    ];
    for (var i = 0; i < SOURCE_COUNT; i++) {
      sources.push({
        x: width * positions[i][0] + rand(-30, 30),
        y: height * positions[i][1] + rand(-30, 30)
      });
    }
  }

  // ── Initialize / Reset network ──
  function initNetwork() {
    branches = [];
    totalSegments = 0;
    initSources();
    for (var s = 0; s < sources.length; s++) {
      var numTrunks = Math.floor(rand(5, 8));
      for (var t = 0; t < numTrunks; t++) {
        var angle = (t / numTrunks) * Math.PI * 2 + rand(-0.3, 0.3);
        var w = rand(3.5, MAX_WIDTH);
        branches.push(createBranch(sources[s].x, sources[s].y, angle, w, 0, s));
      }
    }
    needsReset = false;
  }

  // ── Grow branches ──
  function growBranches(dt) {
    var newBranches = [];
    var density = BRANCH_DENSITY;

    for (var i = 0, len = branches.length; i < len; i++) {
      var b = branches[i];
      if (!b.growing || b.dead) continue;

      // Growth speed decreases per generation
      var genSpeed = Math.pow(0.9, b.generation);
      var step = GROWTH_SPEED * dt * genSpeed;
      step = Math.max(step, 0.2);

      // Organic wobble
      b.angle += b.curvature + (Math.random() - 0.5) * 0.02;

      var nx = b.x + Math.cos(b.angle) * step;
      var ny = b.y + Math.sin(b.angle) * step;
      b.x = nx;
      b.y = ny;
      b.currentLength += step;
      b.segments.push({ x: nx, y: ny });
      totalSegments++;

      // Stop growing if max length reached or offscreen
      if (b.currentLength >= b.maxLength) {
        b.growing = false;
        continue;
      }
      if (nx < -40 || nx > width + 40 || ny < -40 || ny > height + 40) {
        b.growing = false;
        continue;
      }

      // Fork: parent keeps growing, children branch off
      var progress = b.currentLength / b.maxLength;
      if (b.forkCount < b.maxForks && b.generation < MAX_GENERATION &&
          progress >= b.nextForkAt && totalSegments < MAX_SEGMENTS) {

        b.forkCount++;
        b.nextForkAt = progress + rand(0.15, 0.35) * density;

        var forkAngle = rand(0.3, 0.7);
        var side = Math.random() < 0.5 ? -1 : 1;
        var childWidth = b.width * rand(0.45, 0.65);
        childWidth = Math.max(childWidth, MIN_WIDTH);

        // Main child branch on one side
        newBranches.push(createBranch(b.x, b.y, b.angle + side * forkAngle, childWidth, b.generation + 1, b.sourceIdx));

        // Sometimes a second child on the other side (bifurcation)
        if (Math.random() < 0.3 * density && totalSegments < MAX_SEGMENTS) {
          var childWidth2 = childWidth * rand(0.7, 0.9);
          childWidth2 = Math.max(childWidth2, MIN_WIDTH);
          newBranches.push(createBranch(b.x, b.y, b.angle - side * forkAngle * rand(0.5, 0.8), childWidth2, b.generation + 1, b.sourceIdx));
        }

        // Slightly narrow parent after forking
        b.width *= 0.92;
        b.width = Math.max(b.width, MIN_WIDTH);
      }
    }

    for (var j = 0; j < newBranches.length; j++) {
      branches.push(newBranches[j]);
    }
  }

  // ── Fade and cull old branches ──
  function fadeAndCull() {
    var fadeStart = BRANCH_LIFETIME * 0.6;
    var survivors = [];
    var segCount = 0;
    for (var i = 0; i < branches.length; i++) {
      var b = branches[i];
      var age = time - b.birthTime;
      if (age > BRANCH_LIFETIME) continue;
      if (age > fadeStart) {
        b.alpha = 1 - (age - fadeStart) / (BRANCH_LIFETIME - fadeStart);
        b.alpha = clamp(b.alpha, 0, 1);
      }
      segCount += b.segments.length;
      survivors.push(b);
    }
    branches = survivors;
    totalSegments = segCount;
  }

  // ── Regrow from sources when thinning ──
  function regrowFromSources() {
    if (totalSegments > MAX_SEGMENTS * 0.8) return;
    var counts = [];
    for (var s = 0; s < sources.length; s++) counts[s] = 0;
    for (var i = 0; i < branches.length; i++) {
      if (branches[i].growing) counts[branches[i].sourceIdx]++;
    }
    for (var s2 = 0; s2 < sources.length; s2++) {
      if (counts[s2] < 3) {
        var numNew = Math.floor(rand(3, 6));
        for (var t = 0; t < numNew; t++) {
          var angle = Math.random() * Math.PI * 2;
          var w = rand(2.5, MAX_WIDTH);
          branches.push(createBranch(sources[s2].x, sources[s2].y, angle, w, 0, s2));
        }
      }
    }
  }

  // ── Heartbeat envelope — returns global pulse intensity [0..1] ──
  function heartbeatEnvelope(t) {
    var period = HEARTBEAT_PERIOD / PULSE_RATE;
    var phase = (t % period) / period;

    // Lub: sharp attack, medium decay
    var lub = Math.exp(-phase * 5) * clamp(1 - phase * 3, 0, 1) * 1.2;
    lub = Math.max(0, lub);

    // Dub: smaller secondary peak
    var dubPhase = phase - 0.22;
    var dub = dubPhase > 0 ? Math.exp(-dubPhase * 8) * 0.5 : 0;

    return clamp(lub + dub, 0, 1);
  }

  // ── Per-segment pulse: returns brightness for a segment at given distance ──
  // Creates a wave that propagates outward. Near segments light up first.
  function segmentPulse(t, normDist) {
    var period = HEARTBEAT_PERIOD / PULSE_RATE;
    var phase = (t % period) / period;

    // Wave front position — propagates outward
    var waveFront = Math.pow(phase, 0.5) * 1.4; // overshoots 1.0 so it reaches edges

    // How much has the wave passed this segment?
    // Positive = wave has passed, negative = wave hasn't arrived
    var passedBy = waveFront - normDist;

    if (passedBy < -0.15) return 0; // wave hasn't reached here yet

    // Sharp rise as wave arrives, slow exponential decay after passing
    var arrival;
    if (passedBy < 0) {
      // Wave approaching — slight anticipation glow
      arrival = Math.exp(passedBy * 8) * 0.3;
    } else {
      // Wave passed — bright flash then decay
      arrival = Math.exp(-passedBy * 3);
    }

    // Modulate by heartbeat envelope
    var envelope = heartbeatEnvelope(t);
    return clamp(arrival * envelope * 1.5, 0, 1);
  }

  // ── Render ──
  function render() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    var maxDist = Math.sqrt(width * width + height * height) * 0.5;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // ── Pass 1: Glow layer for thick pulsing veins ──
    for (var gi = 0; gi < branches.length; gi++) {
      var gb = branches[gi];
      if (gb.dead || gb.segments.length < 2 || gb.alpha < 0.02) continue;
      if (gb.generation > 4) continue;

      var gsrc = sources[gb.sourceIdx];

      // Sample pulse at branch midpoint
      var gMid = gb.segments[Math.floor(gb.segments.length * 0.4)];
      var gdx = gMid.x - gsrc.x;
      var gdy = gMid.y - gsrc.y;
      var gDist = Math.sqrt(gdx * gdx + gdy * gdy) / maxDist;
      var gPulse = segmentPulse(time, gDist);

      if (gPulse < 0.03) continue;

      ctx.beginPath();
      ctx.moveTo(gb.segments[0].x, gb.segments[0].y);
      for (var gs = 1; gs < gb.segments.length; gs++) {
        ctx.lineTo(gb.segments[gs].x, gb.segments[gs].y);
      }

      var glowW = gb.width * (1 - (gb.generation / MAX_GENERATION) * 0.4) * 7;
      var glowA = gPulse * 0.3 * gb.alpha;
      ctx.strokeStyle = 'rgba(230, 175, 110, ' + glowA.toFixed(3) + ')';
      ctx.lineWidth = glowW;
      ctx.stroke();
    }

    // ── Pass 2: Base vein layer — all as smooth continuous paths ──
    for (var vi = 0; vi < branches.length; vi++) {
      var vb = branches[vi];
      if (vb.dead || vb.segments.length < 2 || vb.alpha < 0.02) continue;

      var vsrc = sources[vb.sourceIdx];
      var genRatio = vb.generation / MAX_GENERATION;
      var veinWidth = vb.width * (1 - genRatio * 0.55);
      veinWidth = Math.max(veinWidth, MIN_WIDTH);

      // Compute pulse at branch midpoint for base color
      var bMid = vb.segments[Math.floor(vb.segments.length * 0.5)];
      var bmdx = bMid.x - vsrc.x;
      var bmdy = bMid.y - vsrc.y;
      var bmDist = Math.sqrt(bmdx * bmdx + bmdy * bmdy) / maxDist;
      var bPulse = segmentPulse(time, bmDist);

      // Dark amber base + pulse brightening
      var bR = Math.round(75 + genRatio * 12 + bPulse * 180);
      var bG = Math.round(38 + genRatio * 8 + bPulse * 160);
      var bB = Math.round(20 + genRatio * 6 + bPulse * 100);
      var bA = (0.18 + 0.3 * (1 - genRatio)) * vb.alpha + bPulse * 0.5;
      bA = clamp(bA, 0, 1);

      ctx.beginPath();
      ctx.moveTo(vb.segments[0].x, vb.segments[0].y);
      for (var vs = 1; vs < vb.segments.length; vs++) {
        ctx.lineTo(vb.segments[vs].x, vb.segments[vs].y);
      }
      ctx.strokeStyle = 'rgba(' + clamp(bR, 0, 255) + ',' + clamp(bG, 0, 255) + ',' + clamp(bB, 0, 255) + ',' + bA.toFixed(3) + ')';
      ctx.lineWidth = veinWidth;
      ctx.stroke();
    }

    // ── Pass 3: Pulse wave overlay on thick veins (per-segment for traveling effect) ──
    for (var pi = 0; pi < branches.length; pi++) {
      var pb = branches[pi];
      if (pb.dead || pb.segments.length < 3 || pb.alpha < 0.05) continue;
      if (pb.generation > 5) continue; // only thick veins get visible wave

      var psrc = sources[pb.sourceIdx];
      var pGenRatio = pb.generation / MAX_GENERATION;
      var pWidth = pb.width * (1 - pGenRatio * 0.5);
      pWidth = Math.max(pWidth, MIN_WIDTH);

      // Quick early-out: check if any pulse is active at branch midpoint
      var pMid = pb.segments[Math.floor(pb.segments.length * 0.5)];
      var pmDx = pMid.x - psrc.x;
      var pmDy = pMid.y - psrc.y;
      var pmDist = Math.sqrt(pmDx * pmDx + pmDy * pmDy) / maxDist;
      var pmPulse = segmentPulse(time, pmDist);
      if (pmPulse < 0.03) continue;

      for (var ps = 1; ps < pb.segments.length; ps++) {
        var p0 = pb.segments[ps - 1];
        var p1 = pb.segments[ps];
        var pdx = (p0.x + p1.x) * 0.5 - psrc.x;
        var pdy = (p0.y + p1.y) * 0.5 - psrc.y;
        var pDist = Math.sqrt(pdx * pdx + pdy * pdy) / maxDist;
        var sPulse = segmentPulse(time, pDist);

        if (sPulse < 0.08) continue;

        // Bright warm gold overlay
        var prR = Math.round(180 + sPulse * 75);
        var prG = Math.round(130 + sPulse * 80);
        var prB = Math.round(60 + sPulse * 70);
        var prA = clamp(sPulse * 0.7 * pb.alpha, 0, 1);

        // Width swell on pulse
        var pulseWidth = pWidth * (1 + sPulse * 0.5);

        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.strokeStyle = 'rgba(' + clamp(prR, 0, 255) + ',' + clamp(prG, 0, 255) + ',' + clamp(prB, 0, 255) + ',' + prA.toFixed(3) + ')';
        ctx.lineWidth = pulseWidth;
        ctx.stroke();
      }
    }

    // ── Source point glow ──
    for (var si = 0; si < sources.length; si++) {
      var sp = sources[si];
      var sPulse = segmentPulse(time, 0);
      var glowR = 18 + sPulse * 45;
      var glowA = 0.08 + sPulse * 0.5;

      var grad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, glowR);
      grad.addColorStop(0, 'rgba(245, 195, 120, ' + glowA + ')');
      grad.addColorStop(0.25, 'rgba(210, 150, 90, ' + (glowA * 0.5) + ')');
      grad.addColorStop(0.6, 'rgba(170, 110, 60, ' + (glowA * 0.15) + ')');
      grad.addColorStop(1, 'rgba(120, 70, 35, 0)');
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Inner bright dot
      var dotA = 0.25 + sPulse * 0.7;
      var dotGrad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, 5 + sPulse * 5);
      dotGrad.addColorStop(0, 'rgba(255, 230, 180, ' + dotA + ')');
      dotGrad.addColorStop(1, 'rgba(230, 175, 110, 0)');
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 5 + sPulse * 5, 0, Math.PI * 2);
      ctx.fillStyle = dotGrad;
      ctx.fill();
    }

    // ── Subtle vignette ──
    var vigGrad = ctx.createRadialGradient(
      width * 0.5, height * 0.5, Math.min(width, height) * 0.3,
      width * 0.5, height * 0.5, Math.max(width, height) * 0.75
    );
    vigGrad.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vigGrad.addColorStop(1, 'rgba(10, 10, 10, 0.4)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Static frame for reduced motion ──
  function renderStaticFrame() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);
    time = 0;
    initNetwork();
    for (var step = 0; step < 500; step++) {
      growBranches(0.033);
      time += 0.033;
    }
    time = 0.03;
    render();
  }

  // ── Main loop ──
  var regrowTimer = 0;

  function loop(timestamp) {
    if (!running) {
      animId = null;
      return;
    }

    if (lastTime === 0) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    time += dt;

    if (needsReset) {
      initNetwork();
    }

    growBranches(dt);

    regrowTimer += dt;
    if (regrowTimer > 0.8) {
      regrowTimer = 0;
      fadeAndCull();
      regrowFromSources();
    }

    render();
    animId = requestAnimationFrame(loop);
  }

  // ── Visibility pause/resume ──
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      if (!animId) {
        animId = requestAnimationFrame(loop);
      }
    }
  });

  // ── postMessage param handler ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'PULSE_RATE':
          PULSE_RATE = clamp(parseFloat(e.data.value) || 1.0, 0.3, 2.0);
          break;
        case 'BRANCH_DENSITY':
          BRANCH_DENSITY = clamp(parseFloat(e.data.value) || 0.6, 0.2, 1.0);
          break;
      }
    }
  });

  // ── Pre-grow: simulate several seconds of growth so network starts full ──
  function warmUp() {
    initNetwork();
    var warmUpTime = 8; // simulate 8 seconds of growth
    var stepDt = 0.04;
    var steps = Math.floor(warmUpTime / stepDt);
    for (var s = 0; s < steps; s++) {
      growBranches(stepDt);
      time += stepDt;
      // Periodic maintenance during warmup
      if (s % 20 === 0) {
        fadeAndCull();
        regrowFromSources();
      }
    }
  }

  // ── Start ──
  if (prefersReduced) {
    renderStaticFrame();
  } else {
    warmUp();
    render();
    animId = requestAnimationFrame(loop);
  }

})();
</script>
</body>
</html>
