<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Bloom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Dark Bloom</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Dark Bloom — Fractal flowers grow from darkness,
// bloom briefly, then wilt and decay in perpetual cycle
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // ── Tunable parameters ──
  var GROWTH_SPEED = 0.5;
  var BLOOM_COUNT = 4;

  var W, H, minDim;
  var running = true;
  var flowers = [];
  var particles = [];
  var time = 0;
  var PHI = (1 + Math.sqrt(5)) / 2;
  var GOLDEN_ANGLE = 2.399963; // radians, ~137.5 degrees

  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    minDim = Math.min(W, H);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Utility ──
  function rand(a, b) { return a + Math.random() * (b - a); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function easeOut(t) { return 1 - (1 - t) * (1 - t); }
  function easeIn(t) { return t * t * t; }
  function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
  function smoothstep(lo, hi, t) { var x = clamp((t - lo) / (hi - lo), 0, 1); return x * x * (3 - 2 * x); }

  // ── Color helpers — warm amber palette only ──
  function rgba(r, g, b, a) { return 'rgba(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ',' + a + ')'; }

  function petalColor(brightness, alpha) {
    // Deep copper-brown to warm amber (centered on 200,149,108)
    var r = lerp(85, 218, brightness);
    var g = lerp(42, 155, brightness);
    var b = lerp(12, 90, brightness * 0.6);
    return rgba(r, g, b, alpha);
  }

  function stemColor(brightness, alpha) {
    var r = lerp(50, 130, brightness);
    var g = lerp(28, 72, brightness);
    var b = lerp(12, 32, brightness);
    return rgba(r, g, b, alpha);
  }

  function glowColor(brightness, alpha) {
    // Warm amber glow, not too yellow
    var r = lerp(200, 245, brightness);
    var g = lerp(130, 185, brightness);
    var b = lerp(60, 115, brightness);
    return rgba(r, g, b, alpha);
  }

  function decayColor(brightness, alpha) {
    // Darkening brown for wilting petals
    var r = lerp(35, 100, brightness);
    var g = lerp(18, 50, brightness);
    var b = lerp(6, 22, brightness);
    return rgba(r, g, b, alpha);
  }

  // ── Flower lifecycle phases ──
  var PHASE_GROWING  = 0;
  var PHASE_BLOOMING = 1;
  var PHASE_PEAK     = 2;
  var PHASE_WILTING  = 3;
  var PHASE_DECAYING = 4;
  var PHASE_DEAD     = 5;

  // Duration of each phase in seconds (before GROWTH_SPEED scaling)
  var PHASE_DURATIONS = [2.8, 2.0, 1.8, 2.5, 2.0];

  // ── Spawn position grid — ensures flowers distribute across canvas ──
  var spawnZones = [];
  function buildSpawnZones() {
    spawnZones = [];
    var cols = 3;
    var rows = 2;
    var marginX = W * 0.12;
    var marginY = H * 0.12;
    var cellW = (W - marginX * 2) / cols;
    var cellH = (H - marginY * 2) / rows;
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        spawnZones.push({
          x: marginX + cellW * (c + 0.5),
          y: marginY + cellH * (r + 0.5),
          w: cellW * 0.7,
          h: cellH * 0.7,
          used: false
        });
      }
    }
  }
  buildSpawnZones();

  function getSpawnPosition() {
    // Try unused zones first
    var available = [];
    for (var i = 0; i < spawnZones.length; i++) {
      if (!spawnZones[i].used) available.push(i);
    }
    if (available.length === 0) {
      // Reset all zones
      for (var j = 0; j < spawnZones.length; j++) spawnZones[j].used = false;
      for (var k = 0; k < spawnZones.length; k++) available.push(k);
    }
    var idx = available[Math.floor(rand(0, available.length))];
    var zone = spawnZones[idx];
    zone.used = true;
    return {
      x: zone.x + rand(-zone.w / 2, zone.w / 2),
      y: zone.y + rand(-zone.h / 2, zone.h / 2)
    };
  }

  // ── Create a flower ──
  function createFlower() {
    var pos = getSpawnPosition();
    var x = pos.x;
    var y = pos.y;
    var baseSize = minDim / _pad * rand(0.06, 0.09);

    // Main stem
    var stemLen = baseSize * rand(2.8, 4.0);
    var stemAngle = -Math.PI / 2 + rand(-0.15, 0.15);
    var stemBaseY = y + stemLen * 0.4;

    // Petal center (top of stem)
    var pcx = x + Math.cos(stemAngle) * stemLen;
    var pcy = stemBaseY + Math.sin(stemAngle) * stemLen;

    // Branches along stem
    var branches = [];
    var mainBranch = {
      x0: x, y0: stemBaseY,
      angle: stemAngle,
      len: stemLen,
      thick: Math.max(1.5, baseSize * 0.07),
      depth: 0,
      delay: 0,
      progress: 0,
      curve: rand(-0.12, 0.12),
      swayPhase: rand(0, 6.28)
    };
    branches.push(mainBranch);

    // Sub-branches
    var numSubs = Math.floor(rand(3, 7));
    for (var i = 0; i < numSubs; i++) {
      var t = (i + 1) / (numSubs + 1);
      var bx = x + Math.cos(stemAngle) * stemLen * t;
      var by = stemBaseY + Math.sin(stemAngle) * stemLen * t;
      var side = (i % 2 === 0) ? -1 : 1;
      var bAngle = stemAngle + side * rand(0.5, 1.1);
      var bLen = stemLen * rand(0.15, 0.35) * (1 - t * 0.4);
      branches.push({
        x0: bx, y0: by,
        angle: bAngle,
        len: bLen,
        thick: Math.max(0.8, baseSize * 0.035),
        depth: 1,
        delay: t * 0.4,
        progress: 0,
        curve: rand(-0.2, 0.2),
        swayPhase: rand(0, 6.28)
      });
    }

    // Petals in fibonacci spiral
    var petals = [];
    var numPetals = Math.floor(rand(10, 18));
    for (var j = 0; j < numPetals; j++) {
      var pAngle = j * GOLDEN_ANGLE;
      var ring = Math.floor(j / 5);
      var pDist = baseSize * (0.15 + ring * 0.25) + rand(-baseSize * 0.05, baseSize * 0.05);
      var pSize = baseSize * rand(0.55, 0.95) * (1 - ring * 0.15);
      var pb = rand(0.45, 1.0);
      petals.push({
        offsetAngle: pAngle,
        dist: pDist,
        size: pSize,
        unfurl: 0,
        curl: 0,
        bright: pb,
        origBright: pb,
        delay: 0.15 + j * 0.04,
        layers: Math.floor(rand(2, 5)),
        type: j < 5 ? 2 : (Math.random() < 0.5 ? 0 : 1), // inner petals = teardrop
        rotOffset: rand(-0.3, 0.3),
        veinSeed: rand(0, 100)
      });
    }

    return {
      x: x,
      y: y,
      pcx: pcx,
      pcy: pcy,
      phase: PHASE_GROWING,
      phaseTime: 0,
      age: 0,
      alpha: 1,
      scale: baseSize,
      stemBaseY: stemBaseY,
      stemAngle: stemAngle,
      stemLen: stemLen,
      branches: branches,
      petals: petals,
      glow: 0,
      rotation: rand(0, 6.28)
    };
  }

  // ── Update flower lifecycle ──
  function updateFlower(flower, dt) {
    var speed = GROWTH_SPEED;
    flower.phaseTime += dt * speed;
    flower.age += dt * speed;

    var dur = PHASE_DURATIONS[flower.phase] || 2;
    if (flower.phaseTime >= dur && flower.phase < PHASE_DEAD) {
      flower.phase++;
      flower.phaseTime = 0;
    }

    var t = clamp(flower.phaseTime / dur, 0, 1);

    switch (flower.phase) {
      case PHASE_GROWING:
        for (var i = 0; i < flower.branches.length; i++) {
          var b = flower.branches[i];
          var lt = clamp((t - b.delay) / Math.max(0.01, 1 - b.delay), 0, 1);
          b.progress = easeOut(lt);
        }
        flower.glow = t * 0.15;
        break;

      case PHASE_BLOOMING:
        for (var i2 = 0; i2 < flower.branches.length; i2++) {
          flower.branches[i2].progress = 1;
        }
        for (var j = 0; j < flower.petals.length; j++) {
          var p = flower.petals[j];
          var pt = clamp((t - p.delay) / Math.max(0.01, 1 - p.delay), 0, 1);
          p.unfurl = easeOut(pt);
        }
        flower.glow = lerp(0.15, 0.85, easeInOut(t));
        break;

      case PHASE_PEAK:
        for (var j2 = 0; j2 < flower.petals.length; j2++) {
          flower.petals[j2].unfurl = 1;
        }
        // Gentle breathing
        flower.glow = 0.7 + 0.25 * Math.sin(flower.age * 2.5);
        break;

      case PHASE_WILTING:
        for (var j3 = 0; j3 < flower.petals.length; j3++) {
          var p3 = flower.petals[j3];
          var wd = j3 / flower.petals.length * 0.4;
          var wt = clamp((t - wd) / Math.max(0.01, 1 - wd), 0, 1);
          p3.curl = easeIn(wt);
          p3.unfurl = lerp(1, 0.15, easeIn(wt * 0.9));
          p3.bright = lerp(p3.origBright, p3.origBright * 0.15, easeIn(wt));
        }
        flower.glow = lerp(0.7, 0.02, easeIn(t));
        // Shed petal particles
        if (Math.random() < 0.2 * speed) {
          emitParticle(flower, false);
        }
        break;

      case PHASE_DECAYING:
        flower.alpha = lerp(1, 0, easeIn(t));
        for (var j4 = 0; j4 < flower.petals.length; j4++) {
          var p4 = flower.petals[j4];
          p4.curl = lerp(p4.curl, 1, t * 0.3);
        }
        flower.glow = lerp(0.05, 0, t);
        if (Math.random() < 0.3 * speed) {
          emitParticle(flower, true);
        }
        if (t >= 1) flower.phase = PHASE_DEAD;
        break;
    }
  }

  // ── Particle emission ──
  function emitParticle(flower, isFinal) {
    var px = flower.pcx + rand(-flower.scale * 0.5, flower.scale * 0.5);
    var py = flower.pcy + rand(-flower.scale * 0.5, flower.scale * 0.3);
    particles.push({
      x: px,
      y: py,
      vx: rand(-0.4, 0.4),
      vy: rand(0.3, 1.2),
      life: 1,
      decay: rand(0.006, 0.018) * GROWTH_SPEED,
      size: rand(1.5, 4),
      bright: isFinal ? rand(0.1, 0.3) : rand(0.3, 0.7),
      rot: rand(0, 6.28),
      rotV: rand(-0.03, 0.03)
    });
  }

  // ── Draw a branch ──
  function drawBranch(branch, alpha) {
    if (branch.progress < 0.01) return;

    var sway = Math.sin(time * 0.6 + branch.swayPhase) * 0.025 * (branch.depth + 1);
    var angle = branch.angle + sway;
    var len = branch.len * branch.progress;

    var x0 = branch.x0;
    var y0 = branch.y0;
    var x1 = x0 + Math.cos(angle) * len;
    var y1 = y0 + Math.sin(angle) * len;

    // Organic curve
    var cpx = (x0 + x1) / 2 + Math.sin(angle + 1.57) * len * branch.curve;
    var cpy = (y0 + y1) / 2 + Math.cos(angle + 1.57) * len * branch.curve;

    var bright = lerp(0.35, 0.65, 1 - branch.depth * 0.3);

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.quadraticCurveTo(cpx, cpy, x1, y1);
    ctx.strokeStyle = stemColor(bright, alpha * lerp(0.5, 0.85, branch.progress));
    ctx.lineWidth = branch.thick * lerp(1, 0.4, branch.progress);
    ctx.lineCap = 'round';
    ctx.stroke();

    // Subtle stem glow at tip
    if (branch.depth === 0 && branch.progress > 0.8) {
      var ga = (branch.progress - 0.8) * 5 * alpha * 0.1;
      var grad = ctx.createRadialGradient(x1, y1, 0, x1, y1, branch.thick * 4);
      grad.addColorStop(0, rgba(200, 130, 60, ga));
      grad.addColorStop(1, rgba(200, 130, 60, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x1, y1, branch.thick * 4, 0, 6.28);
      ctx.fill();
    }
  }

  // ── Draw petal shapes ──
  function drawPetalShape(type, size, unfurl, curl, layer) {
    var cF = curl * 0.7;

    if (type === 0) {
      // Wide rounded petal — like a magnolia petal
      var w = size * 0.45 * unfurl;
      var h = size * 0.85 * unfurl;
      var bulge = 1.3 + layer * 0.1;
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        w * bulge * (1 + cF * 0.2), -h * 0.25 * (1 - cF * 0.5),
        w * (bulge - 0.2) * (1 - cF * 0.15), -h * 0.75 * (1 - cF * 0.3),
        0, -h * (1 - cF * 0.5)
      );
      ctx.bezierCurveTo(
        -w * (bulge - 0.2) * (1 - cF * 0.15), -h * 0.75 * (1 - cF * 0.3),
        -w * bulge * (1 + cF * 0.2), -h * 0.25 * (1 - cF * 0.5),
        0, 0
      );
    } else if (type === 1) {
      // Narrow pointed petal — like a lily petal
      var w2 = size * 0.28 * unfurl;
      var h2 = size * unfurl;
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        w2 * (1.4 + cF * 0.4), -h2 * 0.3 * (1 - cF * 0.6),
        w2 * (0.6 - cF * 0.2), -h2 * 0.9 * (1 - cF * 0.35),
        0, -h2 * (1 - cF * 0.6)
      );
      ctx.bezierCurveTo(
        -w2 * (0.6 - cF * 0.2), -h2 * 0.9 * (1 - cF * 0.35),
        -w2 * (1.4 + cF * 0.4), -h2 * 0.3 * (1 - cF * 0.6),
        0, 0
      );
    } else {
      // Teardrop / organic petal — classic rose petal shape
      var w3 = size * 0.38 * unfurl;
      var h3 = size * 0.9 * unfurl;
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        w3 * (1.2 + cF * 0.3), -h3 * 0.35 * (1 - cF * 0.7),
        w3 * (0.9 - cF * 0.2), -h3 * 0.85 * (1 - cF * 0.4),
        0, -h3 * (1 - cF * 0.55)
      );
      ctx.bezierCurveTo(
        -w3 * (0.9 - cF * 0.2), -h3 * 0.85 * (1 - cF * 0.4),
        -w3 * (1.2 + cF * 0.3), -h3 * 0.35 * (1 - cF * 0.7),
        0, 0
      );
    }
  }

  // ── Draw a single petal ──
  function drawPetal(petal, pcx, pcy, flowerAlpha, flowerGlow, flowerRotation) {
    if (petal.unfurl < 0.02) return;

    var unfurl = petal.unfurl;
    var curl = petal.curl;
    var size = petal.size * unfurl;
    var angle = petal.offsetAngle + flowerRotation + petal.rotOffset + curl * 0.8;

    // Position relative to flower center — petals droop outward when curling
    var droopDist = petal.dist * unfurl + petal.dist * curl * 0.3;
    var droopAngle = petal.offsetAngle + flowerRotation + curl * 0.15;
    var px = pcx + Math.cos(droopAngle) * droopDist;
    var py = pcy + Math.sin(droopAngle) * droopDist + curl * petal.size * 0.4; // droop down

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);

    // Scale slightly when curling for foreshortening effect
    var curlScale = 1 - curl * 0.25;
    ctx.scale(curlScale, 1);

    var bright = petal.bright;
    var baseAlpha = flowerAlpha * lerp(0.25, 0.75, unfurl) * (1 - curl * 0.35);

    // Multiple overlapping layers for depth/richness
    for (var layer = 0; layer < petal.layers; layer++) {
      var lScale = 1 - layer * 0.2;
      var lAlpha = baseAlpha * (1 - layer * 0.18);
      var lBright = clamp(bright + layer * 0.1, 0, 1);

      ctx.beginPath();
      drawPetalShape(petal.type, size * lScale, unfurl, curl, layer);

      // During decay, mix in dark brown
      if (curl > 0.1) {
        ctx.fillStyle = decayColor(lBright * 0.5, lAlpha * curl * 0.6);
        ctx.fill();
        ctx.beginPath();
        drawPetalShape(petal.type, size * lScale, unfurl, curl, layer);
      }

      ctx.fillStyle = petalColor(lBright, lAlpha * (1 - curl * 0.5));
      ctx.fill();

      // Edge highlight — luminous rim on outer petals
      if (layer === 0 && unfurl > 0.4 && curl < 0.6) {
        ctx.strokeStyle = petalColor(clamp(lBright + 0.25, 0, 1), lAlpha * 0.35 * (1 - curl));
        ctx.lineWidth = Math.max(0.3, size * 0.015);
        ctx.stroke();
      }
    }

    // Vein lines radiating from base (only on larger petals, not during heavy decay)
    if (size > 8 && curl < 0.7 && petal.type === 2) {
      var numVeins = 3;
      var vAlpha = baseAlpha * 0.2 * (1 - curl);
      ctx.strokeStyle = petalColor(clamp(bright - 0.2, 0, 1), vAlpha);
      ctx.lineWidth = 0.4;
      for (var v = 0; v < numVeins; v++) {
        var vAngle = (v - 1) * 0.25;
        var vLen = size * 0.6 * unfurl;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(
          Math.sin(vAngle) * vLen * 0.3,
          -vLen * 0.5,
          Math.sin(vAngle) * vLen * 0.15,
          -vLen * 0.8
        );
        ctx.stroke();
      }
    }

    // Per-petal glow at bloom
    if (flowerGlow > 0.2 && curl < 0.3) {
      var ga = (flowerGlow - 0.2) * 0.3 * flowerAlpha * (1 - curl * 3);
      if (ga > 0.005) {
        var grad = ctx.createRadialGradient(0, -size * 0.3, 0, 0, -size * 0.3, size * 1.3);
        grad.addColorStop(0, glowColor(bright, ga * 0.35));
        grad.addColorStop(0.5, glowColor(bright * 0.6, ga * 0.1));
        grad.addColorStop(1, rgba(200, 149, 108, 0));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, -size * 0.3, size * 1.3, 0, 6.28);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ── Draw a complete flower ──
  function drawFlower(flower) {
    if (flower.phase === PHASE_DEAD || flower.alpha < 0.01) return;

    ctx.save();
    ctx.globalAlpha = flower.alpha;

    // Draw stems
    for (var i = 0; i < flower.branches.length; i++) {
      drawBranch(flower.branches[i], flower.alpha);
    }

    // Draw petals — back to front by ring
    for (var j = flower.petals.length - 1; j >= 0; j--) {
      drawPetal(
        flower.petals[j],
        flower.pcx, flower.pcy,
        flower.alpha, flower.glow,
        flower.rotation
      );
    }

    // Central bloom glow
    if (flower.glow > 0.1) {
      var r = flower.scale * 1.2 * flower.glow;
      var ga = flower.glow * 0.2 * flower.alpha;
      var grad = ctx.createRadialGradient(flower.pcx, flower.pcy, 0, flower.pcx, flower.pcy, r);
      grad.addColorStop(0, glowColor(1, ga * 0.8));
      grad.addColorStop(0.3, glowColor(0.7, ga * 0.3));
      grad.addColorStop(0.7, rgba(200, 149, 108, ga * 0.08));
      grad.addColorStop(1, rgba(200, 149, 108, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(flower.pcx, flower.pcy, r, 0, 6.28);
      ctx.fill();

      // Bright center pip
      if (flower.glow > 0.4) {
        var pipR = flower.scale * 0.06;
        var pipA = (flower.glow - 0.4) * flower.alpha * 0.8;
        var pipG = ctx.createRadialGradient(flower.pcx, flower.pcy, 0, flower.pcx, flower.pcy, pipR);
        pipG.addColorStop(0, rgba(255, 235, 200, pipA));
        pipG.addColorStop(0.5, rgba(240, 190, 120, pipA * 0.5));
        pipG.addColorStop(1, rgba(200, 149, 108, 0));
        ctx.fillStyle = pipG;
        ctx.beginPath();
        ctx.arc(flower.pcx, flower.pcy, pipR, 0, 6.28);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ── Particles ──
  function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.012;
      p.vx *= 0.995;
      p.rot += p.rotV;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.life < 0.01) continue;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.life * 0.5;
      ctx.fillStyle = petalColor(p.bright, 1);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.45, 0, 0, 6.28);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Initialize flowers staggered across lifecycle ──
  function initFlowers() {
    flowers = [];
    particles = [];
    buildSpawnZones();

    var count = Math.round(clamp(BLOOM_COUNT, 2, 8));
    for (var i = 0; i < count; i++) {
      var f = createFlower();

      // Stagger phases so we see variety immediately
      var stagger = i / count;
      var totalPhaseTime = 0;
      for (var k = 0; k < PHASE_DURATIONS.length; k++) totalPhaseTime += PHASE_DURATIONS[k];
      var targetTime = stagger * totalPhaseTime;

      // Walk through phases to find starting position
      var elapsed = 0;
      for (var ph = 0; ph < PHASE_DURATIONS.length; ph++) {
        if (elapsed + PHASE_DURATIONS[ph] > targetTime) {
          f.phase = ph;
          f.phaseTime = targetTime - elapsed;
          break;
        }
        elapsed += PHASE_DURATIONS[ph];
      }

      // Fast-forward state to match phase
      if (f.phase >= PHASE_GROWING) {
        for (var b = 0; b < f.branches.length; b++) {
          f.branches[b].progress = f.phase > PHASE_GROWING ? 1 : easeOut(clamp(f.phaseTime / PHASE_DURATIONS[0], 0, 1));
        }
      }
      if (f.phase >= PHASE_BLOOMING) {
        var bt = f.phase > PHASE_BLOOMING ? 1 : clamp(f.phaseTime / PHASE_DURATIONS[1], 0, 1);
        for (var j = 0; j < f.petals.length; j++) {
          var pt = clamp((bt - f.petals[j].delay) / Math.max(0.01, 1 - f.petals[j].delay), 0, 1);
          f.petals[j].unfurl = f.phase > PHASE_BLOOMING ? 1 : easeOut(pt);
        }
      }
      if (f.phase >= PHASE_PEAK) {
        for (var j2 = 0; j2 < f.petals.length; j2++) {
          f.petals[j2].unfurl = 1;
        }
        f.glow = 0.7;
      }
      if (f.phase >= PHASE_WILTING) {
        var wt = clamp(f.phaseTime / PHASE_DURATIONS[3], 0, 1);
        for (var j3 = 0; j3 < f.petals.length; j3++) {
          var wd = j3 / f.petals.length * 0.4;
          var w = clamp((wt - wd) / Math.max(0.01, 1 - wd), 0, 1);
          f.petals[j3].curl = easeIn(w);
          f.petals[j3].unfurl = lerp(1, 0.2, easeIn(w * 0.8));
        }
        f.glow = lerp(0.7, 0.05, easeIn(wt));
      }

      flowers.push(f);
    }
  }

  // ── Main render loop ──
  var lastTime = 0;

  function frame(now) {
    if (!running) { lastTime = 0; return; }
    if (lastTime === 0) lastTime = now;

    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (prefersReduced) dt = 0;
    time += dt;

    // Phosphor trail — semi-transparent clear for ghosting effect
    ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
    ctx.fillRect(0, 0, W, H);

    // Subtle warm ambient radiance
    var ambR = Math.max(W, H) * 0.55;
    var ambG = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, ambR);
    ambG.addColorStop(0, rgba(60, 35, 12, 0.006));
    ambG.addColorStop(1, rgba(10, 10, 10, 0));
    ctx.fillStyle = ambG;
    ctx.fillRect(0, 0, W, H);

    // Update and draw flowers
    for (var i = flowers.length - 1; i >= 0; i--) {
      updateFlower(flowers[i], dt);
      drawFlower(flowers[i]);

      if (flowers[i].phase === PHASE_DEAD) {
        flowers.splice(i, 1);
      }
    }

    // Maintain flower count
    var target = Math.round(clamp(BLOOM_COUNT, 2, 8));
    while (flowers.length < target) {
      flowers.push(createFlower());
    }

    updateParticles(dt);
    drawParticles();

    requestAnimationFrame(frame);
  }

  // ── Start ──
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  initFlowers();
  requestAnimationFrame(frame);

  // ── Visibility pause/resume ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(frame);
    }
  });

  // ── Param handler ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'GROWTH_SPEED': GROWTH_SPEED = e.data.value; break;
        case 'BLOOM_COUNT': BLOOM_COUNT = e.data.value; break;
      }
    }
  });

  // ── Resize handler ──
  window.addEventListener('resize', function () {
    resize();
    buildSpawnZones();
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    initFlowers();
  });
})();
</script>
</body>
</html>
