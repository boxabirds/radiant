<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honey Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Honey Flow</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Honey Flow — Viscous golden fluid with surface tension
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_viscosity;',
    'uniform float u_warmth;',
    '',
    'const float PI = 3.141592653589793;',
    '',
    '// ── Noise utilities ──',
    'vec2 hash2(vec2 p) {',
    '  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));',
    '  return fract(sin(p) * 43758.5453) * 2.0 - 1.0;',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  vec2 u = f * f * (3.0 - 2.0 * f);',
    '  float a = dot(hash2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0));',
    '  float b = dot(hash2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0));',
    '  float c = dot(hash2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0));',
    '  float d = dot(hash2(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0));',
    '  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);',
    '}',
    '',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  for (int i = 0; i < 3; i++) {',
    '    v += a * noise(p);',
    '    p *= 2.0;',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Blob positions — heavy, viscous, gravity-pulled motion ──',
    '// Each blob moves slowly with a dripping/sagging quality',
    'vec3 blobPos(int idx, float t) {',
    '  // Returns vec3(x, y, radius)',
    '  float slow = t * 0.15;',  // very slow base speed
    '  vec3 pos;',
    '  if (idx == 0) {',
    '    // Large central blob, drifts gently',
    '    float drip = sin(slow * 0.7) * 0.08 - abs(sin(slow * 0.35)) * 0.12;',
    '    pos = vec3(',
    '      sin(slow * 0.4 + 0.0) * 0.2 + cos(slow * 0.25) * 0.08,',
    '      cos(slow * 0.3 + 1.0) * 0.15 + drip,',
    '      0.32',
    '    );',
    '  } else if (idx == 1) {',
    '    // Upper blob that sags downward periodically',
    '    float sag = max(sin(slow * 0.5 + 2.0), 0.0) * 0.2;',
    '    pos = vec3(',
    '      cos(slow * 0.35 + 3.5) * 0.3,',
    '      0.2 + sin(slow * 0.25 + 1.5) * 0.1 - sag,',
    '      0.26',
    '    );',
    '  } else if (idx == 2) {',
    '    // Lower blob with stretching drip motion',
    '    float stretch = abs(sin(slow * 0.6 + 1.0)) * 0.15;',
    '    pos = vec3(',
    '      sin(slow * 0.3 + 5.0) * 0.25 + cos(slow * 0.5) * 0.05,',
    '      -0.15 - stretch + sin(slow * 0.2) * 0.1,',
    '      0.28',
    '    );',
    '  } else if (idx == 3) {',
    '    // Right side blob, slow horizontal drift',
    '    float drip2 = max(sin(slow * 0.45 + 3.0), 0.0) * 0.18;',
    '    pos = vec3(',
    '      0.25 + cos(slow * 0.2 + 1.7) * 0.15,',
    '      sin(slow * 0.35 + 5.5) * 0.2 - drip2,',
    '      0.24',
    '    );',
    '  } else {',
    '    // Small wandering blob that creates connecting filaments',
    '    pos = vec3(',
    '      sin(slow * 0.5 + 4.2) * 0.35,',
    '      cos(slow * 0.4 + 2.8) * 0.25 - abs(sin(slow * 0.55)) * 0.1,',
    '      0.2',
    '    );',
    '  }',
    '  return pos;',
    '}',
    '',
    '// ── SDF for the honey metaballs ──',
    'float honeyField(vec2 p, float t) {',
    '  float field = 0.0;',
    '',
    '  // Domain warp for organic surface detail',
    '  vec2 warp = vec2(fbm(p * 2.5 + t * 0.05), fbm(p * 2.5 + vec2(5.2, 1.3) + t * 0.04));',
    '  vec2 wp = p + warp * 0.08;',
    '',
    '  // Accumulate metaball contributions',
    '  // Using smooth polynomial falloff for viscous feel',
    '  vec3 b0 = blobPos(0, t);',
    '  vec3 b1 = blobPos(1, t);',
    '  vec3 b2 = blobPos(2, t);',
    '  vec3 b3 = blobPos(3, t);',
    '  vec3 b4 = blobPos(4, t);',
    '',
    '  float d0 = length(wp - b0.xy) / b0.z;',
    '  float d1 = length(wp - b1.xy) / b1.z;',
    '  float d2 = length(wp - b2.xy) / b2.z;',
    '  float d3 = length(wp - b3.xy) / b3.z;',
    '  float d4 = length(wp - b4.xy) / b4.z;',
    '',
    '  // Smooth cubic falloff — creates thick filaments between blobs',
    '  field += 1.0 / (d0 * d0 * d0 + 0.001);',
    '  field += 1.0 / (d1 * d1 * d1 + 0.001);',
    '  field += 1.0 / (d2 * d2 * d2 + 0.001);',
    '  field += 1.0 / (d3 * d3 * d3 + 0.001);',
    '  field += 1.0 / (d4 * d4 * d4 + 0.001);',
    '',
    '  return field;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '',
    '  // Centered, aspect-corrected coordinates',
    '  vec2 p = (uv - 0.5) * vec2(aspect, 1.0);',
    '',
    '  // Time with viscosity control — higher viscosity = slower',
    '  float t = u_time / (0.5 + u_viscosity * 1.5);',
    '',
    '  // ── Evaluate honey SDF field ──',
    '  float field = honeyField(p, t);',
    '',
    '  // Threshold for honey surface',
    '  float threshold = 8.0;',
    '  float honeyMask = smoothstep(threshold * 0.6, threshold * 1.2, field);',
    '',
    '  // ── Compute gradient for normals (central differences) ──',
    '  float eps = 0.003;',
    '  float fx = honeyField(p + vec2(eps, 0.0), t) - honeyField(p - vec2(eps, 0.0), t);',
    '  float fy = honeyField(p + vec2(0.0, eps), t) - honeyField(p - vec2(0.0, eps), t);',
    '  vec3 normal = normalize(vec3(-fx, -fy, eps * threshold * 12.0));',
    '',
    '  // ── Lighting — Blinn-Phong with warm light ──',
    '  vec3 lightDir = normalize(vec3(0.4, 0.6, 0.8));',
    '  vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '  vec3 halfDir = normalize(lightDir + viewDir);',
    '',
    '  float NdotL = max(dot(normal, lightDir), 0.0);',
    '  float NdotH = max(dot(normal, halfDir), 0.0);',
    '',
    '  // Specular — glossy honey surface',
    '  float specular = pow(NdotH, 64.0);',
    '  float specular2 = pow(NdotH, 16.0);',
    '',
    '  // ── Subsurface scattering approximation ──',
    '  // Thin areas let light through (where field is near threshold)',
    '  float thickness = smoothstep(threshold * 0.6, threshold * 3.0, field);',
    '  float sss = (1.0 - thickness) * max(dot(-normal, lightDir), 0.0);',
    '  sss = sss * sss * 0.8;',
    '',
    '  // Fresnel for edge glow',
    '  float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.0);',
    '',
    '  // ── Color palette with warmth control ──',
    '  float w = u_warmth;',
    '  vec3 darkAmber = mix(vec3(0.08, 0.04, 0.015), vec3(0.15, 0.08, 0.025), w);',
    '  vec3 richGold = mix(vec3(0.65, 0.4, 0.1), vec3(0.85, 0.55, 0.15), w);',
    '  vec3 brightGold = mix(vec3(0.85, 0.6, 0.2), vec3(1.0, 0.85, 0.45), w);',
    '  vec3 sssColor = mix(vec3(0.6, 0.25, 0.05), vec3(0.9, 0.4, 0.1), w);',
    '',
    '  // ── Compose honey surface color ──',
    '  // Base: dark amber to rich gold based on diffuse',
    '  vec3 baseColor = mix(darkAmber, richGold, NdotL * 0.7 + 0.3);',
    '',
    '  // Add surface detail from domain-warped noise',
    '  float surfDetail = fbm(p * 6.0 + t * 0.03) * 0.15 + 0.85;',
    '  baseColor *= surfDetail;',
    '',
    '  // Specular highlights',
    '  baseColor += brightGold * specular * 0.9;',
    '  baseColor += richGold * specular2 * 0.3;',
    '',
    '  // Subsurface scattering — warm glow through thin areas',
    '  baseColor += sssColor * sss;',
    '',
    '  // Fresnel rim',
    '  baseColor += richGold * fresnel * 0.25;',
    '',
    '  // Depth variation — darker in thick pooling areas',
    '  float depth = smoothstep(threshold, threshold * 5.0, field);',
    '  baseColor = mix(baseColor, darkAmber * 0.8, depth * 0.3);',
    '',
    '  // ── Background — dark surface with subtle warm ambient ──',
    '  vec3 bgColor = vec3(0.025, 0.018, 0.012);',
    '',
    '  // Ambient occlusion near honey edges',
    '  float ao = smoothstep(threshold * 0.3, threshold * 0.7, field);',
    '  bgColor *= 1.0 - ao * 0.4;',
    '',
    '  // Subtle reflection on the dark surface from honey glow',
    '  float reflection = smoothstep(threshold * 0.4, threshold * 0.6, field) * (1.0 - honeyMask);',
    '  bgColor += richGold * reflection * 0.08;',
    '',
    '  // ── Final composite ──',
    '  vec3 color = mix(bgColor, baseColor, honeyMask);',
    '',
    '  // ── Vignette ──',
    '  float vig = length(uv - 0.5) * 1.4;',
    '  vig = smoothstep(0.2, 1.5, vig);',
    '  color *= 1.0 - vig * 0.5;',
    '',
    '  // ── Film grain ──',
    '  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + u_time) * 43758.5453);',
    '  color += (grain - 0.5) * 0.012;',
    '',
    '  // Gamma correction — slightly warm',
    '  color = pow(max(color, 0.0), vec3(0.92));',
    '',
    '  color = clamp(color, 0.0, 1.0);',
    '  gl_FragColor = vec4(color, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uViscosity = gl.getUniformLocation(prog, 'u_viscosity');
  var uWarmth = gl.getUniformLocation(prog, 'u_warmth');
  var viscosityVal = 0.5;
  var warmthVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var isVisible = true;

  function render(now) {
    if (!isVisible) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uViscosity, viscosityVal);
    gl.uniform1f(uWarmth, warmthVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    isVisible = !document.hidden;
    if (isVisible) {
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'VISCOSITY': viscosityVal = e.data.value; break;
        case 'WARMTH': warmthVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
