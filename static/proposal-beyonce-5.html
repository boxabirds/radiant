<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Formation Grid</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Formation Grid — Synchronized particle choreography
// ─────────────────────────────────────────────
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ── Tunable parameters ──
  var TRANSITION_SPEED = 0.5;
  var GRID_DENSITY = 1.0;

  // ── DPR & sizing ──
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0;
  var H = 0;
  var CX = 0;
  var CY = 0;
  var minDim = 0;

  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    CX = W / 2;
    CY = H / 2;
    minDim = Math.min(W, H);
  }

  window.addEventListener('resize', function() {
    resize();
    initParticles();
  });
  resize();

  // ── Easing ──
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  // ── Formation definitions ──
  // Each returns normalized coords [-0.5, 0.5] for a given index/total
  function formationGrid(i, total, cols, rows) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = (col / (cols - 1)) - 0.5;
    var y = (row / (rows - 1)) - 0.5;
    return { x: x, y: y };
  }

  function formationCircle(i, total) {
    var rings = 5;
    var ring = Math.floor(i / (total / rings));
    var ringFrac = ring / (rings - 1);
    var radius = 0.12 + ringFrac * 0.38;
    var perRing = Math.floor(total / rings);
    var idxInRing = i % perRing;
    var a = (idxInRing / perRing) * Math.PI * 2 - Math.PI / 2 + ring * 0.3;
    return { x: Math.cos(a) * radius, y: Math.sin(a) * radius };
  }

  function formationDiamond(i, total, cols, rows) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var nx = (col / (cols - 1)) - 0.5;
    var ny = (row / (rows - 1)) - 0.5;
    // Rotate 45 degrees and scale
    var cos45 = 0.7071;
    var rx = (nx * cos45 - ny * cos45) * 0.7;
    var ry = (nx * cos45 + ny * cos45) * 0.7;
    return { x: rx, y: ry };
  }

  function formationHexagon(i, total) {
    var sides = 6;
    var layers = 6;
    var layer = Math.floor(i / (total / layers));
    var layerFrac = layer / (layers - 1);
    var radius = 0.08 + layerFrac * 0.4;
    var perLayer = Math.floor(total / layers);
    var idxInLayer = i % perLayer;
    var baseAngle = (idxInLayer / perLayer) * Math.PI * 2;
    // Snap to hexagonal shape
    var sideAngle = Math.PI * 2 / sides;
    var sector = Math.floor(baseAngle / sideAngle);
    var sectorFrac = (baseAngle - sector * sideAngle) / sideAngle;
    var a1 = sector * sideAngle - Math.PI / 2;
    var a2 = (sector + 1) * sideAngle - Math.PI / 2;
    var x = radius * ((1 - sectorFrac) * Math.cos(a1) + sectorFrac * Math.cos(a2));
    var y = radius * ((1 - sectorFrac) * Math.sin(a1) + sectorFrac * Math.sin(a2));
    return { x: x, y: y };
  }

  function formationSpiral(i, total) {
    var t = i / total;
    var angle = t * Math.PI * 2 * 4;
    var radius = 0.05 + t * 0.43;
    return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
  }

  function formationWave(i, total, cols, rows, time) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var nx = (col / (cols - 1)) - 0.5;
    var ny = (row / (rows - 1)) - 0.5;
    var wave = Math.sin(nx * Math.PI * 3 + time * 0.5) * 0.12;
    return { x: nx, y: ny + wave };
  }

  // ── Particles ──
  var particles = [];
  var COLS = 0;
  var ROWS = 0;
  var TOTAL = 0;

  function initParticles() {
    var density = GRID_DENSITY;
    var baseCols = Math.round(24 * density);
    var baseRows = Math.round(20 * density);
    // Adjust for aspect ratio
    var aspect = W / H;
    COLS = Math.max(8, Math.round(baseCols * Math.sqrt(aspect)));
    ROWS = Math.max(8, Math.round(baseRows / Math.sqrt(aspect)));
    TOTAL = COLS * ROWS;

    // Keep existing particles if count matches, otherwise rebuild
    if (particles.length === TOTAL) return;

    particles = [];
    for (var i = 0; i < TOTAL; i++) {
      var gp = formationGrid(i, TOTAL, COLS, ROWS);
      // Scale dot size based on spacing between dots so they don't merge on small canvases
      var dotSpacing = minDim * 0.8 / Math.max(COLS, ROWS);
      var baseSize = Math.max(1.0, Math.min(2.5, dotSpacing * 0.12));
      particles.push({
        x: CX + gp.x * minDim * 0.8,
        y: CY + gp.y * minDim * 0.8,
        targetX: CX + gp.x * minDim * 0.8,
        targetY: CY + gp.y * minDim * 0.8,
        prevX: CX + gp.x * minDim * 0.8,
        prevY: CY + gp.y * minDim * 0.8,
        size: baseSize + Math.random() * (baseSize * 0.25),
        distFromCenter: 0,
        delay: 0
      });
    }
  }

  initParticles();

  // ── Formation sequencing ──
  var formations = [
    { name: 'grid', fn: formationGrid },
    { name: 'circle', fn: formationCircle },
    { name: 'diamond', fn: formationDiamond },
    { name: 'hexagon', fn: formationHexagon },
    { name: 'spiral', fn: formationSpiral },
    { name: 'wave', fn: formationWave }
  ];

  var currentFormation = 0;
  var nextFormation = 1;
  var transitionProgress = 0;
  var holdTime = 0;
  var HOLD_DURATION = 2.5; // seconds to hold each formation
  var TRANSITION_DURATION = 2.0; // seconds for transition
  var isTransitioning = false;
  var transitionStarted = false;

  function getFormationPosition(formIdx, particleIdx, time) {
    var f = formations[formIdx];
    var pos;
    switch (f.name) {
      case 'grid':
        pos = formationGrid(particleIdx, TOTAL, COLS, ROWS);
        break;
      case 'circle':
        pos = formationCircle(particleIdx, TOTAL);
        break;
      case 'diamond':
        pos = formationDiamond(particleIdx, TOTAL, COLS, ROWS);
        break;
      case 'hexagon':
        pos = formationHexagon(particleIdx, TOTAL);
        break;
      case 'spiral':
        pos = formationSpiral(particleIdx, TOTAL);
        break;
      case 'wave':
        pos = formationWave(particleIdx, TOTAL, COLS, ROWS, time);
        break;
      default:
        pos = formationGrid(particleIdx, TOTAL, COLS, ROWS);
    }
    return {
      x: CX + pos.x * minDim * 0.8,
      y: CY + pos.y * minDim * 0.8
    };
  }

  // ── Compute stagger delays based on distance from center ──
  function computeDelays() {
    var maxDist = 0;
    for (var i = 0; i < particles.length; i++) {
      var dx = particles[i].x - CX;
      var dy = particles[i].y - CY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      particles[i].distFromCenter = dist;
      if (dist > maxDist) maxDist = dist;
    }
    for (var i = 0; i < particles.length; i++) {
      // Normalize delay: center moves first, edges move last
      particles[i].delay = (particles[i].distFromCenter / (maxDist || 1)) * 0.35;
    }
  }

  // ── Neighbor connections ──
  // Find nearest neighbors for connection lines (precomputed per formation)
  var neighborPairs = [];

  function computeNeighbors(formIdx, time) {
    neighborPairs = [];
    var positions = [];
    for (var i = 0; i < particles.length; i++) {
      positions.push(getFormationPosition(formIdx, i, time));
    }

    // For grid-like formations, connect grid neighbors
    // For others, connect by proximity
    var connectionDist = minDim * 0.8 / Math.max(COLS, ROWS) * 1.6;

    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = positions[i].x - positions[j].x;
        var dy = positions[i].y - positions[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < connectionDist) {
          neighborPairs.push({ a: i, b: j });
        }
      }
    }

    // Cap neighbors to avoid performance issues
    if (neighborPairs.length > TOTAL * 3) {
      neighborPairs.sort(function(a, b) {
        var dxA = particles[a.a].targetX - particles[a.b].targetX;
        var dyA = particles[a.a].targetY - particles[a.b].targetY;
        var dxB = particles[b.a].targetX - particles[b.b].targetX;
        var dyB = particles[b.a].targetY - particles[b.b].targetY;
        return (dxA * dxA + dyA * dyA) - (dxB * dxB + dyB * dyB);
      });
      neighborPairs.length = TOTAL * 3;
    }
  }

  // Initial neighbor computation
  computeNeighbors(0, 0);

  // ── Cached glow sprite (offscreen canvas) ──
  // Drawing one radial gradient per particle per frame is expensive.
  // Instead, pre-render a glow sprite and stamp it with drawImage + globalAlpha.
  var glowCanvas = document.createElement('canvas');
  var glowCtx = glowCanvas.getContext('2d');
  var GLOW_SPRITE_SIZE = 64;

  function buildGlowSprite() {
    glowCanvas.width = GLOW_SPRITE_SIZE;
    glowCanvas.height = GLOW_SPRITE_SIZE;
    var cx = GLOW_SPRITE_SIZE / 2;
    var cy = GLOW_SPRITE_SIZE / 2;
    var r = GLOW_SPRITE_SIZE / 2;

    // Outer glow layer
    var grad = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, 'rgba(255, 220, 160, 1.0)');
    grad.addColorStop(0.15, 'rgba(255, 220, 160, 0.9)');
    grad.addColorStop(0.3, 'rgba(200, 149, 108, 0.5)');
    grad.addColorStop(0.6, 'rgba(200, 149, 108, 0.15)');
    grad.addColorStop(1, 'rgba(200, 149, 108, 0)');
    glowCtx.fillStyle = grad;
    glowCtx.fillRect(0, 0, GLOW_SPRITE_SIZE, GLOW_SPRITE_SIZE);
  }

  buildGlowSprite();

  // Flash sprite (brighter, for snap moments)
  var flashCanvas = document.createElement('canvas');
  var flashCtx = flashCanvas.getContext('2d');

  function buildFlashSprite() {
    flashCanvas.width = GLOW_SPRITE_SIZE;
    flashCanvas.height = GLOW_SPRITE_SIZE;
    var cx = GLOW_SPRITE_SIZE / 2;
    var cy = GLOW_SPRITE_SIZE / 2;
    var r = GLOW_SPRITE_SIZE / 2;

    var grad = flashCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, 'rgba(255, 240, 200, 1.0)');
    grad.addColorStop(0.15, 'rgba(255, 240, 200, 0.95)');
    grad.addColorStop(0.3, 'rgba(255, 220, 160, 0.6)');
    grad.addColorStop(0.6, 'rgba(200, 149, 108, 0.2)');
    grad.addColorStop(1, 'rgba(200, 149, 108, 0)');
    flashCtx.fillStyle = grad;
    flashCtx.fillRect(0, 0, GLOW_SPRITE_SIZE, GLOW_SPRITE_SIZE);
  }

  buildFlashSprite();

  // ── Animation state ──
  var running = true;
  var lastTimestamp = 0;
  var elapsedTime = 0;
  var pulsePhase = 0;

  function render(timestamp) {
    if (!running) {
      requestAnimationFrame(render);
      return;
    }

    if (lastTimestamp === 0) lastTimestamp = timestamp;
    var dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
    lastTimestamp = timestamp;

    if (prefersReduced) dt = 0;

    elapsedTime += dt;
    pulsePhase += dt * 2.5;

    // ── Formation state machine ──
    if (!isTransitioning) {
      holdTime += dt;
      if (holdTime >= HOLD_DURATION) {
        isTransitioning = true;
        transitionProgress = 0;
        transitionStarted = false;
        nextFormation = (currentFormation + 1) % formations.length;
      }
    }

    if (isTransitioning) {
      if (!transitionStarted) {
        transitionStarted = true;
        computeDelays();
        computeNeighbors(nextFormation, elapsedTime);
        // Snapshot current positions as prev
        for (var i = 0; i < particles.length; i++) {
          particles[i].prevX = particles[i].x;
          particles[i].prevY = particles[i].y;
          // Compute target
          var tp = getFormationPosition(nextFormation, i, elapsedTime);
          particles[i].targetX = tp.x;
          particles[i].targetY = tp.y;
        }
      }

      var speed = TRANSITION_SPEED;
      transitionProgress += dt * speed / TRANSITION_DURATION;

      if (transitionProgress >= 1.0) {
        transitionProgress = 1.0;
        isTransitioning = false;
        currentFormation = nextFormation;
        holdTime = 0;
        // Snap particles to final positions
        for (var i = 0; i < particles.length; i++) {
          particles[i].x = particles[i].targetX;
          particles[i].y = particles[i].targetY;
        }
      }
    }

    // ── Update particle positions ──
    if (isTransitioning) {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        // Stagger: subtract delay from progress, clamp to [0, 1]
        var staggered = (transitionProgress - p.delay) / (1.0 - p.delay);
        staggered = Math.max(0, Math.min(1, staggered));
        var eased = easeInOutCubic(staggered);
        p.x = p.prevX + (p.targetX - p.prevX) * eased;
        p.y = p.prevY + (p.targetY - p.prevY) * eased;
      }
    } else if (formations[currentFormation].name === 'wave') {
      // Update wave formation continuously
      for (var i = 0; i < particles.length; i++) {
        var tp = getFormationPosition(currentFormation, i, elapsedTime);
        particles[i].x = tp.x;
        particles[i].y = tp.y;
      }
    }

    // ── Draw ──
    // Full clear each frame — no phosphor trail, consistent glow appearance
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // ── Draw connection lines ──
    var lineAlpha = isTransitioning
      ? 0.08 * (1 - Math.abs(transitionProgress - 0.5) * 2) + 0.03
      : 0.1;

    if (neighborPairs.length > 0) {
      var maxLineDist = minDim * 0.8 / Math.max(COLS, ROWS) * 1.8;
      ctx.strokeStyle = 'rgba(150, 110, 70, ' + (lineAlpha * 0.6) + ')';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (var n = 0; n < neighborPairs.length; n++) {
        var pair = neighborPairs[n];
        var pa = particles[pair.a];
        var pb = particles[pair.b];
        var dx = pa.x - pb.x;
        var dy = pa.y - pb.y;
        var dist = dx * dx + dy * dy;
        if (dist < maxLineDist * maxLineDist) {
          ctx.moveTo(pa.x, pa.y);
          ctx.lineTo(pb.x, pb.y);
        }
      }
      ctx.stroke();
    }

    // ── Draw particles ──
    // Synchronized size pulse
    var pulseFactor = 1.0 + 0.25 * Math.sin(pulsePhase);
    // Consistent glow — no flash switching
    var sprite = glowCanvas;
    var baseAlpha = 0.7;

    ctx.globalCompositeOperation = 'lighter';

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var drawSize = p.size * pulseFactor * 4;

      // Draw glow sprite with additive blending
      ctx.globalAlpha = baseAlpha;
      ctx.drawImage(sprite, p.x - drawSize, p.y - drawSize, drawSize * 2, drawSize * 2);
    }

    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1.0;

    // ── Vignette ──
    var vigGrad = ctx.createRadialGradient(CX, CY, minDim * 0.25, CX, CY, Math.max(W, H) * 0.7);
    vigGrad.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vigGrad.addColorStop(1, 'rgba(10, 10, 10, 0.5)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTimestamp = 0;
      requestAnimationFrame(render);
    }
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TRANSITION_SPEED': TRANSITION_SPEED = e.data.value; break;
        case 'GRID_DENSITY':
          GRID_DENSITY = e.data.value;
          initParticles();
          computeNeighbors(currentFormation, elapsedTime);
          break;
      }
    }
  });
})();
</script>
</body>
</html>
