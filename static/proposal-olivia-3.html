<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Peel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Sticker Peel</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_peelSpeed;',
    'uniform float u_iridescence;',
    '',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '#define NUM_STICKERS 7',
    '',
    '// --- Hash / noise ---',
    'float hash(vec2 p){',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n){',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    'vec3 hash3(float n){',
    '  return fract(sin(vec3(n, n+1.0, n+2.0)) * vec3(43758.5453, 22578.1459, 19642.3490));',
    '}',
    '',
    '// Simple value noise',
    'float vnoise(vec2 p){',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f*f*(3.0-2.0*f);',
    '  float a = hash(i);',
    '  float b = hash(i+vec2(1.0,0.0));',
    '  float c = hash(i+vec2(0.0,1.0));',
    '  float d = hash(i+vec2(1.0,1.0));',
    '  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);',
    '}',
    '',
    '// Rounded rectangle SDF',
    'float sdRoundedRect(vec2 p, vec2 b, float r){',
    '  vec2 d = abs(p) - b + r;',
    '  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;',
    '}',
    '',
    '// Rotate 2D',
    'vec2 rot2d(vec2 p, float a){',
    '  float c = cos(a);',
    '  float s = sin(a);',
    '  return vec2(p.x*c - p.y*s, p.x*s + p.y*c);',
    '}',
    '',
    '// Thin-film iridescence - spectral interference',
    'vec3 iridescent(float angle, float thickness, float intensity){',
    '  float d = thickness * 800.0;',
    '  float cosA = cos(angle * 0.5);',
    '  float opd = 2.0 * 1.5 * d * cosA;',
    '  float phaseR = TAU * opd / 680.0;',
    '  float phaseG = TAU * opd / 530.0;',
    '  float phaseB = TAU * opd / 470.0;',
    '  vec3 col = vec3(',
    '    0.5 + 0.5 * cos(phaseR),',
    '    0.5 + 0.5 * cos(phaseG),',
    '    0.5 + 0.5 * cos(phaseB)',
    '  );',
    '  // Boost saturation',
    '  col = mix(vec3(dot(col, vec3(0.299, 0.587, 0.114))), col, 1.0 + intensity * 0.5);',
    '  // Purple-pink tint for Olivia vibe',
    '  col *= vec3(1.05, 0.92, 1.08);',
    '  col += vec3(0.04, 0.01, 0.06);',
    '  return clamp(col, 0.0, 1.0);',
    '}',
    '',
    '// Chrome/metallic reflection',
    'vec3 chromeColor(vec2 p, float t){',
    '  // Fake environment map - silver with subtle distortion',
    '  float env = vnoise(p * 3.0 + t * 0.3) * 0.3 + 0.7;',
    '  float env2 = vnoise(p * 8.0 - t * 0.2) * 0.15;',
    '  // Streaky reflections',
    '  float streak = smoothstep(0.3, 0.7, vnoise(vec2(p.x * 12.0, p.y * 2.0 + t * 0.5)));',
    '  vec3 chrome = vec3(0.75, 0.78, 0.82) * env + vec3(0.15) * streak + env2;',
    '  // Add subtle warm specular',
    '  chrome += vec3(0.1, 0.08, 0.06) * smoothstep(0.6, 1.0, env);',
    '  return chrome;',
    '}',
    '',
    '// Compute a single sticker',
    '// Returns vec4: rgb color, a = coverage',
    'vec4 sticker(vec2 uv, vec2 center, vec2 size, float cornerR, float peelPhase, float peelAngle, float seed, float t){',
    '  // Local coordinates relative to sticker center',
    '  vec2 lp = uv - center;',
    '',
    '  // Slight random rotation for each sticker',
    '  float stickerRot = hash1(seed * 7.0) * 0.3 - 0.15;',
    '  lp = rot2d(lp, stickerRot);',
    '',
    '  // SDF for the sticker boundary',
    '  float d = sdRoundedRect(lp, size, cornerR);',
    '  float mask = smoothstep(0.003, -0.003, d);',
    '  if(mask < 0.001) return vec4(0.0);',
    '',
    '  // --- Peel computation ---',
    '  // Peel line sweeps across the sticker',
    '  // peelPhase: 0 = flat, 0.5 = halfway peeled, 1 = fully peeled then back',
    '  // Use a smooth ping-pong',
    '  float pp = peelPhase;',
    '  // Smooth ease in/out',
    '  float peelAmount = smoothstep(0.0, 0.5, pp) - smoothstep(0.5, 1.0, pp);',
    '  peelAmount = peelAmount * 1.8; // Allow overshoot for drama',
    '  peelAmount = clamp(peelAmount, 0.0, 0.95);',
    '',
    '  // Direction of peel (from one corner)',
    '  vec2 peelDir = vec2(cos(peelAngle), sin(peelAngle));',
    '',
    '  // The peel line position: starts outside the sticker and sweeps across',
    '  float maxExtent = length(size) * 1.2;',
    '  float peelLinePos = mix(-maxExtent, maxExtent, peelAmount);',
    '',
    '  // Signed distance from this pixel to the peel line',
    '  float peelDist = dot(lp, peelDir) - peelLinePos;',
    '',
    '  // Peel transition width (curl zone)',
    '  float curlWidth = 0.04 + 0.02 * peelAmount;',
    '',
    '  // Is this pixel peeled or not?',
    '  float isPeeled = smoothstep(-curlWidth, curlWidth, peelDist);',
    '',
    '  // --- Face color (iridescent holographic) ---',
    '  // Viewing angle based on position within sticker',
    '  float viewAngle = length(lp / size) * PI * 0.3;',
    '  // Add noise-based thickness variation for holographic sparkle',
    '  float thicknessVar = vnoise(lp * 25.0 + seed * 10.0) * 0.4 + 0.5;',
    '  thicknessVar += vnoise(lp * 60.0 + t * 0.5) * 0.15;',
    '  // Angle-dependent shifting',
    '  float shiftAngle = viewAngle + dot(lp, vec2(3.0, 5.0)) + t * 0.3;',
    '  vec3 faceCol = iridescent(shiftAngle, thicknessVar, u_iridescence);',
    '',
    '  // Holographic sparkle highlights',
    '  float sparkle = vnoise(lp * 80.0 + vec2(t * 0.8, t * 0.6));',
    '  sparkle = smoothstep(0.72, 0.85, sparkle);',
    '  faceCol += vec3(0.4, 0.35, 0.5) * sparkle * u_iridescence * 0.5;',
    '',
    '  // Subtle fine grid pattern on holographic face',
    '  float grid = smoothstep(0.95, 1.0, max(',
    '    abs(sin(lp.x * 200.0)),',
    '    abs(sin(lp.y * 200.0))',
    '  ));',
    '  faceCol += vec3(0.08) * grid * 0.3;',
    '',
    '  // --- Chrome underside ---',
    '  // When peeled, we see the mirror/chrome backing',
    '  // Reflected coordinate (mirrored across peel line)',
    '  vec2 reflectedLP = lp - 2.0 * peelDist * peelDir;',
    '  // Foreshortening: compress the reflected part',
    '  float foreshorten = 0.8 + 0.2 * (1.0 - peelAmount);',
    '  vec2 chromeUV = reflectedLP * foreshorten;',
    '  vec3 underCol = chromeColor(chromeUV, t);',
    '',
    '  // Add slight purple-pink tint to chrome for Olivia vibe',
    '  underCol += vec3(0.03, 0.0, 0.05);',
    '',
    '  // --- Curl highlight at the fold line ---',
    '  float curlHighlight = exp(-peelDist * peelDist / (curlWidth * curlWidth * 0.5));',
    '  vec3 curlCol = vec3(1.0, 0.97, 0.95) * curlHighlight * 0.7;',
    '',
    '  // --- Shadow under the peeled portion ---',
    '  float shadow = smoothstep(curlWidth * 3.0, 0.0, peelDist) * peelAmount * 0.35;',
    '',
    '  // --- Compose ---',
    '  vec3 col = mix(faceCol, underCol, isPeeled);',
    '  col += curlCol * mask;',
    '',
    '  // Darken behind the peel (shadow on surface)',
    '  col *= 1.0 - shadow * (1.0 - isPeeled);',
    '',
    '  // Sticker edge - subtle bright rim',
    '  float edge = smoothstep(0.006, 0.0, abs(d)) * 0.3;',
    '  col += vec3(0.5, 0.45, 0.55) * edge;',
    '',
    '  // Shadow under entire sticker (lifted on peeled side)',
    '  float liftAmount = peelAmount * 0.3;',
    '',
    '  return vec4(col * mask, mask);',
    '}',
    '',
    'void main(){',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  vec2 uv = fragCoord / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 p = (uv - 0.5) * vec2(aspect, 1.0);',
    '  float t = u_time * u_peelSpeed;',
    '',
    '  // Background - dark with subtle purple-pink gradient',
    '  vec3 bg = vec3(0.039, 0.035, 0.043);',
    '  // Subtle radial gradient',
    '  float bgGrad = 1.0 - length(p) * 0.6;',
    '  bg += vec3(0.02, 0.005, 0.03) * bgGrad;',
    '  // Ambient noise texture on background',
    '  bg += (vnoise(p * 15.0 + t * 0.1) - 0.5) * 0.008;',
    '',
    '  vec3 col = bg;',
    '',
    '  // Drop shadows layer (rendered first, behind stickers)',
    '  for(int i = 0; i < NUM_STICKERS; i++){',
    '    float fi = float(i);',
    '    float seed = fi * 13.37;',
    '    vec3 rnd = hash3(seed);',
    '    vec3 rnd2 = hash3(seed + 50.0);',
    '',
    '    // Position: spread across screen',
    '    vec2 center = vec2(',
    '      (rnd.x - 0.5) * aspect * 1.4,',
    '      (rnd.y - 0.5) * 1.2',
    '    );',
    '',
    '    // Size variation',
    '    vec2 sz = vec2(0.08 + rnd.z * 0.07, 0.06 + rnd2.x * 0.05);',
    '    // Some stickers are wider, some taller',
    '    if(hash1(seed + 3.0) > 0.5) sz = sz.yx;',
    '',
    '    float cornerR = 0.012 + rnd2.y * 0.008;',
    '',
    '    // Peel phase - each sticker at different phase, offset by seed',
    '    float peelCycleTime = 4.0 + rnd2.z * 3.0;',
    '    float rawPhase = fract((t + rnd.x * 20.0) / peelCycleTime);',
    '    // Add rest periods: sticker lies flat for part of cycle',
    '    float peelPhase = smoothstep(0.15, 0.45, rawPhase) - smoothstep(0.55, 0.85, rawPhase);',
    '    peelPhase = clamp(peelPhase, 0.0, 1.0);',
    '',
    '    // Peel angle varies per sticker',
    '    float peelAngle = rnd2.x * TAU;',
    '',
    '    // Compute sticker rotation to match the sticker function',
    '    float stickerRot = hash1(seed * 7.0) * 0.3 - 0.15;',
    '    vec2 lp = rot2d(p - center, stickerRot);',
    '',
    '    // Shadow (offset down-right, blurred)',
    '    float peelLift = peelPhase * 0.015;',
    '    vec2 shadowOffset = vec2(0.008 + peelLift, -0.008 - peelLift);',
    '    float shadowDist = sdRoundedRect(lp + shadowOffset, sz, cornerR);',
    '    float shadowMask = smoothstep(0.02 + peelLift * 2.0, -0.005, shadowDist);',
    '    col *= 1.0 - shadowMask * (0.25 + peelPhase * 0.15);',
    '  }',
    '',
    '  // Sticker layers (back to front by index)',
    '  for(int i = 0; i < NUM_STICKERS; i++){',
    '    float fi = float(i);',
    '    float seed = fi * 13.37;',
    '    vec3 rnd = hash3(seed);',
    '    vec3 rnd2 = hash3(seed + 50.0);',
    '',
    '    vec2 center = vec2(',
    '      (rnd.x - 0.5) * aspect * 1.4,',
    '      (rnd.y - 0.5) * 1.2',
    '    );',
    '',
    '    vec2 sz = vec2(0.08 + rnd.z * 0.07, 0.06 + rnd2.x * 0.05);',
    '    if(hash1(seed + 3.0) > 0.5) sz = sz.yx;',
    '',
    '    float cornerR = 0.012 + rnd2.y * 0.008;',
    '',
    '    float peelCycleTime = 4.0 + rnd2.z * 3.0;',
    '    float rawPhase = fract((t + rnd.x * 20.0) / peelCycleTime);',
    '    float peelPhase = smoothstep(0.15, 0.45, rawPhase) - smoothstep(0.55, 0.85, rawPhase);',
    '    peelPhase = clamp(peelPhase, 0.0, 1.0);',
    '',
    '    float peelAngle = rnd2.x * TAU;',
    '',
    '    vec4 s = sticker(p, center, sz, cornerR, peelPhase, peelAngle, seed, t);',
    '    col = mix(col, s.rgb, s.a);',
    '  }',
    '',
    '  // --- Floating ambient particles (tiny holographic dust) ---',
    '  for(int i = 0; i < 15; i++){',
    '    float fi = float(i);',
    '    float seed = fi * 7.13 + 100.0;',
    '    vec2 particlePos = vec2(',
    '      sin(t * 0.3 * hash1(seed) + seed) * aspect * 0.5,',
    '      cos(t * 0.2 * hash1(seed + 1.0) + seed * 1.3) * 0.5',
    '    );',
    '    float dist = length(p - particlePos);',
    '    float glow = exp(-dist * dist * 8000.0) * 0.3;',
    '    vec3 particleCol = iridescent(t * 0.5 + fi, 0.5 + fi * 0.1, u_iridescence);',
    '    col += particleCol * glow;',
    '  }',
    '',
    '  // --- Vignette ---',
    '  float vig = 1.0 - smoothstep(0.4, 1.2, length(p * vec2(0.8, 1.0)));',
    '  col *= 0.65 + 0.35 * vig;',
    '',
    '  // --- Film grain ---',
    '  float grain = (fract(sin(dot(fragCoord, vec2(12.9898, 78.233)) + fract(u_time * 0.1) * 100.0) * 43758.5453) - 0.5) * 0.015;',
    '  col += grain;',
    '',
    '  // Subtle tone mapping',
    '  col = col * col * (3.0 - 2.0 * col);',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uPeelSpeed = gl.getUniformLocation(prog, 'u_peelSpeed');
  var uIridescence = gl.getUniformLocation(prog, 'u_iridescence');
  var peelSpeedVal = 0.5;
  var iridescenceVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uPeelSpeed, peelSpeedVal);
    gl.uniform1f(uIridescence, iridescenceVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        if (!running) {
          running = true;
          requestAnimationFrame(render);
        }
      } else {
        running = false;
      }
    });
  }, { threshold: 0.01 });
  observer.observe(canvas);

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'PEEL_SPEED': peelSpeedVal = e.data.value; break;
        case 'IRIDESCENCE': iridescenceVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
