<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satin Ripple</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; top: 20px; left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5); z-index: 10; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div class="label">Satin Ripple</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  if (!ctx) return;

  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;
  var W = 0;
  var H = 0;

  // Controllable parameters
  var RIPPLE_SPEED = 0.6;
  var SHEEN_INTENSITY = 1.0;

  // Number of ribbon strips
  var NUM_RIBBONS = 36;
  // Points per ribbon edge
  var POINTS = 80;

  // Noise texture for fabric grain (created once)
  var noiseCanvas = document.createElement('canvas');
  var noiseCtx = noiseCanvas.getContext('2d');
  var noiseSize = 256;
  noiseCanvas.width = noiseSize;
  noiseCanvas.height = noiseSize;

  function generateNoise() {
    var imgData = noiseCtx.createImageData(noiseSize, noiseSize);
    var data = imgData.data;
    for (var i = 0; i < data.length; i += 4) {
      var v = Math.random() * 255;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 12; // very low opacity
    }
    noiseCtx.putImageData(imgData, 0, 0);
  }
  generateNoise();

  // Simple seeded pseudo-random for consistent ribbon offsets
  var ribbonSeeds = [];
  for (var i = 0; i < NUM_RIBBONS; i++) {
    ribbonSeeds.push({
      phaseX: Math.random() * Math.PI * 2,
      phaseY: Math.random() * Math.PI * 2,
      freqX: 0.8 + Math.random() * 1.2,
      freqY: 0.5 + Math.random() * 0.8,
      ampX: 0.3 + Math.random() * 0.7,
      sheenOffset: Math.random() * Math.PI * 2
    });
  }

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      W = w;
      H = h;
    }
  }

  // Color palette
  // Shadow: deep rose
  var shadowR = 58, shadowG = 10, shadowB = 10;
  // Shadow2: slightly lighter
  var shadow2R = 90, shadow2G = 21, shadow2B = 21;
  // Mid: champagne pink
  var midR = 200, midG = 104, midB = 104;
  // Mid2: lighter pink
  var mid2R = 216, mid2G = 128, mid2B = 128;
  // Highlight: bright warm white-pink
  var hiR = 255, hiG = 224, hiB = 216;
  // Highlight2: brightest
  var hi2R = 255, hi2G = 240, hi2B = 235;

  function lerpColor(r1, g1, b1, r2, g2, b2, t) {
    return [
      Math.round(r1 + (r2 - r1) * t),
      Math.round(g1 + (g2 - g1) * t),
      Math.round(b1 + (b2 - b1) * t)
    ];
  }

  // Compute vertical displacement for a ribbon at horizontal position x (0..1) and time t
  // Each ribbon has unique wave characteristics
  function ribbonDisplacement(x, t, seed) {
    var timeAdjust = prefersReduced ? 0 : t * RIPPLE_SPEED;
    // Multiple sine waves for complex draping
    var d = 0;
    d += Math.sin(x * Math.PI * 2 * seed.freqX + timeAdjust * 0.7 + seed.phaseX) * seed.ampX * 0.5;
    d += Math.sin(x * Math.PI * 4 * seed.freqY + timeAdjust * 0.5 + seed.phaseY) * seed.ampX * 0.25;
    d += Math.sin(x * Math.PI * 1.3 + timeAdjust * 0.3 + seed.phaseX * 2) * seed.ampX * 0.35;
    // Slow large wave
    d += Math.sin(x * Math.PI * 0.7 + timeAdjust * 0.2 + seed.phaseY * 1.5) * seed.ampX * 0.4;
    return d;
  }

  // Compute slope (derivative) for sheen calculation
  function ribbonSlope(x, t, seed, dx) {
    var d1 = ribbonDisplacement(x - dx, t, seed);
    var d2 = ribbonDisplacement(x + dx, t, seed);
    return (d2 - d1) / (2 * dx);
  }

  function drawRibbons(t) {
    var ribbonHeight = H / (NUM_RIBBONS - 2); // slight overlap
    var overlapPx = ribbonHeight * 0.15;

    for (var ri = 0; ri < NUM_RIBBONS; ri++) {
      var seed = ribbonSeeds[ri];
      var baseY = (ri / (NUM_RIBBONS - 1)) * H;
      var topY = baseY - ribbonHeight * 0.5;
      var botY = baseY + ribbonHeight * 0.5 + overlapPx;

      // Build top and bottom edge points
      var topPoints = [];
      var botPoints = [];
      var slopes = [];
      var dx = 1.0 / POINTS;

      for (var pi = 0; pi <= POINTS; pi++) {
        var xNorm = pi / POINTS;
        var xPx = xNorm * W;

        var disp = ribbonDisplacement(xNorm, t, seed);
        var dispPx = disp * ribbonHeight * 0.6;

        var tY = topY + dispPx;
        var bY = botY + dispPx;

        topPoints.push({ x: xPx, y: tY });
        botPoints.push({ x: xPx, y: bY });

        // Compute slope for sheen
        var slope = ribbonSlope(xNorm, t, seed, dx * 0.5);
        slopes.push(slope);
      }

      // Draw the ribbon shape using bezier curves and fill with gradient
      // We draw in vertical slices to apply per-column sheen coloring
      var sliceWidth = W / POINTS;

      for (var si = 0; si < POINTS; si++) {
        var tp0 = topPoints[si];
        var tp1 = topPoints[si + 1];
        var bp0 = botPoints[si];
        var bp1 = botPoints[si + 1];
        var slope = slopes[si];

        // Sheen based on slope: positive slope = fabric curving up = highlight
        // negative slope = curving down = shadow
        // Use atan to normalize slope to -1..1 range
        var slopeNorm = Math.atan(slope * 2) / (Math.PI * 0.5); // -1 to 1

        // Also add a slow-moving sheen wave
        var timeAdjust = prefersReduced ? 0 : t * RIPPLE_SPEED;
        var sheenWave = Math.sin((si / POINTS) * Math.PI * 3 + timeAdjust * 0.4 + seed.sheenOffset);
        var sheenFactor = slopeNorm * 0.6 + sheenWave * 0.4;
        sheenFactor = sheenFactor * SHEEN_INTENSITY;

        // Map sheenFactor to color
        // -1 = deep shadow, 0 = mid pink, 1 = bright highlight
        var r, g, b;
        if (sheenFactor < -0.3) {
          // Deep shadow to shadow
          var tt = (sheenFactor + 1) / 0.7; // 0 to 1
          tt = Math.max(0, Math.min(1, tt));
          var c = lerpColor(shadowR, shadowG, shadowB, shadow2R, shadow2G, shadow2B, tt);
          r = c[0]; g = c[1]; b = c[2];
        } else if (sheenFactor < 0.2) {
          // Shadow to mid
          var tt = (sheenFactor + 0.3) / 0.5;
          tt = Math.max(0, Math.min(1, tt));
          var c = lerpColor(shadow2R, shadow2G, shadow2B, midR, midG, midB, tt);
          r = c[0]; g = c[1]; b = c[2];
        } else if (sheenFactor < 0.6) {
          // Mid to lighter mid
          var tt = (sheenFactor - 0.2) / 0.4;
          tt = Math.max(0, Math.min(1, tt));
          var c = lerpColor(midR, midG, midB, mid2R, mid2G, mid2B, tt);
          r = c[0]; g = c[1]; b = c[2];
        } else {
          // Highlight zone
          var tt = (sheenFactor - 0.6) / 0.4;
          tt = Math.max(0, Math.min(1, tt));
          // Apply smoothstep for a more natural sheen bloom
          tt = tt * tt * (3 - 2 * tt);
          var c = lerpColor(mid2R, mid2G, mid2B, hiR, hiG, hiB, tt);
          r = c[0]; g = c[1]; b = c[2];
        }

        // Vertical gradient within ribbon: darker at edges, brighter in middle
        // We create a vertical gradient for each slice
        var midY = (tp0.y + bp0.y) * 0.5;
        var halfH = (bp0.y - tp0.y) * 0.5;
        if (halfH < 1) halfH = 1;

        var grad = ctx.createLinearGradient(tp0.x, tp0.y, tp0.x, bp0.y);

        // Darken edges of ribbon slightly
        var edgeDarken = 0.7;
        var edgeR = Math.round(r * edgeDarken);
        var edgeG = Math.round(g * edgeDarken);
        var edgeB = Math.round(b * edgeDarken);

        grad.addColorStop(0, 'rgb(' + edgeR + ',' + edgeG + ',' + edgeB + ')');
        grad.addColorStop(0.3, 'rgb(' + r + ',' + g + ',' + b + ')');
        grad.addColorStop(0.5, 'rgb(' + Math.min(255, Math.round(r * 1.08)) + ',' + Math.min(255, Math.round(g * 1.08)) + ',' + Math.min(255, Math.round(b * 1.08)) + ')');
        grad.addColorStop(0.7, 'rgb(' + r + ',' + g + ',' + b + ')');
        grad.addColorStop(1, 'rgb(' + edgeR + ',' + edgeG + ',' + edgeB + ')');

        ctx.fillStyle = grad;

        // Draw the slice as a quadrilateral
        ctx.beginPath();
        ctx.moveTo(tp0.x, tp0.y);
        ctx.lineTo(tp1.x, tp1.y);
        ctx.lineTo(bp1.x, bp1.y);
        ctx.lineTo(bp0.x, bp0.y);
        ctx.closePath();
        ctx.fill();
      }

      // Draw subtle highlight line along the top edge for a silky fold effect
      ctx.beginPath();
      ctx.moveTo(topPoints[0].x, topPoints[0].y);
      for (var pi = 1; pi <= POINTS; pi++) {
        var prev = topPoints[pi - 1];
        var curr = topPoints[pi];
        var cpx = (prev.x + curr.x) * 0.5;
        var cpy = (prev.y + curr.y) * 0.5;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      ctx.strokeStyle = 'rgba(255, 230, 220, 0.06)';
      ctx.lineWidth = dpr * 1.5;
      ctx.stroke();
    }
  }

  function drawVignette() {
    // Radial gradient vignette: darker edges, brighter center
    var cx = W * 0.5;
    var cy = H * 0.5;
    var maxR = Math.sqrt(cx * cx + cy * cy);

    var grad = ctx.createRadialGradient(cx, cy, maxR * 0.2, cx, cy, maxR);
    grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
    grad.addColorStop(0.5, 'rgba(0, 0, 0, 0.05)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0.35)');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawNoiseOverlay() {
    // Tile the noise texture across the canvas at low opacity
    ctx.globalAlpha = 0.04;
    var patSize = noiseSize * dpr;
    for (var x = 0; x < W; x += noiseSize) {
      for (var y = 0; y < H; y += noiseSize) {
        ctx.drawImage(noiseCanvas, x, y);
      }
    }
    ctx.globalAlpha = 1.0;
  }

  function drawSpecularLines(t) {
    // Draw a few flowing bright sheen lines across the fabric
    var timeAdjust = prefersReduced ? 0 : t * RIPPLE_SPEED;
    var numLines = 5;

    for (var li = 0; li < numLines; li++) {
      var baseX = (li + 0.5) / numLines;
      // The sheen line drifts horizontally
      var drift = Math.sin(timeAdjust * 0.25 + li * 1.7) * 0.12;
      var lineX = (baseX + drift) * W;

      var grad = ctx.createLinearGradient(lineX - W * 0.08, 0, lineX + W * 0.08, 0);
      grad.addColorStop(0, 'rgba(255, 235, 225, 0)');
      grad.addColorStop(0.4, 'rgba(255, 240, 232, 0.03)');
      grad.addColorStop(0.5, 'rgba(255, 245, 240, 0.06)');
      grad.addColorStop(0.6, 'rgba(255, 240, 232, 0.03)');
      grad.addColorStop(1, 'rgba(255, 235, 225, 0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render(now) {
    if (!running) {
      return;
    }
    resize();

    var t = now * 0.001;

    // Clear with deep rose-black
    ctx.fillStyle = '#1a0808';
    ctx.fillRect(0, 0, W, H);

    // Draw ribbon strips
    drawRibbons(t);

    // Specular sheen lines
    drawSpecularLines(t);

    // Vignette overlay
    drawVignette();

    // Noise texture overlay for fabric grain
    drawNoiseOverlay();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // Visibility change pause
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  // PostMessage controls
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'RIPPLE_SPEED': RIPPLE_SPEED = Math.max(0.1, Math.min(2.0, e.data.value)); break;
        case 'SHEEN_INTENSITY': SHEEN_INTENSITY = Math.max(0.3, Math.min(2.0, e.data.value)); break;
      }
    }
  });
})();
</script>
</body>
</html>
