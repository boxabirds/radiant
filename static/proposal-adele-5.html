<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candle Flicker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Candle Flicker</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Candle Flicker — Multiple candle flames in darkness,
// warm amber light pools on a dark surface
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var _pad = parseFloat(new URLSearchParams(location.search).get('p')) || 1;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // ── Tunable parameters ──
  var FLICKER_SPEED = 0.5;
  var FLAME_COUNT = 1.0; // maps to 5-9 flames

  var W, H, minDim;
  var running = true;
  var time = 0;
  var candles = [];
  var smokeParticles = [];

  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    minDim = Math.min(W, H);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Utility ──
  function rand(a, b) { return a + Math.random() * (b - a); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function smoothstep(lo, hi, t) { var x = clamp((t - lo) / (hi - lo), 0, 1); return x * x * (3 - 2 * x); }

  // ── Simplex-like noise (value noise with smooth interpolation) ──
  var NOISE_SIZE = 256;
  var noiseTable = [];
  for (var ni = 0; ni < NOISE_SIZE; ni++) {
    noiseTable[ni] = Math.random();
  }

  function noiseHash(x) {
    var i = ((x | 0) % NOISE_SIZE + NOISE_SIZE) % NOISE_SIZE;
    return noiseTable[i];
  }

  function noise1D(x) {
    var i = Math.floor(x);
    var f = x - i;
    f = f * f * (3 - 2 * f); // smoothstep
    return lerp(noiseHash(i), noiseHash(i + 1), f);
  }

  function fbm1D(x, octaves) {
    var v = 0;
    var amp = 0.5;
    var freq = 1;
    for (var i = 0; i < octaves; i++) {
      v += amp * noise1D(x * freq);
      freq *= 2.17;
      amp *= 0.48;
    }
    return v;
  }

  // Per-candle noise with unique seed offset
  function candleNoise(seed, t, freq) {
    return fbm1D(seed * 137.31 + t * freq, 4);
  }

  // ── Create candles ──
  function getFlameCount() {
    return Math.round(lerp(5, 9, clamp(FLAME_COUNT, 0, 1)));
  }

  function createCandle(index, total) {
    // Distribute candles across the canvas with some randomness
    // Use a relaxed grid to avoid clustering
    var marginX = W * 0.1;
    var marginY = H * 0.08;
    var usableW = W - marginX * 2;

    // Spread horizontally with jitter
    var baseX = marginX + usableW * ((index + 0.5) / total);
    var jitterX = usableW / total * 0.3;
    var x = baseX + rand(-jitterX, jitterX);

    // Vertical position: candles sit on a surface, so base is in lower half
    var baseY = H * rand(0.52, 0.72);

    // Candle body dimensions
    var candleHeight = minDim * rand(0.06, 0.12) / _pad;
    var candleWidth = minDim * rand(0.012, 0.022) / _pad;

    // Flame sits at top of candle
    var flameBaseY = baseY - candleHeight;
    var flameHeight = minDim * rand(0.035, 0.055) / _pad;
    var flameWidth = minDim * rand(0.008, 0.014) / _pad;

    // Light pool radius
    var lightRadius = minDim * rand(0.18, 0.32) / _pad;

    return {
      x: x,
      baseY: baseY,
      candleHeight: candleHeight,
      candleWidth: candleWidth,
      flameBaseY: flameBaseY,
      flameHeight: flameHeight,
      flameWidth: flameWidth,
      lightRadius: lightRadius,
      // Noise seeds for independent flicker
      noiseSeed: rand(0, 1000),
      // Flicker state
      brightness: 1.0,
      sway: 0,
      heightMod: 1.0,
      // Gutter state (occasional dimming)
      gutterTimer: rand(8, 25),
      gutterDuration: 0,
      gutterProgress: 0,
      isGuttering: false,
      // Subtle constant sway offset
      swayPhase: rand(0, 6.28),
      swaySpeed: rand(0.8, 1.5)
    };
  }

  function initCandles() {
    candles = [];
    smokeParticles = [];
    var count = getFlameCount();
    for (var i = 0; i < count; i++) {
      candles.push(createCandle(i, count));
    }
  }

  // ── Update candle flicker ──
  function updateCandle(candle, dt) {
    var speed = FLICKER_SPEED;
    var t = time * speed;
    var seed = candle.noiseSeed;

    // Base flicker from noise
    var flickerFast = candleNoise(seed, t, 4.5);
    var flickerMed = candleNoise(seed + 50, t, 2.2);
    var flickerSlow = candleNoise(seed + 100, t, 0.8);

    // Combine for natural movement
    candle.brightness = 0.65 + flickerSlow * 0.25 + flickerMed * 0.08 + flickerFast * 0.04;

    // Sway — the flame tip moves side to side
    var swayFast = (candleNoise(seed + 200, t, 3.8) - 0.5) * 2;
    var swaySlow = Math.sin(t * candle.swaySpeed + candle.swayPhase) * 0.4;
    candle.sway = (swaySlow + swayFast * 0.5) * candle.flameWidth * 0.8;

    // Height modulation
    candle.heightMod = 0.85 + flickerMed * 0.15 + flickerSlow * 0.05;

    // Gutter effect — occasional deep dimming
    candle.gutterTimer -= dt * speed;
    if (candle.gutterTimer <= 0 && !candle.isGuttering) {
      candle.isGuttering = true;
      candle.gutterDuration = rand(0.4, 1.2);
      candle.gutterProgress = 0;
    }

    if (candle.isGuttering) {
      candle.gutterProgress += dt * speed / candle.gutterDuration;
      if (candle.gutterProgress >= 1) {
        candle.isGuttering = false;
        candle.gutterTimer = rand(6, 20);
        candle.gutterProgress = 0;
      } else {
        // Sharp dip then recovery
        var gutterCurve = Math.sin(candle.gutterProgress * Math.PI);
        gutterCurve = gutterCurve * gutterCurve; // sharper peak
        candle.brightness *= lerp(1, 0.15, gutterCurve);
        candle.heightMod *= lerp(1, 0.4, gutterCurve);
      }
    }

    // Emit smoke wisps
    if (Math.random() < 0.12 * speed) {
      emitSmoke(candle);
    }
  }

  // ── Smoke wisps ──
  function emitSmoke(candle) {
    var flameTopY = candle.flameBaseY - candle.flameHeight * candle.heightMod;
    smokeParticles.push({
      x: candle.x + candle.sway * 0.6 + rand(-candle.flameWidth * 0.3, candle.flameWidth * 0.3),
      y: flameTopY,
      vx: candle.sway * 0.02 + rand(-0.15, 0.15),
      vy: rand(-0.8, -0.3),
      life: 1.0,
      decay: rand(0.004, 0.012) * FLICKER_SPEED,
      size: rand(2, 6),
      alpha: rand(0.03, 0.08),
      drift: rand(-0.08, 0.08)
    });
  }

  function updateSmoke(dt) {
    for (var i = smokeParticles.length - 1; i >= 0; i--) {
      var p = smokeParticles[i];
      p.x += p.vx + p.drift * Math.sin(time * 2 + p.x * 0.1);
      p.y += p.vy;
      p.vy *= 0.995;
      p.vx *= 0.98;
      p.size += 0.06;
      p.life -= p.decay;
      if (p.life <= 0) smokeParticles.splice(i, 1);
    }
  }

  function drawSmoke() {
    for (var i = 0; i < smokeParticles.length; i++) {
      var p = smokeParticles[i];
      if (p.life < 0.01) continue;
      var a = p.alpha * p.life * p.life;
      if (a < 0.002) continue;
      // Smoke color: (0.15, 0.12, 0.08) at low alpha
      var r = 38;
      var g = 31;
      var b = 20;
      var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')');
      grad.addColorStop(0.6, 'rgba(' + r + ',' + g + ',' + b + ',' + (a * 0.4) + ')');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, 6.2832);
      ctx.fill();
    }
  }

  // ── Draw light pools ──
  // These are rendered first, building up warm light on the dark surface
  function drawLightPools() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter'; // additive blending for overlapping pools

    for (var i = 0; i < candles.length; i++) {
      var c = candles[i];
      var brightness = c.brightness;
      var cx = c.x + c.sway * 0.15; // light source follows flame slightly
      var cy = c.flameBaseY - c.flameHeight * c.heightMod * 0.4;
      var r = c.lightRadius * lerp(0.85, 1.15, brightness);

      // Main light pool — large soft gradient
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);

      // Core: (0.35, 0.25, 0.12) — bright warm amber
      var coreR = Math.round(0.35 * 255 * brightness);
      var coreG = Math.round(0.25 * 255 * brightness);
      var coreB = Math.round(0.12 * 255 * brightness);

      // Mid: (0.20, 0.14, 0.07)
      var midR = Math.round(0.20 * 255 * brightness);
      var midG = Math.round(0.14 * 255 * brightness);
      var midB = Math.round(0.07 * 255 * brightness);

      // Edge: (0.08, 0.06, 0.03)
      var edgeR = Math.round(0.08 * 255 * brightness);
      var edgeG = Math.round(0.06 * 255 * brightness);
      var edgeB = Math.round(0.03 * 255 * brightness);

      var poolAlpha = lerp(0.12, 0.28, brightness);

      grad.addColorStop(0, 'rgba(' + coreR + ',' + coreG + ',' + coreB + ',' + (poolAlpha * 0.9) + ')');
      grad.addColorStop(0.15, 'rgba(' + coreR + ',' + coreG + ',' + coreB + ',' + (poolAlpha * 0.7) + ')');
      grad.addColorStop(0.35, 'rgba(' + midR + ',' + midG + ',' + midB + ',' + (poolAlpha * 0.45) + ')');
      grad.addColorStop(0.6, 'rgba(' + edgeR + ',' + edgeG + ',' + edgeB + ',' + (poolAlpha * 0.2) + ')');
      grad.addColorStop(1, 'rgba(' + edgeR + ',' + edgeG + ',' + edgeB + ',0)');

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 6.2832);
      ctx.fill();

      // Secondary pool — wider, dimmer, for atmospheric spread
      var r2 = r * 1.6;
      var grad2 = ctx.createRadialGradient(cx, cy + r * 0.1, 0, cx, cy + r * 0.1, r2);
      var outerAlpha = poolAlpha * 0.15;
      grad2.addColorStop(0, 'rgba(' + edgeR + ',' + edgeG + ',' + edgeB + ',' + outerAlpha + ')');
      grad2.addColorStop(0.5, 'rgba(' + edgeR + ',' + edgeG + ',' + edgeB + ',' + (outerAlpha * 0.3) + ')');
      grad2.addColorStop(1, 'rgba(' + edgeR + ',' + edgeG + ',' + edgeB + ',0)');
      ctx.fillStyle = grad2;
      ctx.beginPath();
      ctx.arc(cx, cy + r * 0.1, r2, 0, 6.2832);
      ctx.fill();
    }

    ctx.restore();
  }

  // ── Draw a single flame ──
  function drawFlame(candle) {
    var cx = candle.x;
    var baseY = candle.flameBaseY;
    var brightness = candle.brightness;
    var sway = candle.sway;
    var fh = candle.flameHeight * candle.heightMod;
    var fw = candle.flameWidth;

    // The flame is a teardrop shape that sways at the tip
    // We draw it in multiple layers: outer glow, outer flame, mid flame, core

    var tipX = cx + sway;
    var tipY = baseY - fh;

    // ── Outer glow (very soft, large) ──
    var glowR = fh * 1.4;
    var glowCx = cx + sway * 0.3;
    var glowCy = baseY - fh * 0.4;
    var glowGrad = ctx.createRadialGradient(glowCx, glowCy, 0, glowCx, glowCy, glowR);
    var glowAlpha = brightness * 0.12;
    glowGrad.addColorStop(0, 'rgba(217,115,26,' + glowAlpha + ')');
    glowGrad.addColorStop(0.4, 'rgba(217,115,26,' + (glowAlpha * 0.4) + ')');
    glowGrad.addColorStop(1, 'rgba(217,115,26,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(glowCx, glowCy, glowR, 0, 6.2832);
    ctx.fill();

    // ── Outer flame (dark orange) ──
    // Teardrop via bezier: wide at base, tapers to sway-offset tip
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - fw * 1.1, baseY);
    ctx.bezierCurveTo(
      cx - fw * 1.4, baseY - fh * 0.35,
      tipX - fw * 0.4, tipY + fh * 0.15,
      tipX, tipY
    );
    ctx.bezierCurveTo(
      tipX + fw * 0.4, tipY + fh * 0.15,
      cx + fw * 1.4, baseY - fh * 0.35,
      cx + fw * 1.1, baseY
    );
    ctx.closePath();

    // Gradient from base to tip
    var outerGrad = ctx.createLinearGradient(cx, baseY, tipX, tipY);
    // Flame outer: (0.85, 0.45, 0.10) = rgb(217, 115, 26)
    var outerAlpha = brightness * 0.85;
    outerGrad.addColorStop(0, 'rgba(217,115,26,' + (outerAlpha * 0.5) + ')');
    outerGrad.addColorStop(0.3, 'rgba(217,115,26,' + outerAlpha + ')');
    outerGrad.addColorStop(0.7, 'rgba(217,115,26,' + (outerAlpha * 0.7) + ')');
    outerGrad.addColorStop(1, 'rgba(200,90,15,' + (outerAlpha * 0.1) + ')');
    ctx.fillStyle = outerGrad;
    ctx.fill();
    ctx.restore();

    // ── Mid flame (amber-yellow) ──
    var midFw = fw * 0.7;
    var midFh = fh * 0.85;
    var midTipX = cx + sway * 0.9;
    var midTipY = baseY - midFh;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - midFw * 0.9, baseY);
    ctx.bezierCurveTo(
      cx - midFw * 1.2, baseY - midFh * 0.35,
      midTipX - midFw * 0.3, midTipY + midFh * 0.12,
      midTipX, midTipY
    );
    ctx.bezierCurveTo(
      midTipX + midFw * 0.3, midTipY + midFh * 0.12,
      cx + midFw * 1.2, baseY - midFh * 0.35,
      cx + midFw * 0.9, baseY
    );
    ctx.closePath();

    var midGrad = ctx.createLinearGradient(cx, baseY, midTipX, midTipY);
    // Flame mid: (1.0, 0.75, 0.25) = rgb(255, 191, 64)
    var midAlpha = brightness * 0.9;
    midGrad.addColorStop(0, 'rgba(255,191,64,' + (midAlpha * 0.4) + ')');
    midGrad.addColorStop(0.25, 'rgba(255,191,64,' + midAlpha + ')');
    midGrad.addColorStop(0.65, 'rgba(255,175,45,' + (midAlpha * 0.6) + ')');
    midGrad.addColorStop(1, 'rgba(255,160,30,' + (midAlpha * 0.05) + ')');
    ctx.fillStyle = midGrad;
    ctx.fill();
    ctx.restore();

    // ── Core (bright white-yellow) ──
    var coreFw = fw * 0.35;
    var coreFh = fh * 0.55;
    var coreTipX = cx + sway * 0.6;
    var coreTipY = baseY - coreFh;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - coreFw * 0.7, baseY);
    ctx.bezierCurveTo(
      cx - coreFw * 1.0, baseY - coreFh * 0.4,
      coreTipX - coreFw * 0.2, coreTipY + coreFh * 0.1,
      coreTipX, coreTipY
    );
    ctx.bezierCurveTo(
      coreTipX + coreFw * 0.2, coreTipY + coreFh * 0.1,
      cx + coreFw * 1.0, baseY - coreFh * 0.4,
      cx + coreFw * 0.7, baseY
    );
    ctx.closePath();

    var coreGrad = ctx.createLinearGradient(cx, baseY, coreTipX, coreTipY);
    // Flame core: (1.0, 0.95, 0.80) = rgb(255, 242, 204)
    var coreAlpha = brightness * 0.95;
    coreGrad.addColorStop(0, 'rgba(255,242,204,' + coreAlpha + ')');
    coreGrad.addColorStop(0.5, 'rgba(255,242,204,' + (coreAlpha * 0.85) + ')');
    coreGrad.addColorStop(1, 'rgba(255,230,180,' + (coreAlpha * 0.1) + ')');
    ctx.fillStyle = coreGrad;
    ctx.fill();
    ctx.restore();

    // ── Bright point at the base of the flame (the wick glow) ──
    var wickR = fw * 0.5;
    var wickGrad = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, wickR);
    wickGrad.addColorStop(0, 'rgba(255,248,230,' + (brightness * 0.8) + ')');
    wickGrad.addColorStop(0.4, 'rgba(255,220,160,' + (brightness * 0.4) + ')');
    wickGrad.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = wickGrad;
    ctx.beginPath();
    ctx.arc(cx, baseY, wickR, 0, 6.2832);
    ctx.fill();
  }

  // ── Draw candle body ──
  function drawCandleBody(candle) {
    var cx = candle.x;
    var baseY = candle.baseY;
    var h = candle.candleHeight;
    var w = candle.candleWidth;
    var topY = candle.flameBaseY;

    // Candle body — very dark, just barely visible
    // Slight taper: wider at base
    var topW = w * 0.9;
    var botW = w * 1.05;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - topW, topY);
    ctx.lineTo(cx - botW, baseY);
    ctx.lineTo(cx + botW, baseY);
    ctx.lineTo(cx + topW, topY);
    ctx.closePath();

    // Very dark cream/wax color with subtle gradient from candlelight
    var brightness = candle.brightness;
    var bodyR = Math.round(lerp(18, 50, brightness * 0.3));
    var bodyG = Math.round(lerp(14, 38, brightness * 0.3));
    var bodyB = Math.round(lerp(8, 20, brightness * 0.3));

    var bodyGrad = ctx.createLinearGradient(cx, topY, cx, baseY);
    bodyGrad.addColorStop(0, 'rgba(' + bodyR + ',' + bodyG + ',' + bodyB + ',0.7)');
    bodyGrad.addColorStop(0.3, 'rgba(' + Math.round(bodyR * 0.7) + ',' + Math.round(bodyG * 0.7) + ',' + Math.round(bodyB * 0.7) + ',0.6)');
    bodyGrad.addColorStop(1, 'rgba(' + Math.round(bodyR * 0.4) + ',' + Math.round(bodyG * 0.4) + ',' + Math.round(bodyB * 0.4) + ',0.4)');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Subtle highlight on the side facing the flame
    var hlGrad = ctx.createLinearGradient(cx - topW, topY, cx + topW, topY);
    var hlAlpha = brightness * 0.15;
    hlGrad.addColorStop(0, 'rgba(200,149,108,' + hlAlpha + ')');
    hlGrad.addColorStop(0.5, 'rgba(200,149,108,' + (hlAlpha * 0.3) + ')');
    hlGrad.addColorStop(1, 'rgba(200,149,108,0)');
    ctx.fillStyle = hlGrad;
    ctx.fill();

    // Wick — tiny dark line at top
    ctx.beginPath();
    ctx.moveTo(cx, topY);
    ctx.lineTo(cx, topY + w * 0.15);
    ctx.strokeStyle = 'rgba(30,22,12,0.6)';
    ctx.lineWidth = Math.max(0.5, w * 0.08);
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.restore();
  }

  // ── Draw surface texture ──
  function drawSurfaceTexture() {
    // Very subtle grain/texture across the dark background
    // Use a sparse approach: draw a few tiny specks per frame that accumulate
    // through the semi-transparent clear
    var count = 40;
    for (var i = 0; i < count; i++) {
      var px = Math.random() * W;
      var py = Math.random() * H;
      var a = Math.random() * 0.008;
      var size = Math.random() * 1.5;
      // Warm-tinted grain
      ctx.fillStyle = 'rgba(25,20,14,' + a + ')';
      ctx.fillRect(px, py, size, size);
    }
  }

  // ── Vignette ──
  function drawVignette() {
    var cx = W * 0.5;
    var cy = H * 0.5;
    var r = Math.max(W, H) * 0.75;

    var grad = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(0,0,0,0.15)');
    grad.addColorStop(0.8, 'rgba(0,0,0,0.45)');
    grad.addColorStop(1, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Initialize ──
  initCandles();

  var lastTime = 0;

  function frame(now) {
    if (!running) { lastTime = 0; return; }
    if (lastTime === 0) lastTime = now;

    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (prefersReduced) dt *= 0.08;
    time += dt;

    // ── Adjust candle count if param changed ──
    var targetCount = getFlameCount();
    while (candles.length < targetCount) {
      candles.push(createCandle(candles.length, targetCount));
    }
    while (candles.length > targetCount) {
      candles.pop();
    }

    // ── Semi-transparent clear for slight trailing/persistence ──
    ctx.fillStyle = 'rgba(10, 10, 10, 0.35)';
    ctx.fillRect(0, 0, W, H);

    // ── Surface texture (very subtle) ──
    drawSurfaceTexture();

    // ── Update candles ──
    for (var i = 0; i < candles.length; i++) {
      updateCandle(candles[i], dt);
    }

    // ── Draw light pools first (underneath everything) ──
    drawLightPools();

    // ── Draw candle bodies ──
    for (var j = 0; j < candles.length; j++) {
      drawCandleBody(candles[j]);
    }

    // ── Draw flames ──
    for (var k = 0; k < candles.length; k++) {
      drawFlame(candles[k]);
    }

    // ── Update and draw smoke ──
    updateSmoke(dt);
    drawSmoke();

    // ── Vignette on top ──
    drawVignette();

    requestAnimationFrame(frame);
  }

  // ── Start ──
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  requestAnimationFrame(frame);

  // ── Visibility pause/resume ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(frame);
    }
  });

  // ── Param handler ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FLICKER_SPEED': FLICKER_SPEED = e.data.value; break;
        case 'FLAME_COUNT': FLAME_COUNT = e.data.value; break;
      }
    }
  });

  // ── Resize handler ──
  window.addEventListener('resize', function () {
    resize();
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    initCandles();
  });
})();
</script>
</body>
</html>
