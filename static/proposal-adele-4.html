<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crescendo Wave</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Proposal — Crescendo Wave</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Proposal · Crescendo Wave — Waves that build from stillness to
// massive peaks then crash and reset, like Adele's vocal crescendos
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // ── Vertex shader — fullscreen triangle ──
  var vertSrc = 'attribute vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }';

  // ── Fragment shader — ocean crescendo surface ──
  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_buildSpeed;',
    'uniform float u_wavePower;',
    '',
    '// ── Constants ──',
    '#define PI 3.14159265359',
    '#define TAU 6.28318530718',
    '',
    '// ── Hash functions ──',
    'vec2 hash22(vec2 p) {',
    '  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));',
    '  return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);',
    '}',
    '',
    'float hash21(vec2 p) {',
    '  return fract(sin(dot(p, vec2(41.1, 289.7))) * 45758.5453);',
    '}',
    '',
    '// ── Gradient noise ──',
    'float gnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  vec2 u = f * f * (3.0 - 2.0 * f);',
    '  return mix(mix(dot(hash22(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)),',
    '                 dot(hash22(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)), u.x),',
    '             mix(dot(hash22(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),',
    '                 dot(hash22(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)), u.x), u.y);',
    '}',
    '',
    '// ── FBM with rotation per octave ──',
    'float fbm(vec2 p) {',
    '  float val = 0.0;',
    '  float amp = 0.5;',
    '  float freq = 1.0;',
    '  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);',
    '  for (int i = 0; i < 5; i++) {',
    '    val += amp * gnoise(p * freq);',
    '    p = rot * p;',
    '    freq *= 2.03;',
    '    amp *= 0.48;',
    '  }',
    '  return val;',
    '}',
    '',
    '// ── Amplitude envelope ──',
    '// Full cycle: ~14s build + hold + decay + rest',
    '// Returns 0..1 representing current wave intensity',
    'float envelope(float t) {',
    '  float cycleLen = 14.0;',
    '  float phase = mod(t, cycleLen) / cycleLen;',
    '  // 0.00 - 0.55: build (8s)',
    '  // 0.55 - 0.62: hold at peak (1s)',
    '  // 0.62 - 0.88: decay (3.5s)',
    '  // 0.88 - 1.00: rest / breath (1.5s)',
    '  float build = smoothstep(0.0, 0.55, phase);',
    '  // Add slight acceleration at end of build for drama',
    '  build = mix(build, build * build, 0.3);',
    '  float hold = 1.0 - smoothstep(0.55, 0.62, phase);',
    '  float decay = 1.0 - smoothstep(0.62, 0.88, phase);',
    '  float breath = smoothstep(1.0, 0.88, phase);',
    '  // Combine: rises, holds, then falls',
    '  float env = build * mix(decay, 1.0, hold) * breath;',
    '  // Shape: push toward 0 and 1 extremes more aggressively',
    '  return env * env * (3.0 - 2.0 * env);',
    '}',
    '',
    '// ── Gerstner-style wave ──',
    '// Returns vec3: (displacement.x, displacement.y, height)',
    'vec3 gerstnerWave(vec2 pos, vec2 dir, float amp, float freq, float steep, float spd, float t) {',
    '  float phase = dot(dir, pos) * freq + t * spd;',
    '  float c = cos(phase);',
    '  float s = sin(phase);',
    '  // Gerstner horizontal displacement',
    '  float dx = dir.x * steep * amp * c;',
    '  float dy = dir.y * steep * amp * c;',
    '  float h = amp * s;',
    '  return vec3(dx, dy, h);',
    '}',
    '',
    '// ── Ocean surface height with multiple wave systems ──',
    '// Unrolled to avoid variable array indexing',
    'vec3 oceanSurface(vec2 pos, float t, float env) {',
    '  float baseAmp = 0.02 + env * 0.28 * u_wavePower;',
    '  // Power shaping: waves sharpen at peak intensity',
    '  float sharpness = 1.0 + env * env * 2.0 * u_wavePower;',
    '  float spd = t * u_buildSpeed;',
    '',
    '  vec3 total = vec3(0.0);',
    '',
    '  // Wave 0: primary swell — dominant long wave',
    '  vec2 d0 = normalize(vec2(0.8, 0.6));',
    '  vec3 w0 = gerstnerWave(pos, d0, baseAmp * 1.0, 2.5, sharpness * 0.6, spd * 1.1, t);',
    '  total += w0;',
    '',
    '  // Wave 1: cross swell',
    '  vec2 d1 = normalize(vec2(-0.3, 0.95));',
    '  vec3 w1 = gerstnerWave(pos, d1, baseAmp * 0.7, 3.8, sharpness * 0.5, spd * 0.9, t);',
    '  total += w1;',
    '',
    '  // Wave 2: secondary chop',
    '  vec2 d2 = normalize(vec2(0.5, -0.85));',
    '  vec3 w2 = gerstnerWave(pos, d2, baseAmp * 0.45, 5.5, sharpness * 0.45, spd * 1.3, t);',
    '  total += w2;',
    '',
    '  // Wave 3: high-frequency detail',
    '  vec2 d3 = normalize(vec2(-0.7, -0.7));',
    '  vec3 w3 = gerstnerWave(pos, d3, baseAmp * 0.3, 8.2, sharpness * 0.35, spd * 1.5, t);',
    '  total += w3;',
    '',
    '  // Wave 4: interference pattern — builds constructive interference at peak',
    '  vec2 d4 = normalize(vec2(0.9, -0.4));',
    '  float interAmp = baseAmp * 0.55 * env;',
    '  vec3 w4 = gerstnerWave(pos, d4, interAmp, 4.1, sharpness * 0.55, spd * 1.0, t);',
    '  total += w4;',
    '',
    '  // Wave 5: low-frequency ground swell',
    '  vec2 d5 = normalize(vec2(0.2, 0.98));',
    '  vec3 w5 = gerstnerWave(pos, d5, baseAmp * 0.8, 1.5, sharpness * 0.3, spd * 0.6, t);',
    '  total += w5;',
    '',
    '  // Wave 6: tiny capillary ripples that appear at high intensity',
    '  vec2 d6 = normalize(vec2(-0.9, 0.4));',
    '  float capAmp = baseAmp * 0.15 * env * env;',
    '  vec3 w6 = gerstnerWave(pos, d6, capAmp, 14.0, sharpness * 0.2, spd * 2.0, t);',
    '  total += w6;',
    '',
    '  // Add FBM turbulence scaled by envelope',
    '  float turb = fbm(pos * 3.0 + t * 0.15 * u_buildSpeed) * 0.08 * env * u_wavePower;',
    '  total.z += turb;',
    '',
    '  return total;',
    '}',
    '',
    '// ── Surface normal via central differences ──',
    'vec3 calcNormal(vec2 pos, float t, float env) {',
    '  float eps = 0.005;',
    '  float hL = oceanSurface(pos - vec2(eps, 0.0), t, env).z;',
    '  float hR = oceanSurface(pos + vec2(eps, 0.0), t, env).z;',
    '  float hD = oceanSurface(pos - vec2(0.0, eps), t, env).z;',
    '  float hU = oceanSurface(pos + vec2(0.0, eps), t, env).z;',
    '  vec3 n = normalize(vec3(hL - hR, hD - hU, 2.0 * eps));',
    '  return n;',
    '}',
    '',
    '// ── Foam / spray ──',
    'float foamPattern(vec2 pos, float t, float env, float h) {',
    '  // Foam only appears at high intensity',
    '  float foamThreshold = 0.6;',
    '  float foamIntensity = smoothstep(foamThreshold, 1.0, env);',
    '  if (foamIntensity < 0.001) return 0.0;',
    '',
    '  // Multi-scale foam noise',
    '  float f1 = fbm(pos * 8.0 + t * 0.3 * u_buildSpeed);',
    '  float f2 = gnoise(pos * 18.0 + t * 0.5 * u_buildSpeed);',
    '  float f3 = gnoise(pos * 35.0 - t * 0.2);',
    '',
    '  // Foam tends to form on wave crests',
    '  float crestFactor = smoothstep(0.05, 0.2, h);',
    '',
    '  float foam = (f1 * 0.5 + f2 * 0.35 + f3 * 0.15);',
    '  foam = smoothstep(0.05, 0.45, foam) * crestFactor * foamIntensity;',
    '',
    '  // Sparkle / spray particles at very high intensity',
    '  float spray = gnoise(pos * 50.0 + t * 1.5);',
    '  spray = pow(max(0.0, spray), 8.0) * env * env * 0.5;',
    '  foam += spray * foamIntensity;',
    '',
    '  return clamp(foam, 0.0, 1.0);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  float t = u_time;',
    '',
    '  // ── Envelope: the breath of the crescendo ──',
    '  float env = envelope(t * u_buildSpeed);',
    '',
    '  // ── Camera / surface coordinate ──',
    '  // Top-down view with gentle drift',
    '  vec2 camDrift = vec2(',
    '    sin(t * 0.03 * u_buildSpeed) * 0.4,',
    '    cos(t * 0.025 * u_buildSpeed) * 0.3 + t * 0.02 * u_buildSpeed',
    '  );',
    '  vec2 surfPos = (uv - 0.5) * vec2(aspect, 1.0) * 3.0 + camDrift;',
    '',
    '  // ── Compute ocean surface ──',
    '  vec3 surfData = oceanSurface(surfPos, t, env);',
    '  float height = surfData.z;',
    '',
    '  // Apply Gerstner horizontal displacement to UV for realism',
    '  vec2 displaced = surfPos + surfData.xy;',
    '',
    '  // Recalculate height at displaced position for accuracy',
    '  float dispHeight = oceanSurface(displaced, t, env).z;',
    '',
    '  // ── Surface normal for lighting ──',
    '  vec3 normal = calcNormal(displaced, t, env);',
    '',
    '  // ── Height-mapped coloring ──',
    '  // Normalize height to 0..1 range based on current envelope amplitude',
    '  float maxH = 0.3 * u_wavePower * max(env, 0.05);',
    '  float hNorm = clamp((dispHeight + maxH) / (2.0 * maxH), 0.0, 1.0);',
    '',
    '  // Color palette: warm amber only',
    '  vec3 deepTrough = vec3(0.02, 0.015, 0.01);',
    '  vec3 midSurface = vec3(0.10, 0.07, 0.04);',
    '  vec3 waveRidge  = vec3(0.45, 0.32, 0.14);',
    '  vec3 waveCrest  = vec3(0.78, 0.58, 0.24);',
    '  vec3 peakHL     = vec3(1.0, 0.82, 0.55);',
    '  vec3 foamColor  = vec3(1.0, 0.92, 0.72);',
    '',
    '  // Multi-stop gradient based on height',
    '  vec3 surfColor = deepTrough;',
    '  surfColor = mix(surfColor, midSurface, smoothstep(0.0, 0.25, hNorm));',
    '  surfColor = mix(surfColor, waveRidge,  smoothstep(0.25, 0.5, hNorm));',
    '  surfColor = mix(surfColor, waveCrest,  smoothstep(0.5, 0.75, hNorm));',
    '  surfColor = mix(surfColor, peakHL,     smoothstep(0.75, 1.0, hNorm));',
    '',
    '  // ── Specular highlights ──',
    '  // Light from above-right, intensifying during crescendo',
    '  vec3 lightDir = normalize(vec3(0.4, 0.3, 1.0));',
    '  vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '  vec3 halfVec = normalize(lightDir + viewDir);',
    '  float spec = pow(max(dot(normal, halfVec), 0.0), 32.0 + env * 64.0);',
    '  // Specular intensifies during crescendo',
    '  float specIntensity = 0.3 + env * 0.7;',
    '  vec3 specColor = peakHL * spec * specIntensity;',
    '',
    '  // Secondary softer light from opposite side',
    '  vec3 lightDir2 = normalize(vec3(-0.6, -0.4, 0.8));',
    '  vec3 halfVec2 = normalize(lightDir2 + viewDir);',
    '  float spec2 = pow(max(dot(normal, halfVec2), 0.0), 16.0);',
    '  specColor += waveRidge * spec2 * 0.15 * specIntensity;',
    '',
    '  surfColor += specColor;',
    '',
    '  // ── Foam overlay ──',
    '  float foam = foamPattern(displaced, t, env, dispHeight);',
    '  surfColor = mix(surfColor, foamColor, foam * 0.7);',
    '',
    '  // ── Fresnel-like edge glow on wave slopes ──',
    '  float fresnel = 1.0 - abs(normal.z);',
    '  fresnel = pow(fresnel, 3.0);',
    '  surfColor += waveCrest * fresnel * 0.15 * env;',
    '',
    '  // ── Subtle subsurface scattering in thin wave areas ──',
    '  float sss = smoothstep(0.4, 0.8, hNorm) * (1.0 - smoothstep(0.8, 1.0, hNorm));',
    '  surfColor += vec3(0.6, 0.42, 0.18) * sss * 0.08 * env;',
    '',
    '  // ── Vignette ──',
    '  vec2 vigUV = uv * 2.0 - 1.0;',
    '  float vig = 1.0 - dot(vigUV * 0.55, vigUV * 0.55);',
    '  vig = smoothstep(0.0, 0.7, vig);',
    '  surfColor *= vig;',
    '',
    '  // ── Overall brightness modulation with envelope ──',
    '  // Calm sections are darker, peak sections brighter',
    '  float brightMod = 0.65 + env * 0.35;',
    '  surfColor *= brightMod;',
    '',
    '  // ── Tone mapping ──',
    '  surfColor = surfColor / (surfColor + 0.7) * 1.2;',
    '  surfColor = clamp(surfColor, 0.0, 1.0);',
    '',
    '  gl_FragColor = vec4(surfColor, 1.0);',
    '}',
  ].join('\n');

  // ── Shader compilation ──
  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  // ── Fullscreen triangle buffer ──
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // ── Uniforms ──
  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uBuildSpeed = gl.getUniformLocation(prog, 'u_buildSpeed');
  var uWavePower = gl.getUniformLocation(prog, 'u_wavePower');

  var buildSpeedVal = 0.5;
  var wavePowerVal = 1.0;

  // ── DPR capped at 2 ──
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  // ── Animation loop ──
  var running = true;

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uBuildSpeed, buildSpeedVal);
    gl.uniform1f(uWavePower, wavePowerVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  // ── Pause when not visible ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  requestAnimationFrame(render);

  // ── PostMessage API for parameter updates ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'BUILD_SPEED': buildSpeedVal = e.data.value; break;
        case 'WAVE_POWER': wavePowerVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
