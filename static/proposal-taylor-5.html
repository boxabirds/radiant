<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Constellation Map</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Constellation Map — Stars drift and form fleeting constellations
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var width, height;

  // Tunable parameters
  var DRIFT_SPEED = 0.3;
  var CONNECTION_RANGE = 1.0;

  // Base connection distance (scaled by CONNECTION_RANGE and screen size)
  var BASE_CONNECT_DIST = 120;

  // ── Resize ──
  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // ── Noise texture (pre-computed once) ──
  var noiseCanvas = document.createElement('canvas');
  var noiseCtx = noiseCanvas.getContext('2d');
  var noiseSize = 256;
  noiseCanvas.width = noiseSize;
  noiseCanvas.height = noiseSize;

  function generateNoise() {
    var imageData = noiseCtx.createImageData(noiseSize, noiseSize);
    var data = imageData.data;
    for (var i = 0; i < data.length; i += 4) {
      var v = Math.random() * 12 | 0;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 18;
    }
    noiseCtx.putImageData(imageData, 0, 0);
  }
  generateNoise();

  // ── Stars ──
  var NUM_STARS = 100;
  var stars = [];

  function createStar(index) {
    var isBright = index < 8;
    var baseRadius = isBright ? (1.8 + Math.random() * 1.5) : (0.6 + Math.random() * 1.2);
    return {
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      radius: baseRadius,
      isBright: isBright,
      // Twinkle parameters
      twinkleSpeed: 0.5 + Math.random() * 2.5,
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleDepth: 0.2 + Math.random() * 0.5,
      // Base brightness
      baseBrightness: isBright ? (0.7 + Math.random() * 0.3) : (0.25 + Math.random() * 0.45),
      // Color variation
      colorIndex: Math.random()
    };
  }

  for (var i = 0; i < NUM_STARS; i++) {
    stars.push(createStar(i));
  }

  // ── Shooting stars ──
  var shootingStars = [];
  var shootingStarTimer = 0;
  var SHOOTING_STAR_INTERVAL = 4.0 + Math.random() * 6.0;

  function spawnShootingStar() {
    var startX = Math.random() * width * 0.8 + width * 0.1;
    var startY = Math.random() * height * 0.3;
    var angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.25;
    var speed = 400 + Math.random() * 300;
    shootingStars.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.7 + Math.random() * 0.8,
      trailLength: 60 + Math.random() * 40,
      brightness: 0.6 + Math.random() * 0.4
    });
  }

  // ── Gentle overall rotation ──
  var globalRotation = 0;
  var ROTATION_SPEED = 0.003;

  // ── Animation state ──
  var running = true;
  var lastTime = 0;

  // ── Helper: wrap coordinate for toroidal topology ──
  function wrapX(x) {
    var margin = 40;
    var total = width + margin * 2;
    return ((x + margin) % total + total) % total - margin;
  }

  function wrapY(y) {
    var margin = 40;
    var total = height + margin * 2;
    return ((y + margin) % total + total) % total - margin;
  }

  // ── Helper: toroidal distance ──
  function toroidalDx(x1, x2) {
    var dx = x2 - x1;
    if (dx > width / 2) dx -= width;
    if (dx < -width / 2) dx += width;
    return dx;
  }

  function toroidalDy(y1, y2) {
    var dy = y2 - y1;
    if (dy > height / 2) dy -= height;
    if (dy < -height / 2) dy += height;
    return dy;
  }

  // ── Get star color based on colorIndex ──
  function starColor(star, brightness) {
    var ci = star.colorIndex;
    var r, g, b;
    if (ci < 0.5) {
      // Amber: rgb(200, 149, 108)
      r = 200;
      g = 149;
      b = 108;
    } else {
      // Bright gold: rgb(255, 210, 140)
      r = 255;
      g = 210;
      b = 140;
    }
    // Interpolate toward white for brightest stars
    if (star.isBright) {
      var t = 0.3;
      r = r + (255 - r) * t;
      g = g + (255 - g) * t;
      b = b + (255 - b) * t;
    }
    return 'rgba(' + (r | 0) + ', ' + (g | 0) + ', ' + (b | 0) + ', ' + brightness + ')';
  }

  // ── Update stars ──
  function updateStars(dt) {
    var speedMult = prefersReduced ? 0.1 : DRIFT_SPEED;
    var cx = width / 2;
    var cy = height / 2;

    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];

      // Apply gentle global rotation around center
      var dx = s.x - cx;
      var dy = s.y - cy;
      var rotAngle = ROTATION_SPEED * speedMult * dt;
      var cosR = Math.cos(rotAngle);
      var sinR = Math.sin(rotAngle);
      s.x = cx + dx * cosR - dy * sinR;
      s.y = cy + dx * sinR + dy * cosR;

      // Drift
      s.x += s.vx * speedMult * dt * 60;
      s.y += s.vy * speedMult * dt * 60;

      // Wrap (toroidal)
      s.x = wrapX(s.x);
      s.y = wrapY(s.y);
    }
  }

  // ── Update shooting stars ──
  function updateShootingStars(dt) {
    shootingStarTimer += dt;
    if (shootingStarTimer >= SHOOTING_STAR_INTERVAL) {
      shootingStarTimer = 0;
      SHOOTING_STAR_INTERVAL = 3.0 + Math.random() * 7.0;
      spawnShootingStar();
    }

    for (var i = shootingStars.length - 1; i >= 0; i--) {
      var ss = shootingStars[i];
      ss.x += ss.vx * dt;
      ss.y += ss.vy * dt;
      ss.life -= ss.decay * dt;
      if (ss.life <= 0) {
        shootingStars.splice(i, 1);
      }
    }
  }

  // ── Draw background ──
  function drawBackground() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, width, height);

    // Subtle noise texture overlay
    ctx.globalAlpha = 0.4;
    var pat = ctx.createPattern(noiseCanvas, 'repeat');
    if (pat) {
      ctx.fillStyle = pat;
      ctx.fillRect(0, 0, width, height);
    }
    ctx.globalAlpha = 1.0;
  }

  // ── Draw constellation connections ──
  function drawConnections(time) {
    var connectDist = BASE_CONNECT_DIST * CONNECTION_RANGE;
    // Scale connection distance with screen size for consistent density
    var screenScale = Math.min(width, height) / 800;
    connectDist *= screenScale;

    for (var i = 0; i < stars.length; i++) {
      for (var j = i + 1; j < stars.length; j++) {
        var si = stars[i];
        var sj = stars[j];

        var dx = toroidalDx(si.x, sj.x);
        var dy = toroidalDy(si.y, sj.y);
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < connectDist && dist > 0) {
          // Opacity proportional to closeness
          var closeness = 1.0 - dist / connectDist;
          var alpha = closeness * closeness * 0.35;

          // Subtle breathing
          alpha *= 0.8 + 0.2 * Math.sin(time * 0.8 + i * 0.3 + j * 0.7);

          // Brighter if both stars are bright
          if (si.isBright && sj.isBright) {
            alpha *= 1.8;
          } else if (si.isBright || sj.isBright) {
            alpha *= 1.3;
          }

          alpha = Math.min(alpha, 0.5);

          if (alpha > 0.01) {
            // Draw the connection line
            ctx.beginPath();
            ctx.moveTo(si.x, si.y);
            ctx.lineTo(si.x + dx, si.y + dy);
            ctx.strokeStyle = 'rgba(150, 110, 70, ' + alpha + ')';
            ctx.lineWidth = 0.5 + closeness * 0.5;

            // Glow effect: draw a wider translucent line underneath
            ctx.save();
            ctx.shadowColor = 'rgba(200, 149, 108, ' + (alpha * 0.5) + ')';
            ctx.shadowBlur = 3;
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }
  }

  // ── Draw stars ──
  function drawStars(time) {
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];

      // Twinkle: sinusoidal brightness oscillation
      var twinkle = 1.0 - s.twinkleDepth * 0.5 * (1.0 + Math.sin(time * s.twinkleSpeed + s.twinklePhase));
      var brightness = s.baseBrightness * twinkle;

      // Radial gradient glow
      var glowSize = s.radius * (s.isBright ? 8 : 5);
      var grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowSize);

      // Core: bright, near-white warm
      var coreAlpha = brightness;
      var midAlpha = brightness * 0.3;
      var outerAlpha = brightness * 0.05;

      if (s.isBright) {
        grad.addColorStop(0, 'rgba(255, 235, 200, ' + coreAlpha + ')');
        grad.addColorStop(0.1, starColor(s, coreAlpha * 0.8));
        grad.addColorStop(0.4, starColor(s, midAlpha));
        grad.addColorStop(1, starColor(s, 0));
      } else {
        grad.addColorStop(0, starColor(s, coreAlpha));
        grad.addColorStop(0.3, starColor(s, midAlpha));
        grad.addColorStop(1, starColor(s, 0));
      }

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(s.x, s.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Sharp core dot
      var coreSize = s.radius * (s.isBright ? 1.2 : 0.7);
      ctx.fillStyle = starColor(s, brightness * 0.9);
      ctx.beginPath();
      ctx.arc(s.x, s.y, coreSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Draw shooting stars ──
  function drawShootingStars() {
    for (var i = 0; i < shootingStars.length; i++) {
      var ss = shootingStars[i];
      var alpha = ss.life * ss.brightness;
      if (alpha < 0.01) continue;

      // Normalized velocity direction
      var speed = Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy);
      var nx = ss.vx / speed;
      var ny = ss.vy / speed;

      // Trail: draw line from current position back along velocity
      var trailLen = ss.trailLength * ss.life;
      var tailX = ss.x - nx * trailLen;
      var tailY = ss.y - ny * trailLen;

      // Gradient along the trail
      var grad = ctx.createLinearGradient(ss.x, ss.y, tailX, tailY);
      grad.addColorStop(0, 'rgba(255, 220, 150, ' + (alpha * 0.9) + ')');
      grad.addColorStop(0.3, 'rgba(220, 170, 100, ' + (alpha * 0.5) + ')');
      grad.addColorStop(1, 'rgba(180, 130, 70, 0)');

      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(tailX, tailY);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Bright head glow
      var headGrad = ctx.createRadialGradient(ss.x, ss.y, 0, ss.x, ss.y, 6);
      headGrad.addColorStop(0, 'rgba(255, 240, 200, ' + (alpha * 0.8) + ')');
      headGrad.addColorStop(0.5, 'rgba(255, 200, 120, ' + (alpha * 0.3) + ')');
      headGrad.addColorStop(1, 'rgba(200, 149, 108, 0)');
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.arc(ss.x, ss.y, 6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Draw subtle vignette ──
  function drawVignette() {
    var cx = width / 2;
    var cy = height / 2;
    var maxDim = Math.max(width, height);
    var grad = ctx.createRadialGradient(cx, cy, maxDim * 0.25, cx, cy, maxDim * 0.75);
    grad.addColorStop(0, 'rgba(10, 10, 10, 0)');
    grad.addColorStop(1, 'rgba(10, 10, 10, 0.45)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
  }

  // ── Main render loop ──
  function render(timestamp) {
    if (!running) {
      requestAnimationFrame(render);
      return;
    }

    if (!lastTime) lastTime = timestamp;
    var rawDt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    var dt = rawDt;
    var time = timestamp / 1000;

    // Update
    updateStars(dt);
    updateShootingStars(dt);

    // Draw
    drawBackground();
    drawConnections(time);
    drawStars(time);
    drawShootingStars();
    drawVignette();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility-based pause ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
    }
  });

  // ── Message listener for parameter updates ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': DRIFT_SPEED = e.data.value; break;
        case 'CONNECTION_RANGE': CONNECTION_RANGE = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
