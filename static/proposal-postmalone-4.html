<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grain Cascade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Grain Cascade</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Grain Cascade — Organic flowing film grain with density variation
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var FLOW_SPEED = 0.3;
  var GRAIN_DENSITY = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_flowSpeed;',
    'uniform float u_grainDensity;',
    '',
    '// ─── Hash functions for high-frequency grain ───',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy);',
    '}',
    '',
    'float hash3(vec3 p) {',
    '  p = fract(p * 0.1031);',
    '  p += dot(p, p.yzx + 33.33);',
    '  return fract((p.x + p.y) * p.z);',
    '}',
    '',
    '// ─── Smooth value noise ───',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  return mix(',
    '    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),',
    '    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),',
    '    f.y',
    '  );',
    '}',
    '',
    '// ─── Gradient noise (simplex-like) for smoother density field ───',
    'vec2 grad2(vec2 p) {',
    '  float h = hash(p) * 6.2831853;',
    '  return vec2(cos(h), sin(h));',
    '}',
    '',
    'float gnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  float a = dot(grad2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0));',
    '  float b = dot(grad2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0));',
    '  float c = dot(grad2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0));',
    '  float d = dot(grad2(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0));',
    '  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y) * 0.5 + 0.5;',
    '}',
    '',
    '// ─── Multi-octave density field with diagonal flow ───',
    'float densityField(vec2 uv, float t) {',
    '  float speed = t * u_flowSpeed;',
    '  // Diagonal flow direction — like wind-driven sand',
    '  vec2 flow = vec2(0.7, -0.4) * speed;',
    '  vec2 flowB = vec2(-0.3, 0.6) * speed;',
    '  vec2 flowC = vec2(0.5, 0.3) * speed;',
    '',
    '  // Octave 1 — large-scale density clouds',
    '  float n1 = gnoise(uv * 1.8 + flow);',
    '',
    '  // Octave 2 — medium detail, different flow rate',
    '  float n2 = gnoise(uv * 3.5 + flowB * 1.3 + vec2(44.4, 77.7));',
    '',
    '  // Octave 3 — finer turbulence',
    '  float n3 = gnoise(uv * 7.0 + flowC * 0.8 + vec2(123.4, 567.8));',
    '',
    '  // Combine with weighting that favors large-scale structure',
    '  float density = n1 * 0.55 + n2 * 0.30 + n3 * 0.15;',
    '',
    '  // Shape the curve: push toward extremes for more contrast',
    '  // between thick and thin areas',
    '  density = smoothstep(0.2, 0.8, density);',
    '  density = density * density * (3.0 - 2.0 * density);',
    '',
    '  return density;',
    '}',
    '',
    '// ─── Density gradient for flow direction ───',
    'vec2 densityGradient(vec2 uv, float t) {',
    '  float eps = 0.005;',
    '  float dx = densityField(uv + vec2(eps, 0.0), t) - densityField(uv - vec2(eps, 0.0), t);',
    '  float dy = densityField(uv + vec2(0.0, eps), t) - densityField(uv - vec2(0.0, eps), t);',
    '  return vec2(dx, dy) / (2.0 * eps);',
    '}',
    '',
    '// ─── Layer 6: Background — warm dark paper tone ───',
    'vec3 background(vec2 uv, float t) {',
    '  // Base dark warm brown',
    '  vec3 base = vec3(0.035, 0.025, 0.016);',
    '',
    '  // Large-scale tonal variation like aged paper',
    '  float paper1 = gnoise(uv * 0.8 + vec2(t * 0.01, t * 0.007));',
    '  float paper2 = gnoise(uv * 1.2 + vec2(t * -0.008, t * 0.012) + vec2(55.5, 33.3));',
    '  float paperTone = paper1 * 0.6 + paper2 * 0.4;',
    '',
    '  // Subtle warm patches',
    '  base += vec3(0.018, 0.012, 0.005) * smoothstep(0.35, 0.65, paperTone);',
    '',
    '  // Even subtler cool patches for contrast',
    '  float coolPatch = gnoise(uv * 1.5 + vec2(99.9, 11.1) + t * 0.005);',
    '  base += vec3(-0.003, 0.001, 0.006) * smoothstep(0.5, 0.75, coolPatch);',
    '',
    '  // Very subtle vignette — darken edges',
    '  float vig = length(uv * vec2(0.7, 0.9));',
    '  base *= 1.0 - smoothstep(0.5, 1.3, vig) * 0.25;',
    '',
    '  return base;',
    '}',
    '',
    '// ─── Layer 2: Coarse grain — individual visible specks ───',
    'float coarseGrain(vec2 uv, float t, float density) {',
    '  // Temporal jitter for grain animation',
    '  float seed = floor(t * 12.0);',
    '  vec2 grainUV = uv * u_res * 0.5;',
    '',
    '  // Grid of potential grain particles',
    '  float scale = 3.0;',
    '  vec2 cell = floor(grainUV / scale);',
    '  vec2 cellUV = fract(grainUV / scale);',
    '',
    '  // Per-cell random: position, size, brightness, existence',
    '  float cellHash = hash3(vec3(cell, seed));',
    '  vec2 particlePos = hash2(cell + vec2(seed * 7.7, seed * 3.3));',
    '',
    '  // Distance from cell center to particle',
    '  float dist = length(cellUV - particlePos);',
    '',
    '  // Particle size varies — larger in dense areas',
    '  float particleSize = mix(0.08, 0.28, density) * (0.5 + cellHash * 0.5);',
    '  float particle = smoothstep(particleSize, particleSize * 0.3, dist);',
    '',
    '  // Only show a fraction of particles, more in dense areas',
    '  float threshold = mix(0.92, 0.35, density * density) / u_grainDensity;',
    '  particle *= step(threshold, cellHash);',
    '',
    '  // Brightness variation per grain',
    '  float brightness = 0.5 + hash(cell + vec2(seed * 11.1, 0.0)) * 0.5;',
    '  particle *= brightness;',
    '',
    '  return particle;',
    '}',
    '',
    '// ─── Layer 3: Fine grain — dense tiny grain everywhere ───',
    'float fineGrain(vec2 uv, float t, float density) {',
    '  float seed = floor(t * 24.0);',
    '  vec2 grainUV = uv * u_res;',
    '',
    '  // Very high frequency hash noise',
    '  float grain = hash3(vec3(grainUV, seed));',
    '',
    '  // Second layer slightly offset for richness',
    '  float grain2 = hash3(vec3(grainUV * 1.37 + vec2(77.7, 33.3), seed + 0.5));',
    '',
    '  // Combine and shape',
    '  float combined = grain * 0.6 + grain2 * 0.4;',
    '',
    '  // Threshold: more grain visible in dense areas, but some everywhere',
    '  float baseThreshold = mix(0.72, 0.35, density) / u_grainDensity;',
    '  combined = smoothstep(baseThreshold, baseThreshold + 0.15, combined);',
    '',
    '  // Scale intensity: stronger in dense areas',
    '  combined *= mix(0.25, 0.8, density);',
    '',
    '  return combined;',
    '}',
    '',
    '// ─── Layer 4: Flow lines — directional streaking ───',
    'float flowLines(vec2 uv, float t, float density, vec2 gradient) {',
    '  float seed = floor(t * 8.0);',
    '',
    '  // Get flow direction from gradient, add a base diagonal drift',
    '  vec2 flowDir = normalize(gradient + vec2(0.7, -0.4) * 0.3 + vec2(0.001));',
    '',
    '  // Project UV along flow direction to create streaks',
    '  // Coordinates aligned to flow',
    '  vec2 perp = vec2(-flowDir.y, flowDir.x);',
    '  float along = dot(uv * u_res * 0.15, flowDir);',
    '  float across = dot(uv * u_res * 0.5, perp);',
    '',
    '  // Hash noise stretched along flow direction',
    '  float streak = hash3(vec3(floor(across), floor(along * 0.3), seed));',
    '  float streak2 = hash3(vec3(floor(across * 1.7 + 55.5), floor(along * 0.15), seed + 3.3));',
    '',
    '  // Only visible where there is density and strong gradient',
    '  float gradStrength = length(gradient);',
    '  float visibility = density * smoothstep(0.0, 3.0, gradStrength);',
    '',
    '  float line = smoothstep(0.65, 0.85, streak) * 0.7 + smoothstep(0.7, 0.9, streak2) * 0.3;',
    '  line *= visibility * 0.5;',
    '',
    '  return line;',
    '}',
    '',
    '// ─── Layer 5: Luminosity variation — bright grains and cluster halos ───',
    'vec3 luminosityVariation(vec2 uv01, vec2 uvC, float t, float density, float coarse) {',
    '  // Bright catchlight grains within dense clusters',
    '  float seed = floor(t * 12.0);',
    '  vec2 grainUV = uv01 * u_res * 0.35;',
    '  vec2 cell = floor(grainUV);',
    '  float brightGrain = hash3(vec3(cell, seed + 99.9));',
    '',
    '  // Only the brightest grains in the densest areas',
    '  float catchlight = step(0.88, brightGrain) * step(0.6, density) * coarse;',
    '  vec3 brightSpeck = vec3(1.0, 0.85, 0.55) * catchlight * 1.2;',
    '',
    '  // Warm glow halo around dense clusters',
    '  float halo = density * density * density;',
    '  // Soft halo using low-frequency noise',
    '  float haloNoise = gnoise(uvC * 3.0 + t * u_flowSpeed * vec2(0.5, -0.3));',
    '  halo *= smoothstep(0.3, 0.7, haloNoise);',
    '  vec3 warmHalo = vec3(0.12, 0.075, 0.03) * halo * 0.6;',
    '',
    '  return brightSpeck + warmHalo;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 uvCentered = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '',
    '  // ─── Layer 1: Density field ───',
    '  float density = densityField(uvCentered, t);',
    '  vec2 gradient = densityGradient(uvCentered, t);',
    '',
    '  // ─── Layer 6: Background ───',
    '  vec3 col = background(uvCentered, t);',
    '',
    '  // ─── Layer 3: Fine grain (everywhere, modulated by density) ───',
    '  float fine = fineGrain(uv, t, density);',
    '  // Slightly cooler sepia tone for fine grain',
    '  vec3 fineColor = vec3(0.55, 0.45, 0.30) * fine;',
    '',
    '  // ─── Layer 2: Coarse grain (concentrated in dense zones) ───',
    '  float coarse = coarseGrain(uv, t, density);',
    '  // Warm amber/gold for coarse grain',
    '  vec3 coarseColor = vec3(0.75, 0.56, 0.28) * coarse;',
    '',
    '  // ─── Layer 4: Flow lines ───',
    '  float flow = flowLines(uv, t, density, gradient);',
    '  vec3 flowColor = vec3(0.60, 0.48, 0.30) * flow;',
    '',
    '  // ─── Composite grain layers ───',
    '  // Fine grain as base texture',
    '  col += fineColor * 0.12;',
    '',
    '  // Coarse grain on top, additive',
    '  col += coarseColor * 0.18;',
    '',
    '  // Flow streaks layered in',
    '  col += flowColor * 0.08;',
    '',
    '  // ─── Layer 5: Luminosity variation ───',
    '  vec3 lumVar = luminosityVariation(uv, uvCentered, t, density, coarse);',
    '  col += lumVar;',
    '',
    '  // ─── Subtle overall warmth push ───',
    '  // Ensure nothing is pure gray — everything has a warm cast',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  // Warm shadows more, keep highlights neutral',
    '  float warmAmount = 0.3 + smoothstep(0.1, 0.0, lum) * 0.2;',
    '  col = mix(col, col * vec3(1.08, 0.97, 0.88), warmAmount);',
    '',
    '  // ─── Clamp and output ───',
    '  col = clamp(col, 0.0, 1.0);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFlowSpeed = gl.getUniformLocation(prog, 'u_flowSpeed');
  var uGrainDensity = gl.getUniformLocation(prog, 'u_grainDensity');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uFlowSpeed, FLOW_SPEED);
    gl.uniform1f(uGrainDensity, GRAIN_DENSITY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FLOW_SPEED': FLOW_SPEED = e.data.value; break;
        case 'GRAIN_DENSITY': GRAIN_DENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
