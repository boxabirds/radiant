<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Lace</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Tidal Lace</div>
<canvas id="canvas"></canvas>
<script>
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // ── Tunable parameters ──
  var TIDE_SPEED = 0.5;
  var LACE_DETAIL = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_tideSpeed;',
    'uniform float u_laceDetail;',
    '',
    '// ── Hash functions for Voronoi ──',
    'vec2 hash2(vec2 p) {',
    '  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));',
    '  return fract(sin(p) * 43758.5453);',
    '}',
    '',
    '// ── Voronoi returning min distance to cell edge ──',
    '// Returns vec3(edgeDist, cellDist, cellID)',
    'vec3 voronoi(vec2 p, float t) {',
    '  vec2 n = floor(p);',
    '  vec2 f = fract(p);',
    '',
    '  // First pass: find closest cell center',
    '  float minDist = 8.0;',
    '  vec2 closestCell = vec2(0.0);',
    '  vec2 closestPoint = vec2(0.0);',
    '',
    '  for (int j = -1; j <= 1; j++) {',
    '    for (int i = -1; i <= 1; i++) {',
    '      vec2 g = vec2(float(i), float(j));',
    '      vec2 o = hash2(n + g);',
    '      // Animate cell centers slowly',
    '      o = 0.5 + 0.45 * sin(t * 0.3 + 6.2831 * o);',
    '      vec2 r = g + o - f;',
    '      float d = dot(r, r);',
    '      if (d < minDist) {',
    '        minDist = d;',
    '        closestCell = n + g;',
    '        closestPoint = r;',
    '      }',
    '    }',
    '  }',
    '',
    '  // Second pass: find distance to nearest cell edge',
    '  float edgeDist = 8.0;',
    '  for (int j = -1; j <= 1; j++) {',
    '    for (int i = -1; i <= 1; i++) {',
    '      vec2 g = vec2(float(i), float(j));',
    '      vec2 neighbor = n + g;',
    '      vec2 o = hash2(neighbor);',
    '      o = 0.5 + 0.45 * sin(t * 0.3 + 6.2831 * o);',
    '      vec2 r = g + o - f;',
    '      // Skip the closest cell itself',
    '      vec2 diff = r - closestPoint;',
    '      if (dot(diff, diff) > 0.0001) {',
    '        // Distance to edge between closest and this neighbor',
    '        vec2 mid = 0.5 * (closestPoint + r);',
    '        vec2 norm = normalize(diff);',
    '        float d = abs(dot(mid, norm));',
    '        edgeDist = min(edgeDist, d);',
    '      }',
    '    }',
    '  }',
    '',
    '  float cellId = dot(closestCell, vec2(7.0, 113.0));',
    '  return vec3(edgeDist, sqrt(minDist), cellId);',
    '}',
    '',
    '// ── Simple value noise for subtle texture ──',
    'float hash1(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash1(i);',
    '  float b = hash1(i + vec2(1.0, 0.0));',
    '  float c = hash1(i + vec2(0.0, 1.0));',
    '  float d = hash1(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 p = uv;',
    '  p.x *= aspect;',
    '',
    '  float t = u_time * u_tideSpeed;',
    '  float detail = u_laceDetail;',
    '',
    '  // ── Tide line: sweeps vertically with gentle horizontal curve ──',
    '  float tideY = 0.5 + 0.3 * sin(t * 0.4);',
    '  // Slight wave shape to the tide line itself',
    '  float tideWave = 0.03 * sin(p.x * 8.0 - t * 1.5)',
    '                 + 0.015 * sin(p.x * 15.0 + t * 2.0)',
    '                 + 0.008 * sin(p.x * 25.0 - t * 0.8);',
    '  float tideLine = tideY + tideWave;',
    '',
    '  // Distance from tide line — foam is dense near it',
    '  float tideDist = uv.y - tideLine;',
    '',
    '  // Foam envelope: dense at tide line, fading behind (below) the wave',
    '  // Foam mostly trails behind the wave (on the side the wave came from)',
    '  float foamEnvelope = exp(-tideDist * tideDist * 25.0);',
    '  // Trailing foam: thinner tendrils left behind below the tide line',
    '  float trailFoam = smoothstep(0.35, 0.0, -tideDist) * exp(tideDist * 3.0);',
    '  foamEnvelope = max(foamEnvelope, trailFoam * 0.5);',
    '',
    '  // ── Voronoi Scale 1: Large foam cells ──',
    '  vec2 vp1 = p * (4.0 + detail * 2.0);',
    '  // Slow advection — cells drift toward the receding tide',
    '  vp1.y += t * 0.2;',
    '  vp1.x += sin(t * 0.15 + p.y * 3.0) * 0.3;',
    '  vec3 v1 = voronoi(vp1, t);',
    '',
    '  // ── Voronoi Scale 2: Fine lace detail ──',
    '  vec2 vp2 = p * (9.0 + detail * 5.0);',
    '  vp2.y += t * 0.15;',
    '  vp2.x -= sin(t * 0.2 + p.y * 5.0) * 0.2;',
    '  vec3 v2 = voronoi(vp2, t * 1.3);',
    '',
    '  // ── Combine edge distances into foam pattern ──',
    '  // Foam appears at cell edges (where edgeDist is small)',
    '  float edge1 = smoothstep(0.06, 0.0, v1.x);',
    '  float edge2 = smoothstep(0.04, 0.0, v2.x);',
    '',
    '  // Blend the two scales: large cells provide structure, small adds lace',
    '  float foam = edge1 * 0.7 + edge2 * 0.5;',
    '',
    '  // Add some fill inside smaller cells near the tide for denser foam patches',
    '  float cellFill = smoothstep(0.25, 0.1, v1.x) * smoothstep(0.15, 0.05, abs(tideDist));',
    '  foam += cellFill * 0.25;',
    '',
    '  // Modulate foam by the tide envelope',
    '  foam *= foamEnvelope;',
    '',
    '  // ── Additional organic breakup ──',
    '  // Value noise to break up foam edges, making them more natural',
    '  float breakup = vnoise(p * 30.0 + t * 0.3);',
    '  foam *= 0.6 + 0.4 * breakup;',
    '',
    '  // Thin wispy tendrils far from tide using the fine voronoi',
    '  float wisps = edge2 * 0.3 * smoothstep(0.4, 0.15, abs(tideDist));',
    '  foam += wisps * (0.5 + 0.5 * vnoise(p * 20.0 - t * 0.2));',
    '',
    '  foam = clamp(foam, 0.0, 1.0);',
    '',
    '  // ── Colors ──',
    '  // Dark wet sand base',
    '  vec3 sandColor = vec3(0.04, 0.035, 0.03);',
    '',
    '  // Wet sand is slightly lighter/reflective near foam',
    '  float wetSheen = foamEnvelope * 0.5;',
    '  // Subtle reflective highlight on wet sand',
    '  float sheenPattern = vnoise(p * 12.0 + vec2(t * 0.1, 0.0));',
    '  vec3 wetSandColor = sandColor + vec3(0.025, 0.022, 0.018) * wetSheen * sheenPattern;',
    '',
    '  // Warm off-white foam color',
    '  vec3 foamColor = vec3(0.85, 0.75, 0.60);',
    '',
    '  // Foam glow: subtle warm luminance around foam edges',
    '  float glowMask = smoothstep(0.0, 0.5, foam);',
    '  vec3 foamGlow = vec3(0.15, 0.11, 0.07) * glowMask * foamEnvelope;',
    '',
    '  // ── Composite ──',
    '  vec3 col = wetSandColor;',
    '  // Add foam glow beneath the foam',
    '  col += foamGlow;',
    '  // Blend foam on top',
    '  col = mix(col, foamColor, foam * 0.9);',
    '',
    '  // ── Slight brightness variation across tide for depth ──',
    '  float depthGrad = 1.0 - smoothstep(0.0, 1.0, uv.y) * 0.08;',
    '  col *= depthGrad;',
    '',
    '  // ── Subtle vignette ──',
    '  vec2 vc = (uv - 0.5) * vec2(aspect, 1.0);',
    '  float vig = 1.0 - smoothstep(0.4, 1.2, length(vc));',
    '  col *= 0.7 + 0.3 * vig;',
    '',
    '  // ── Film grain ──',
    '  float grain = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + fract(u_time * 0.1) * 100.0) * 43758.5453) - 0.5) * 0.015;',
    '  col += grain;',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uTideSpeed = gl.getUniformLocation(prog, 'u_tideSpeed');
  var uLaceDetail = gl.getUniformLocation(prog, 'u_laceDetail');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    var t = prefersReduced ? 0.0 : now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTideSpeed, TIDE_SPEED);
    gl.uniform1f(uLaceDetail, LACE_DETAIL);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Visibility pause ──
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  // ── PostMessage listener for parameter updates ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'TIDE_SPEED': TIDE_SPEED = e.data.value; break;
        case 'LACE_DETAIL': LACE_DETAIL = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
