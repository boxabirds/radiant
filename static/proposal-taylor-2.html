<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendship Bracelets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Friendship Bracelets</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  // Tunable parameters
  var SCROLL_SPEED = 0.5;
  var BEAD_DENSITY = 1.0;

  // Simple seeded pseudo-random for deterministic bead properties
  function hash(n) {
    var x = Math.sin(n * 127.1 + n * n * 311.7) * 43758.5453;
    return x - Math.floor(x);
  }

  // Color palette - warm amber tones only
  var BEAD_COLORS = [
    [200, 149, 108],  // amber
    [212, 165, 116],  // gold
    [180, 120, 70],   // copper
    [220, 175, 125],  // light gold
    [190, 135, 85],   // warm brown
    [210, 155, 100],  // soft amber
    [225, 185, 135],  // pale gold
    [170, 110, 65]    // deep copper
  ];

  var THREAD_COLOR = [100, 70, 40];
  var HIGHLIGHT_COLOR = [255, 210, 130];

  // Bracelet definitions - generated once, scrolled continuously
  var bracelets = [];
  var NUM_BRACELETS = 18;

  function createBracelet(index) {
    var seed = index * 1000;
    var numBeads = Math.floor((30 + hash(seed + 1) * 30) * BEAD_DENSITY);
    var yBase = (height / (NUM_BRACELETS + 1)) * (index + 1) + (hash(seed + 2) - 0.5) * height * 0.08;

    // Depth layer: 0 = far back, 1 = middle, 2 = front
    var depthRoll = hash(seed + 3);
    var depth = depthRoll < 0.3 ? 0 : (depthRoll < 0.7 ? 1 : 2);

    var depthScale = depth === 0 ? 0.6 : (depth === 1 ? 0.85 : 1.0);
    var depthAlpha = depth === 0 ? 0.35 : (depth === 1 ? 0.65 : 1.0);

    // Speed variation: back bracelets move slower
    var speedMult = (0.6 + hash(seed + 4) * 0.8) * depthScale;
    // Diagonal angle
    var angle = (hash(seed + 5) - 0.5) * 0.15; // slight tilt in radians

    // Wave params for the bracelet path
    var waveAmp = (8 + hash(seed + 6) * 25) * depthScale;
    var waveFreq = 0.004 + hash(seed + 7) * 0.008;
    var wavePhase = hash(seed + 8) * Math.PI * 2;

    // Bead spacing
    var beadSpacing = 8 + hash(seed + 9) * 6;

    // Generate bead properties
    var beads = [];
    for (var i = 0; i < numBeads; i++) {
      var bSeed = seed + 100 + i * 7;
      var size = (3 + hash(bSeed) * 5) * depthScale;
      var colorIdx = Math.floor(hash(bSeed + 1) * BEAD_COLORS.length);
      var jitterX = (hash(bSeed + 2) - 0.5) * 2;
      var jitterY = (hash(bSeed + 3) - 0.5) * 2;
      var twinklePhase = hash(bSeed + 4) * Math.PI * 2;
      var twinkleSpeed = 1.5 + hash(bSeed + 5) * 3.0;

      beads.push({
        localOffset: i * beadSpacing,
        size: size,
        colorIdx: colorIdx,
        jitterX: jitterX,
        jitterY: jitterY,
        twinklePhase: twinklePhase,
        twinkleSpeed: twinkleSpeed
      });
    }

    var totalLength = numBeads * beadSpacing;

    return {
      yBase: yBase,
      depth: depth,
      depthScale: depthScale,
      depthAlpha: depthAlpha,
      speedMult: speedMult,
      angle: angle,
      waveAmp: waveAmp,
      waveFreq: waveFreq,
      wavePhase: wavePhase,
      beads: beads,
      totalLength: totalLength,
      scrollOffset: hash(seed + 10) * totalLength * 2
    };
  }

  function initBracelets() {
    bracelets = [];
    for (var i = 0; i < NUM_BRACELETS; i++) {
      bracelets.push(createBracelet(i));
    }
    // Sort by depth so back ones draw first
    bracelets.sort(function(a, b) { return a.depth - b.depth; });
  }

  initBracelets();
  window.addEventListener('resize', function() {
    resize();
    initBracelets();
  });

  // Get position along a bracelet path at a given x
  function getPathY(bracelet, x, time) {
    var wave = Math.sin(x * bracelet.waveFreq + bracelet.wavePhase + time * 0.3) * bracelet.waveAmp;
    var wave2 = Math.sin(x * bracelet.waveFreq * 2.3 + bracelet.wavePhase * 1.7 + time * 0.2) * bracelet.waveAmp * 0.3;
    return bracelet.yBase + wave + wave2 + Math.sin(bracelet.angle) * (x - width / 2);
  }

  function drawBead(x, y, size, colorIdx, alpha, twinkle) {
    var color = BEAD_COLORS[colorIdx];
    var r = color[0], g = color[1], b = color[2];

    // Main bead body with radial gradient for 3D look
    var grad = ctx.createRadialGradient(x - size * 0.25, y - size * 0.25, size * 0.1, x, y, size);
    grad.addColorStop(0, 'rgba(' + Math.min(255, r + 40) + ',' + Math.min(255, g + 40) + ',' + Math.min(255, b + 40) + ',' + alpha + ')');
    grad.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')');
    grad.addColorStop(1, 'rgba(' + Math.max(0, r - 50) + ',' + Math.max(0, g - 50) + ',' + Math.max(0, b - 50) + ',' + alpha * 0.7 + ')');

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Rim highlight
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(' + Math.min(255, r + 20) + ',' + Math.min(255, g + 20) + ',' + Math.min(255, b + 20) + ',' + alpha * 0.3 + ')';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Specular highlight dot - twinkle controls intensity
    if (size > 2) {
      var specAlpha = alpha * (0.3 + twinkle * 0.7);
      var specSize = Math.max(0.8, size * 0.2 + twinkle * size * 0.15);
      var specX = x - size * 0.3;
      var specY = y - size * 0.35;

      ctx.beginPath();
      ctx.arc(specX, specY, specSize, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + HIGHLIGHT_COLOR[0] + ',' + HIGHLIGHT_COLOR[1] + ',' + HIGHLIGHT_COLOR[2] + ',' + specAlpha + ')';
      ctx.fill();

      // Extra glow when twinkle is high
      if (twinkle > 0.7) {
        var glowAlpha = (twinkle - 0.7) * 3.33 * alpha * 0.3;
        var glowGrad = ctx.createRadialGradient(specX, specY, 0, specX, specY, size * 0.8);
        glowGrad.addColorStop(0, 'rgba(255, 240, 200, ' + glowAlpha + ')');
        glowGrad.addColorStop(1, 'rgba(255, 240, 200, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(specX, specY, size * 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawBracelet(bracelet, time) {
    var scrollX = bracelet.scrollOffset + time * SCROLL_SPEED * 60 * bracelet.speedMult;
    var alpha = bracelet.depthAlpha;
    var beads = bracelet.beads;
    var totalLen = bracelet.totalLength;

    // Extra canvas margin for beads
    var margin = 40;

    // Draw thread first, then beads on top
    // Collect visible bead positions
    var visibleBeads = [];

    for (var i = 0; i < beads.length; i++) {
      var bead = beads[i];
      // Calculate bead x position with wrapping
      var rawX = bead.localOffset - (scrollX % (totalLen + width + margin * 2)) + width + margin;
      // Wrap around
      var beadX = ((rawX % (totalLen + width + margin * 2)) + (totalLen + width + margin * 2)) % (totalLen + width + margin * 2) - margin;

      if (beadX < -margin || beadX > width + margin) continue;

      var beadY = getPathY(bracelet, beadX, time) + bead.jitterY;
      beadX += bead.jitterX;

      // Twinkle calculation
      var twinkle = Math.sin(time * bead.twinkleSpeed + bead.twinklePhase);
      twinkle = twinkle * 0.5 + 0.5; // normalize to 0-1
      twinkle = twinkle * twinkle; // sharpen peaks

      visibleBeads.push({
        x: beadX,
        y: beadY,
        size: bead.size,
        colorIdx: bead.colorIdx,
        twinkle: twinkle
      });
    }

    // Sort beads by x for thread drawing
    visibleBeads.sort(function(a, b) { return a.x - b.x; });

    // Draw threads between consecutive beads
    if (visibleBeads.length > 1) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(' + THREAD_COLOR[0] + ',' + THREAD_COLOR[1] + ',' + THREAD_COLOR[2] + ',' + alpha * 0.5 + ')';
      ctx.lineWidth = 0.8 * bracelet.depthScale;

      for (var j = 0; j < visibleBeads.length - 1; j++) {
        var a = visibleBeads[j];
        var b = visibleBeads[j + 1];
        // Only draw thread if beads are reasonably close
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 40) {
          ctx.moveTo(a.x, a.y);
          // Slight catenary sag
          var midX = (a.x + b.x) / 2;
          var midY = (a.y + b.y) / 2 + dist * 0.05;
          ctx.quadraticCurveTo(midX, midY, b.x, b.y);
        }
      }
      ctx.stroke();
    }

    // Draw beads
    for (var k = 0; k < visibleBeads.length; k++) {
      var vb = visibleBeads[k];
      drawBead(vb.x, vb.y, vb.size, vb.colorIdx, alpha, vb.twinkle);
    }
  }

  function drawVignette() {
    var cx = width / 2;
    var cy = height / 2;
    var maxDim = Math.max(width, height);
    var vignette = ctx.createRadialGradient(cx, cy, maxDim * 0.25, cx, cy, maxDim * 0.8);
    vignette.addColorStop(0, 'rgba(10, 10, 10, 0)');
    vignette.addColorStop(1, 'rgba(10, 10, 10, 0.45)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);
  }

  // Animation state
  var lastTime = 0;
  var running = true;

  function render(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (prefersReduced) dt = 0;

    var time = timestamp / 1000;

    // Phosphor trail effect: semi-transparent clear
    ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
    ctx.fillRect(0, 0, width, height);

    // Full clear every ~2 seconds to prevent permanent ghosting
    if (Math.floor(time * 0.5) !== Math.floor((time - dt) * 0.5)) {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);
    }

    // Draw bracelets (already sorted by depth)
    for (var i = 0; i < bracelets.length; i++) {
      drawBracelet(bracelets[i], time);
    }

    drawVignette();

    if (running) {
      requestAnimationFrame(render);
    }
  }

  // Visibility handling
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      lastTime = 0;
      requestAnimationFrame(render);
    }
  });

  requestAnimationFrame(render);

  // PostMessage handler for parameter tuning
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'SCROLL_SPEED': SCROLL_SPEED = e.data.value; break;
        case 'BEAD_DENSITY':
          BEAD_DENSITY = e.data.value;
          initBracelets();
          break;
      }
    }
  });
})();
</script>
</body>
</html>
