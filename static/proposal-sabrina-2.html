<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satin Ripple</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Satin Ripple</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_rippleSpeed;',
    'uniform float u_sheenIntensity;',
    '',
    '// ── Hash for pseudo-random ──',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    '// ── Smooth noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── FBM for organic detail ──',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  mat2 rot = mat2(0.866, 0.5, -0.5, 0.866);',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * noise(p);',
    '    p = rot * p * 2.0 + vec2(100.0);',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Fabric height field: layered sine waves simulating draped satin ──',
    'float fabricHeight(vec2 uv, float t) {',
    '  float h = 0.0;',
    '',
    '  // Primary drape - large gentle folds',
    '  h += sin(uv.x * 2.5 + uv.y * 1.2 + t * 0.4) * 0.35;',
    '  h += sin(uv.x * 1.0 - uv.y * 2.8 + t * 0.3) * 0.25;',
    '',
    '  // Secondary ripples - medium folds giving body to the fabric',
    '  h += sin(uv.x * 4.5 + uv.y * 3.0 + t * 0.7) * 0.15;',
    '  h += sin(uv.x * 3.2 - uv.y * 5.1 + t * 0.55) * 0.12;',
    '  h += sin(uv.x * 6.0 + uv.y * 1.5 - t * 0.6) * 0.08;',
    '',
    '  // Tertiary detail - fine ripples',
    '  h += sin(uv.x * 8.5 + uv.y * 7.0 + t * 0.9) * 0.05;',
    '  h += sin(uv.x * 11.0 - uv.y * 9.5 + t * 0.85) * 0.035;',
    '  h += sin(uv.x * 14.0 + uv.y * 12.0 - t * 1.1) * 0.02;',
    '',
    '  // Organic warp using noise for less mechanical look',
    '  float warp = fbm(uv * 1.5 + t * 0.08);',
    '  h += (warp - 0.5) * 0.18;',
    '',
    '  // Cross-weave subtle texture',
    '  float weaveX = sin(uv.x * 25.0 + uv.y * 0.5) * 0.008;',
    '  float weaveY = sin(uv.y * 25.0 + uv.x * 0.5) * 0.008;',
    '  h += weaveX + weaveY;',
    '',
    '  return h;',
    '}',
    '',
    '// ── Compute surface normal from height field via partial derivatives ──',
    'vec3 fabricNormal(vec2 uv, float t) {',
    '  float eps = 0.003;',
    '  float hC = fabricHeight(uv, t);',
    '  float hR = fabricHeight(uv + vec2(eps, 0.0), t);',
    '  float hU = fabricHeight(uv + vec2(0.0, eps), t);',
    '  vec3 tangentX = vec3(eps, 0.0, hR - hC);',
    '  vec3 tangentY = vec3(0.0, eps, hU - hC);',
    '  return normalize(cross(tangentX, tangentY));',
    '}',
    '',
    'void main() {',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 uv = (fragCoord - u_res * 0.5) / min(u_res.x, u_res.y);',
    '',
    '  float t = u_time * u_rippleSpeed;',
    '',
    '  // ═══ FABRIC SURFACE ═══',
    '  // Scale UV for the fabric domain',
    '  vec2 fabricUV = uv * 4.5;',
    '',
    '  // Get height and normal',
    '  float h = fabricHeight(fabricUV, t);',
    '  vec3 N = fabricNormal(fabricUV, t);',
    '',
    '  // ═══ ANISOTROPIC DIRECTION (weave direction) ═══',
    '  // Satin has a dominant weave direction that affects reflections',
    '  vec2 weaveDir2D = normalize(vec2(0.7, 1.0));',
    '  vec3 weaveDir = normalize(vec3(weaveDir2D, 0.0));',
    '',
    '  // ═══ LIGHTING SETUP ═══',
    '  // Primary light - soft overhead slightly from the left',
    '  vec3 lightDir1 = normalize(vec3(-0.3, 0.5, 1.0));',
    '  // Secondary fill light - from the right, dimmer',
    '  vec3 lightDir2 = normalize(vec3(0.6, -0.2, 0.8));',
    '  // Rim light from behind for edge definition',
    '  vec3 lightDir3 = normalize(vec3(0.0, -0.8, 0.3));',
    '',
    '  vec3 viewDir = vec3(0.0, 0.0, 1.0);',
    '',
    '  // ═══ BLINN-PHONG WITH ANISOTROPIC MODIFICATION ═══',
    '',
    '  // ── Light 1: Primary ──',
    '  vec3 H1 = normalize(lightDir1 + viewDir);',
    '  float NdotL1 = max(dot(N, lightDir1), 0.0);',
    '  float NdotH1 = max(dot(N, H1), 0.0);',
    '',
    '  // Anisotropic term: specular is stretched along the weave',
    '  float TdotH1 = dot(weaveDir, H1);',
    '  float aniso1 = sqrt(max(1.0 - TdotH1 * TdotH1, 0.0));',
    '  float spec1 = pow(NdotH1, 40.0) * 1.2;',
    '  // Blend between isotropic and anisotropic specular',
    '  float anisoSpec1 = pow(aniso1, 60.0) * 0.6;',
    '  float totalSpec1 = (spec1 + anisoSpec1) * NdotL1;',
    '',
    '  // ── Light 2: Fill ──',
    '  vec3 H2 = normalize(lightDir2 + viewDir);',
    '  float NdotL2 = max(dot(N, lightDir2), 0.0);',
    '  float NdotH2 = max(dot(N, H2), 0.0);',
    '  float TdotH2 = dot(weaveDir, H2);',
    '  float aniso2 = sqrt(max(1.0 - TdotH2 * TdotH2, 0.0));',
    '  float spec2 = pow(NdotH2, 35.0) * 0.6;',
    '  float anisoSpec2 = pow(aniso2, 50.0) * 0.3;',
    '  float totalSpec2 = (spec2 + anisoSpec2) * NdotL2;',
    '',
    '  // ── Light 3: Rim ──',
    '  float NdotL3 = max(dot(N, lightDir3), 0.0);',
    '  float rim = pow(1.0 - max(dot(N, viewDir), 0.0), 3.0);',
    '',
    '  // ═══ SATIN COLOR PALETTE ═══',
    '  // Champagne pink / rose gold base',
    '  vec3 satinBase = vec3(0.78, 0.48, 0.42);',
    '  // Deeper rose for shadows',
    '  vec3 satinShadow = vec3(0.18, 0.08, 0.07);',
    '  // Warm highlight tint',
    '  vec3 satinHighlight = vec3(1.0, 0.85, 0.80);',
    '  // Rose gold mid-tone',
    '  vec3 satinMid = vec3(0.88, 0.55, 0.48);',
    '',
    '  // ═══ DIFFUSE SHADING ═══',
    '  float diffuse = NdotL1 * 0.7 + NdotL2 * 0.3;',
    '  // Soften diffuse for satin (wraps around more than matte)',
    '  float wrapDiffuse = diffuse * 0.5 + 0.5;',
    '  wrapDiffuse = wrapDiffuse * wrapDiffuse;',
    '',
    '  // Height-based color variation for fold depth',
    '  float hNorm = h * 0.8 + 0.5;',
    '  hNorm = clamp(hNorm, 0.0, 1.0);',
    '',
    '  // Mix base color based on fold height: valleys are dark, peaks are bright',
    '  vec3 baseColor = mix(satinShadow, satinBase, smoothstep(0.15, 0.65, hNorm));',
    '  baseColor = mix(baseColor, satinMid, smoothstep(0.55, 0.85, hNorm));',
    '',
    '  // Apply diffuse lighting',
    '  vec3 col = baseColor * (0.3 + 0.7 * wrapDiffuse);',
    '',
    '  // ═══ SPECULAR / SHEEN ═══',
    '  // The characteristic satin sheen line',
    '  float sheen = (totalSpec1 + totalSpec2) * u_sheenIntensity;',
    '',
    '  // Broader soft sheen underneath the sharp specular',
    '  float softSheen1 = pow(NdotH1, 8.0) * NdotL1 * 0.35;',
    '  float softSheen2 = pow(NdotH2, 6.0) * NdotL2 * 0.15;',
    '  float softSheen = (softSheen1 + softSheen2) * u_sheenIntensity;',
    '',
    '  // Apply specular highlights',
    '  col += satinHighlight * sheen * 0.9;',
    '  col += satinMid * softSheen * 0.5;',
    '',
    '  // ═══ RIM / EDGE LIGHT ═══',
    '  col += vec3(0.85, 0.65, 0.55) * rim * 0.15;',
    '',
    '  // ═══ SUBSURFACE-LIKE WARM GLOW IN FOLDS ═══',
    '  // In real satin, light scatters through thin areas at fold peaks',
    '  float sss = smoothstep(0.6, 1.0, hNorm) * (1.0 - NdotL1) * 0.12;',
    '  col += vec3(0.9, 0.5, 0.35) * sss;',
    '',
    '  // ═══ SUBTLE COLOR VARIATION ═══',
    '  // Break up uniformity with gentle color shifts',
    '  float colorVar = fbm(fabricUV * 0.8 + t * 0.03);',
    '  col += vec3(0.03, -0.01, 0.02) * (colorVar - 0.5);',
    '',
    '  // ═══ MICRO-SHIMMER ═══',
    '  // Fine sparkle that satin exhibits at certain angles',
    '  float micro = noise(fabricUV * 40.0 + t * 0.5);',
    '  float microShimmer = pow(micro, 12.0) * sheen * 0.4;',
    '  col += satinHighlight * microShimmer;',
    '',
    '  // ═══ VIGNETTE ═══',
    '  float vig = 1.0 - smoothstep(0.3, 1.4, length(uv * vec2(0.8, 1.0)));',
    '  col *= 0.4 + 0.6 * vig;',
    '',
    '  // Darken edges to reveal background',
    '  float edgeFade = smoothstep(1.2, 0.5, length(uv * vec2(0.9, 1.1)));',
    '  col *= edgeFade;',
    '',
    '  // ═══ TONE MAPPING & GAMMA ═══',
    '  // Soft highlight compression',
    '  col = col / (col + vec3(0.8));',
    '  col *= 1.3;',
    '',
    '  // Boost saturation — keep the pink alive',
    '  float lum = dot(col, vec3(0.299, 0.587, 0.114));',
    '  col = mix(vec3(lum), col, 1.3);',
    '  col = mix(col, col * vec3(1.05, 0.95, 0.90), smoothstep(0.3, 0.0, lum));',
    '',
    '  // Gamma correction',
    '  col = pow(max(col, 0.0), vec3(0.95));',
    '',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRippleSpeed = gl.getUniformLocation(prog, 'u_rippleSpeed');
  var uSheenIntensity = gl.getUniformLocation(prog, 'u_sheenIntensity');
  var rippleSpeedVal = 0.6;
  var sheenIntensityVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uRippleSpeed, rippleSpeedVal);
    gl.uniform1f(uSheenIntensity, sheenIntensityVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'RIPPLE_SPEED': rippleSpeedVal = e.data.value; break;
        case 'SHEEN_INTENSITY': sheenIntensityVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
