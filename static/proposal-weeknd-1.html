<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Horizon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Event Horizon</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Event Horizon — Black hole with accretion disk
// Schwarzschild raytracing, Doppler shift, photon ring
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform float u_rotationSpeed;
uniform float u_diskIntensity;
uniform float u_starsOnly;
uniform float u_tilt;
uniform float u_rotate;
uniform vec2 u_bhCenter;  // black hole center (0.5,0.5 = default center)
uniform float u_bhScale;  // zoom out factor (1.0 = default, >1 = smaller black hole)

#define AA 1
#define _Speed 3.0
#define _Steps 12.
#define _Size 0.3

float hash(float x) { return fract(sin(x) * 152754.742); }
float hash(vec2 x) { return hash(x.x + hash(x.y)); }

float value(vec2 p, float f)
{
    float bl = hash(floor(p * f + vec2(0., 0.)));
    float br = hash(floor(p * f + vec2(1., 0.)));
    float tl = hash(floor(p * f + vec2(0., 1.)));
    float tr = hash(floor(p * f + vec2(1., 1.)));
    vec2 fr = fract(p * f);
    fr = (3. - 2. * fr) * fr * fr;
    float b = mix(bl, br, fr.x);
    float t = mix(tl, tr, fr.x);
    return mix(b, t, fr.y);
}

vec4 background(vec3 ray)
{
    vec2 uv = ray.xy;
    if (abs(ray.x) > 0.5)
        uv.x = ray.z;
    else if (abs(ray.y) > 0.5)
        uv.y = ray.z;
    float brightness = value(uv * 3., 100.);
    float color = value(uv * 2., 20.);
    brightness = pow(brightness, 256.);
    brightness = brightness * 100.;
    brightness = clamp(brightness, 0., 1.);
    vec3 stars = brightness * mix(vec3(1., .6, .2), vec3(.2, .6, 1), color);

    // Procedural nebula (replaces iChannel0 texture)
    vec4 nebulae = vec4(0.);
    float n1 = value(uv * 1.5, 8.0);
    float n2 = value(uv * 1.5 + vec2(5.2, 1.3), 12.0);
    float n3 = value(uv * 1.5 + vec2(8.3, 2.8), 6.0);
    nebulae = vec4(n1 * 0.6, n2 * 0.4, n3 * 0.3, 1.0) * 0.15;

    nebulae.xyz += nebulae.xxx + nebulae.yyy + nebulae.zzz;
    nebulae.xyz *= 0.25;
    nebulae *= nebulae;
    nebulae *= nebulae;
    nebulae *= nebulae;
    nebulae *= nebulae;
    nebulae.xyz += stars;
    return nebulae;
}

vec4 raymarchDisk(vec3 ray, vec3 zeroPos)
{
    vec3 position = zeroPos;
    float lengthPos = length(position.xz);
    float dist = min(1., lengthPos * (1. / _Size) * 0.5) * _Size * 0.4 * (1. / _Steps) / (abs(ray.y));
    position += dist * _Steps * ray * 0.5;
    vec2 deltaPos;
    deltaPos.x = -zeroPos.z * 0.01 + zeroPos.x;
    deltaPos.y = zeroPos.x * 0.01 + zeroPos.z;
    deltaPos = normalize(deltaPos - zeroPos.xz);
    float parallel = dot(ray.xz, deltaPos);
    parallel /= sqrt(lengthPos);
    parallel *= 0.5;
    float redShift = parallel + 0.3;
    redShift *= redShift;
    redShift = clamp(redShift, 0., 1.);
    float disMix = clamp((lengthPos - _Size * 2.) * (1. / _Size) * 0.24, 0., 1.);
    vec3 insideCol = mix(vec3(1.0, 0.8, 0.0), vec3(0.5, 0.13, 0.02) * 0.2, disMix);
    insideCol *= mix(vec3(0.4, 0.2, 0.1), vec3(1.6, 2.4, 4.0), redShift);
    insideCol *= 1.25;
    redShift += 0.12;
    redShift *= redShift;
    vec4 o = vec4(0.);
    for (float i = 0.; i < _Steps; i++)
    {
        position -= dist * ray;
        float intensity = clamp(1. - abs((i - 0.8) * (1. / _Steps) * 2.), 0., 1.);
        float lengthPos = length(position.xz);
        float distMult = 1.;
        distMult *= clamp((lengthPos - _Size * 0.75) * (1. / _Size) * 1.5, 0., 1.);
        distMult *= clamp((_Size * 10. - lengthPos) * (1. / _Size) * 0.20, 0., 1.);
        distMult *= distMult;
        float u = lengthPos + u_time * _Size * 0.3 + intensity * _Size * 0.2;
        vec2 xy;
        float rot = mod(u_time * _Speed * u_rotationSpeed, 8192.);
        xy.x = -position.z * sin(rot) + position.x * cos(rot);
        xy.y = position.x * sin(rot) + position.z * cos(rot);
        float x = abs(xy.x / (xy.y));
        float angle = 0.02 * atan(x);
        const float f = 70.;
        float noise = value(vec2(angle, u * (1. / _Size) * 0.05), f);
        noise = noise * 0.66 + 0.33 * value(vec2(angle, u * (1. / _Size) * 0.05), f * 2.);
        float extraWidth = noise * 1. * (1. - clamp(i * (1. / _Steps) * 2. - 1., 0., 1.));
        float alpha = clamp(noise * (intensity + extraWidth) * ((1. / _Size) * 10. + 0.01) * dist * distMult, 0., 1.);
        vec3 col = 2. * mix(vec3(0.3, 0.2, 0.15) * insideCol, insideCol, min(1., intensity * 2.));
        col *= u_diskIntensity;
        o = clamp(vec4(col * alpha + o.rgb * (1. - alpha), o.a * (1. - alpha) + alpha), vec4(0.), vec4(1.));
        lengthPos *= (1. / _Size);
        o.rgb += redShift * (intensity * 1. + 0.5) * (1. / _Steps) * 100. * distMult / (lengthPos * lengthPos);
    }
    o.rgb = clamp(o.rgb - 0.005, 0., 1.);
    return o;
}

void Rotate(inout vec3 vector, vec2 angle)
{
    vector.yz = cos(angle.y) * vector.yz
                + sin(angle.y) * vec2(-1, 1) * vector.zy;
    vector.xz = cos(angle.x) * vector.xz
                + sin(angle.x) * vec2(-1, 1) * vector.zx;
}

void main()
{
    vec2 fragCoord = gl_FragCoord.xy;
    vec4 colOut = vec4(0.);
    vec2 fragCoordRot;
    fragCoordRot.x = fragCoord.x * 0.985 + fragCoord.y * 0.174;
    fragCoordRot.y = fragCoord.y * 0.985 - fragCoord.x * 0.174;
    fragCoordRot += vec2(-0.06, 0.12) * u_res.xy;

    // Fixed mouse — (0,0) places camera at z=-5, looking at the black hole
    // Same as Shadertoy default with no mouse interaction
    vec2 mouse = vec2(0.0, 0.0);

    for (int j = 0; j < AA; j++)
    for (int i = 0; i < AA; i++)
    {
        // u_bhCenter offsets the black hole; u_bhScale zooms out (>1 = smaller)
        vec2 center = (u_bhScale > 0.0 ? u_bhCenter : vec2(0.5)) * u_res.xy;
        float scale = u_bhScale > 0.0 ? u_bhScale : 1.0;
        vec3 ray = normalize(vec3(((fragCoordRot - center + vec2(i, j) / (float(AA))) * scale) / u_res.x, 1));

        // Stars-only mode: skip black hole, just render star field
        if (u_starsOnly > 0.5) {
            vec4 bg = background(ray);
            bg.rgb = pow(bg.rgb, vec3(0.6));
            colOut += bg / float(AA * AA);
            continue;
        }

        vec3 pos = vec3(0., 0.05, -(20. * mouse.xy / u_res.y - 10.) * (20. * mouse.xy / u_res.y - 10.) * .05);
        vec2 angle = vec2(u_time * 0.1 * u_rotationSpeed, .2);
        angle.y = (2. * mouse.y / u_res.y) * 3.14 + 0.1 + 3.14 + u_tilt;
        float dist = length(pos);
        Rotate(pos, angle);
        angle.xy -= min(.3 / dist, 3.14) * vec2(1, 0.5);
        Rotate(ray, angle);
        // Roll rotation (Z-axis) — rotate black hole system, not star field
        float cr = cos(u_rotate); float sr = sin(u_rotate);
        ray.xy = vec2(ray.x * cr - ray.y * sr, ray.x * sr + ray.y * cr);
        pos.xy = vec2(pos.x * cr - pos.y * sr, pos.x * sr + pos.y * cr);
        vec4 col = vec4(0.);
        vec4 glow = vec4(0.);
        vec4 outCol = vec4(100.);
        for (int disks = 0; disks < 20; disks++)
        {
            for (int h = 0; h < 6; h++)
            {
                float dotpos = dot(pos, pos);
                float invDist = inversesqrt(dotpos);
                float centDist = dotpos * invDist;
                float stepDist = 0.92 * abs(pos.y / (ray.y));
                float farLimit = centDist * 0.5;
                float closeLimit = centDist * 0.1 + 0.05 * centDist * centDist * (1. / _Size);
                stepDist = min(stepDist, min(farLimit, closeLimit));
                float invDistSqr = invDist * invDist;
                float bendForce = stepDist * invDistSqr * _Size * 0.625;
                ray = normalize(ray - (bendForce * invDist) * pos);
                pos += stepDist * ray;
                glow += vec4(1.2, 1.1, 1, 1.0) * (0.01 * stepDist * invDistSqr * invDistSqr * clamp(centDist * (2.) - 1.2, 0., 1.));
            }
            float dist2 = length(pos);
            if (dist2 < _Size * 0.1)
            {
                outCol = vec4(col.rgb * col.a + glow.rgb * (1. - col.a), 1.);
                break;
            }
            else if (dist2 > _Size * 1000.)
            {
                // Un-roll ray for star field lookup so stars stay fixed
                vec3 bgRay = ray;
                bgRay.xy = vec2(ray.x * cr + ray.y * sr, -ray.x * sr + ray.y * cr);
                vec4 bg = background(bgRay);
                outCol = vec4(col.rgb * col.a + bg.rgb * (1. - col.a) + glow.rgb * (1. - col.a), 1.);
                break;
            }
            else if (abs(pos.y) <= _Size * 0.002)
            {
                vec4 diskCol = raymarchDisk(ray, pos);
                pos.y = 0.;
                pos += abs(_Size * 0.001 / ray.y) * ray;
                col = vec4(diskCol.rgb * (1. - col.a) + col.rgb, col.a + diskCol.a * (1. - col.a));
            }
        }
        if (outCol.r == 100.)
            outCol = vec4(col.rgb + glow.rgb * (col.a + glow.a), 1.);
        col = outCol;
        col.rgb = pow(col.rgb, vec3(0.6));
        colOut += col / float(AA * AA);
    }
    gl_FragColor = colOut;
}
`;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRotationSpeed = gl.getUniformLocation(prog, 'u_rotationSpeed');
  var uDiskIntensity = gl.getUniformLocation(prog, 'u_diskIntensity');
  var uStarsOnly = gl.getUniformLocation(prog, 'u_starsOnly');
  var uTilt = gl.getUniformLocation(prog, 'u_tilt');
  var uRotate = gl.getUniformLocation(prog, 'u_rotate');
  var uBhCenter = gl.getUniformLocation(prog, 'u_bhCenter');
  var uBhScale = gl.getUniformLocation(prog, 'u_bhScale');

  var rotationSpeedVal = 0.3;
  var diskIntensityVal = 1.0;
  var starsOnlyVal = 0.0;
  var tiltVal = 0.0;
  var rotateVal = 0.0;
  var bhCenterX = 0.0;
  var bhCenterY = 0.0;
  var bhScaleVal = 0.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    var t = prefersReduced ? 0.0 : now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uRotationSpeed, rotationSpeedVal);
    gl.uniform1f(uDiskIntensity, diskIntensityVal);
    gl.uniform1f(uStarsOnly, starsOnlyVal);
    gl.uniform1f(uTilt, tiltVal);
    gl.uniform1f(uRotate, rotateVal);
    gl.uniform2f(uBhCenter, bhCenterX, bhCenterY);
    gl.uniform1f(uBhScale, bhScaleVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'ROTATION_SPEED': rotationSpeedVal = e.data.value; break;
        case 'DISK_INTENSITY': diskIntensityVal = e.data.value; break;
        case 'STARS_ONLY': starsOnlyVal = e.data.value; break;
        case 'TILT': tiltVal = e.data.value; break;
        case 'ROTATE': rotateVal = e.data.value; break;
        case 'BH_CENTER_X': bhCenterX = e.data.value; break;
        case 'BH_CENTER_Y': bhCenterY = e.data.value; break;
        case 'BH_SCALE': bhScaleVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
