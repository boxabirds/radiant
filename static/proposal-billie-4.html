<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spore Cloud</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Spore Cloud</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Spore Cloud — Bioluminescent spores drifting in convection currents
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var driftSpeedVal = 0.5;
  var sporeBrightnessVal = 1.0;
  var running = true;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_driftSpeed;',
    'uniform float u_sporeBrightness;',
    '',
    '#define PI 3.14159265359',
    '#define NUM_SPORES 100',
    '#define NUM_LAYERS 3',
    '',
    '// ── Hash functions ──',
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float hash1(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    'vec3 hash3(float n) {',
    '  return vec3(',
    '    fract(sin(n * 127.1) * 43758.5453),',
    '    fract(sin(n * 269.5) * 18347.1938),',
    '    fract(sin(n * 419.2) * 63765.3421)',
    '  );',
    '}',
    '',
    '// ── Value noise ──',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);',
    '}',
    '',
    '// ── 3D value noise ──',
    'float noise3(vec3 p) {',
    '  vec3 i = floor(p);',
    '  vec3 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float n = i.x + i.y * 157.0 + i.z * 113.0;',
    '  float a = hash1(n);',
    '  float b = hash1(n + 1.0);',
    '  float c = hash1(n + 157.0);',
    '  float d = hash1(n + 158.0);',
    '  float e = hash1(n + 113.0);',
    '  float ff = hash1(n + 114.0);',
    '  float g = hash1(n + 270.0);',
    '  float h = hash1(n + 271.0);',
    '  float x1 = mix(a, b, f.x);',
    '  float x2 = mix(c, d, f.x);',
    '  float x3 = mix(e, ff, f.x);',
    '  float x4 = mix(g, h, f.x);',
    '  float y1 = mix(x1, x2, f.y);',
    '  float y2 = mix(x3, x4, f.y);',
    '  return mix(y1, y2, f.z);',
    '}',
    '',
    '// ── FBM for atmospheric haze ──',
    'float fbm(vec2 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * noise(p);',
    '    p *= 2.03;',
    '    a *= 0.49;',
    '    p += vec2(1.7, 9.2);',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── 3D FBM for convection flow field ──',
    'float fbm3(vec3 p) {',
    '  float v = 0.0;',
    '  float a = 0.5;',
    '  for (int i = 0; i < 4; i++) {',
    '    v += a * noise3(p);',
    '    p *= 2.01;',
    '    a *= 0.5;',
    '    p += vec3(1.7, 9.2, 3.4);',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Convection velocity field ──',
    '// Returns a 3D displacement based on noise-driven convection cells',
    'vec3 convectionFlow(vec3 pos, float t) {',
    '  float speed = t * u_driftSpeed;',
    '  vec3 flowPos = pos * 1.2;',
    '  float dx = fbm3(flowPos + vec3(0.0, 0.0, speed * 0.3)) - 0.5;',
    '  float dy = fbm3(flowPos + vec3(5.2, 1.3, speed * 0.25)) - 0.5;',
    '  float dz = fbm3(flowPos + vec3(9.7, 4.1, speed * 0.2)) - 0.5;',
    '  // Upward bias for convection (warm air rises)',
    '  dy += 0.15;',
    '  return vec3(dx, dy, dz) * 0.6;',
    '}',
    '',
    '// ── Spore rendering ──',
    '// Each spore: soft gaussian glow with depth-of-field',
    'void main() {',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  vec2 uv = fragCoord / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '  vec2 uvCentered = (uv - 0.5) * vec2(aspect, 1.0);',
    '  float t = u_time;',
    '',
    '  // ── Near-black warm background ──',
    '  vec3 col = vec3(0.01, 0.008, 0.005);',
    '',
    '  // ── Atmospheric haze: very subtle warm fog layers ──',
    '  float haze1 = fbm(uvCentered * 2.0 + vec2(t * 0.02, t * 0.015));',
    '  float haze2 = fbm(uvCentered * 3.0 + vec2(-t * 0.018, t * 0.025) + 10.0);',
    '  float hazeVal = haze1 * haze2;',
    '  hazeVal = pow(hazeVal, 1.5) * 2.0;',
    '  col += vec3(0.025, 0.015, 0.008) * hazeVal * 0.3;',
    '',
    '  // ── Subtle warm volumetric light from below ──',
    '  float bottomLight = exp(-4.0 * pow(uv.y - 0.1, 2.0));',
    '  float bottomSpread = exp(-2.0 * pow(uv.x - 0.5, 2.0));',
    '  col += vec3(0.015, 0.008, 0.003) * bottomLight * bottomSpread;',
    '',
    '  // ── Spore particles ──',
    '  // Focal depth: particles near z=0.5 are sharp, others are blurred',
    '  float focalDepth = 0.5;',
    '',
    '  // Accumulate spore light',
    '  vec3 sporeLight = vec3(0.0);',
    '',
    '  for (int i = 0; i < NUM_SPORES; i++) {',
    '    float fi = float(i);',
    '',
    '    // ── Base position from hash (deterministic per-spore) ──',
    '    vec3 basePos = hash3(fi * 7.31 + 1.0);',
    '    // Spread across volume: x,y in [-1,1], z in [0,1]',
    '    basePos = basePos * vec3(2.0, 2.0, 1.0) - vec3(1.0, 1.0, 0.0);',
    '',
    '    // ── Convection displacement ──',
    '    float speed = t * u_driftSpeed;',
    '    vec3 flow = convectionFlow(basePos * 1.5 + fi * 0.1, t);',
    '',
    '    // Time-varying position: base + convection + slow periodic drift',
    '    vec3 sporePos;',
    '    sporePos.x = basePos.x + flow.x * sin(speed * 0.15 + fi * 2.1) * 0.8',
    '                 + sin(speed * 0.08 + fi * 3.7) * 0.12;',
    '    sporePos.y = basePos.y + flow.y * sin(speed * 0.12 + fi * 1.7) * 0.6',
    '                 + cos(speed * 0.06 + fi * 2.3) * 0.1;',
    '    sporePos.z = basePos.z + flow.z * sin(speed * 0.1 + fi * 0.9) * 0.3;',
    '',
    '    // Wrap positions to keep them in view',
    '    sporePos.x = mod(sporePos.x + 1.5, 3.0) - 1.5;',
    '    sporePos.y = mod(sporePos.y + 1.2, 2.4) - 1.2;',
    '    sporePos.z = fract(sporePos.z);',
    '',
    '    // ── Perspective projection ──',
    '    float depth = 0.3 + sporePos.z * 0.7;',
    '    float invDepth = 1.0 / (0.5 + depth);',
    '    vec2 screenPos = sporePos.xy * invDepth * 0.5;',
    '',
    '    // ── Distance from pixel to projected spore ──',
    '    vec2 diff = uvCentered - screenPos;',
    '    float dist = length(diff);',
    '',
    '    // ── Depth-of-field ──',
    '    float depthDiff = abs(sporePos.z - focalDepth);',
    '    float cocRadius = 0.002 + depthDiff * 0.025;  // circle of confusion',
    '    float sharpness = 1.0 / (1.0 + depthDiff * 8.0);',
    '',
    '    // Core size scales with CoC (blurred particles appear larger)',
    '    float coreSize = 0.001 + cocRadius * 0.5;',
    '    float glowSize = cocRadius * 2.5 + 0.005;',
    '',
    '    // ── Gaussian glow ──',
    '    float core = exp(-dist * dist / (coreSize * coreSize));',
    '    float glow = exp(-dist * dist / (glowSize * glowSize));',
    '',
    '    // Distant particles are dimmer',
    '    float depthDim = invDepth * 0.7;',
    '',
    '    // ── Brightness flare ──',
    '    // Some particles occasionally catch invisible light and flare',
    '    float flarePhase = sin(t * (0.3 + hash1(fi * 11.3) * 0.5) + fi * 17.0);',
    '    float flare = smoothstep(0.85, 1.0, flarePhase);',
    '    float baseBrightness = 0.15 + hash1(fi * 5.7) * 0.25;',
    '    float brightness = baseBrightness + flare * 1.5;',
    '',
    '    // ── Slow pulsation ──',
    '    float pulse = 0.7 + 0.3 * sin(t * (0.2 + hash1(fi * 3.1) * 0.3) + fi * 7.0);',
    '    brightness *= pulse;',
    '',
    '    // ── Spore color: warm amber with variation ──',
    '    float colorVar = hash1(fi * 9.3);',
    '    vec3 sporeColor;',
    '    // Variation from copper to gold to amber',
    '    if (colorVar < 0.33) {',
    '      // Copper',
    '      sporeColor = vec3(0.78, 0.45, 0.28);',
    '    } else if (colorVar < 0.66) {',
    '      // Gold-amber',
    '      sporeColor = vec3(0.82, 0.62, 0.38);',
    '    } else {',
    '      // Warm amber',
    '      sporeColor = vec3(0.78, 0.58, 0.42);',
    '    }',
    '',
    '    // Flaring particles shift toward hot white-amber',
    '    vec3 flareColor = vec3(1.0, 0.88, 0.7);',
    '    sporeColor = mix(sporeColor, flareColor, flare * 0.7);',
    '',
    '    // ── Combine core (sharp, bright) and glow (soft, dim) ──',
    '    float intensity = core * sharpness * 2.5 + glow * (1.0 - sharpness * 0.6) * 0.6;',
    '    intensity *= brightness * depthDim * u_sporeBrightness;',
    '',
    '    sporeLight += sporeColor * intensity;',
    '  }',
    '',
    '  col += sporeLight;',
    '',
    '  // ── Second layer: very faint distant spores for added depth ──',
    '  // Tiny dim background particles to fill the void',
    '  for (int i = 0; i < 50; i++) {',
    '    float fi = float(i) + 200.0;',
    '    vec3 bpos = hash3(fi * 13.7);',
    '    bpos = bpos * vec3(3.0, 2.4, 1.0) - vec3(1.5, 1.2, 0.0);',
    '',
    '    float speed = t * u_driftSpeed * 0.3;',
    '    bpos.x += sin(speed * 0.1 + fi * 0.7) * 0.3;',
    '    bpos.y += cos(speed * 0.08 + fi * 1.1) * 0.2;',
    '    bpos.x = mod(bpos.x + 1.5, 3.0) - 1.5;',
    '    bpos.y = mod(bpos.y + 1.2, 2.4) - 1.2;',
    '',
    '    float bDepth = 0.8 + bpos.z * 0.2;',
    '    vec2 bScreen = bpos.xy / (0.5 + bDepth) * 0.5;',
    '    float bDist = length(uvCentered - bScreen);',
    '    float bGlow = exp(-bDist * bDist / 0.0008);',
    '    float bPulse = 0.5 + 0.5 * sin(t * 0.15 + fi * 3.0);',
    '    col += vec3(0.6, 0.4, 0.25) * bGlow * 0.04 * bPulse * u_sporeBrightness;',
    '  }',
    '',
    '  // ── Warm atmospheric depth fog ──',
    '  // Subtle haze that adds to the sense of volume',
    '  float fogNoise = fbm(uvCentered * 1.5 + vec2(t * 0.01, -t * 0.008));',
    '  float fog = fogNoise * 0.03;',
    '  col += vec3(0.04, 0.025, 0.015) * fog;',
    '',
    '  // ── Vignette ──',
    '  vec2 vigUV = uv - 0.5;',
    '  float vig = 1.0 - dot(vigUV, vigUV) * 2.2;',
    '  vig = clamp(vig, 0.0, 1.0);',
    '  col *= 0.4 + vig * 0.6;',
    '',
    '  // ── Subtle tone mapping ──',
    '  col = col / (1.0 + col * 0.5);  // Soft reinhard',
    '  col = pow(col, vec3(0.97));',
    '  col = max(col, vec3(0.0));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uDriftSpeed = gl.getUniformLocation(prog, 'u_driftSpeed');
  var uSporeBrightness = gl.getUniformLocation(prog, 'u_sporeBrightness');

  var dpr = Math.min(window.devicePixelRatio || 1, 2) * pixelScale;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uDriftSpeed, driftSpeedVal);
    gl.uniform1f(uSporeBrightness, sporeBrightnessVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'DRIFT_SPEED': driftSpeedVal = e.data.value; break;
        case 'SPORE_BRIGHTNESS': sporeBrightnessVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
