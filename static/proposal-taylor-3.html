<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Swirl</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Marble Swirl</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Marble Swirl — Suminagashi paper marbling
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var urlParams = new URLSearchParams(window.location.search);
  var pixelScale = parseFloat(urlParams.get('p')) || 1;

  var gl = canvas.getContext('webgl', { alpha: true, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  // Tunable parameters
  var SWIRL_SPEED = 0.3;
  var RING_DENSITY = 1.0;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_swirlSpeed;',
    'uniform float u_ringDensity;',
    '',
    '#define PI 3.14159265359',
    '#define INK_DROPS 7',
    '',
    '// ── Hash functions (no variable array indexing) ──',
    'float hash(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * 0.1031);',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.x + p3.y) * p3.z);',
    '}',
    '',
    'vec2 hash2(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy);',
    '}',
    '',
    '// ── Gradient noise ──',
    'vec2 hashGrad(vec2 p) {',
    '  vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));',
    '  p3 += dot(p3, p3.yzx + 33.33);',
    '  return fract((p3.xx + p3.yz) * p3.zy) * 2.0 - 1.0;',
    '}',
    '',
    'float gnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);',
    '  vec2 ga = hashGrad(i + vec2(0.0, 0.0));',
    '  vec2 gb = hashGrad(i + vec2(1.0, 0.0));',
    '  vec2 gc = hashGrad(i + vec2(0.0, 1.0));',
    '  vec2 gd = hashGrad(i + vec2(1.0, 1.0));',
    '  float va = dot(ga, f - vec2(0.0, 0.0));',
    '  float vb = dot(gb, f - vec2(1.0, 0.0));',
    '  float vc = dot(gc, f - vec2(0.0, 1.0));',
    '  float vd = dot(gd, f - vec2(1.0, 1.0));',
    '  return va + u.x * (vb - va) + u.y * (vc - va) + u.x * u.y * (va - vb - vc + vd);',
    '}',
    '',
    '// ── FBM with rotation between octaves ──',
    'float fbm(vec2 p, float t) {',
    '  float v = 0.0, a = 0.5;',
    '  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);',
    '  for (int i = 0; i < 5; i++) {',
    '    v += a * gnoise(p + t * 0.03);',
    '    p = rot * p * 2.05 + vec2(1.7, 9.2);',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    '// ── Multi-scale domain warp for combing effect ──',
    '// Simulates the comb dragging through ink on water',
    'vec2 combWarp(vec2 p, float t, float speed) {',
    '  // Large-scale combing — slow sweeping strokes',
    '  vec2 warp1 = vec2(',
    '    fbm(p * 1.2 + vec2(0.0, 0.0), t * speed * 0.4),',
    '    fbm(p * 1.2 + vec2(5.2, 1.3), t * speed * 0.35)',
    '  );',
    '',
    '  // Medium-scale turbulence — the drag from individual tines',
    '  vec2 warp2 = vec2(',
    '    fbm(p * 2.5 + warp1 * 1.5 + vec2(8.3, 2.8), t * speed * 0.5),',
    '    fbm(p * 2.5 + warp1 * 1.5 + vec2(1.7, 6.4), t * speed * 0.45)',
    '  );',
    '',
    '  // Fine-scale — micro-disturbances on the water surface',
    '  vec2 warp3 = vec2(',
    '    gnoise(p * 6.0 + warp2 * 0.8 + t * speed * 0.2),',
    '    gnoise(p * 6.0 + warp2 * 0.8 + vec2(3.7, 8.1) + t * speed * 0.18)',
    '  );',
    '',
    '  // Combine warps at different weights',
    '  return warp1 * 0.55 + warp2 * 0.35 + warp3 * 0.08;',
    '}',
    '',
    '// ── Ink drop center positions (unrolled, no arrays) ──',
    '// Returns distance to the ink drop center for a given index',
    'vec2 inkCenter(int idx) {',
    '  // Manually unrolled positions to avoid variable array indexing',
    '  if (idx == 0) return vec2(-0.25, 0.15);',
    '  if (idx == 1) return vec2(0.30, -0.20);',
    '  if (idx == 2) return vec2(-0.10, -0.35);',
    '  if (idx == 3) return vec2(0.40, 0.30);',
    '  if (idx == 4) return vec2(-0.45, -0.10);',
    '  if (idx == 5) return vec2(0.05, 0.40);',
    '  return vec2(-0.30, -0.40);',
    '}',
    '',
    '// ── Concentric ring pattern from a single ink drop ──',
    'float inkRings(vec2 p, vec2 center, float density, float phase) {',
    '  float d = length(p - center);',
    '  // Multiple frequency rings create interference patterns',
    '  float rings = sin(d * 28.0 * density + phase) * 0.5 + 0.5;',
    '  float rings2 = sin(d * 42.0 * density + phase * 1.3 + 0.7) * 0.5 + 0.5;',
    '  float rings3 = sin(d * 18.0 * density + phase * 0.7 + 2.1) * 0.5 + 0.5;',
    '',
    '  // Combine ring frequencies',
    '  float combined = rings * 0.5 + rings2 * 0.3 + rings3 * 0.2;',
    '',
    '  // Sharpen the bands — crisp ink edges, not blurry',
    '  combined = smoothstep(0.35, 0.50, combined) * 0.7 + combined * 0.3;',
    '',
    '  // Attenuate with distance (ink thins out far from drop)',
    '  float falloff = 1.0 / (1.0 + d * d * 2.5);',
    '',
    '  return combined * falloff;',
    '}',
    '',
    '// ── Paper texture ──',
    'float paperTexture(vec2 p) {',
    '  float n1 = gnoise(p * 25.0) * 0.5;',
    '  float n2 = gnoise(p * 50.0) * 0.25;',
    '  float n3 = gnoise(p * 100.0) * 0.125;',
    '  return 0.5 + (n1 + n2 + n3) * 0.8;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);',
    '  float t = u_time;',
    '  float speed = u_swirlSpeed;',
    '  float density = u_ringDensity;',
    '',
    '  // ── Compute combing distortion ──',
    '  vec2 warp = combWarp(uv, t, speed);',
    '',
    '  // Apply the warp — this is the combed coordinate',
    '  vec2 warped = uv + warp * 0.45;',
    '',
    '  // ── Accumulate ink from all drops ──',
    '  float inkAmount = 0.0;',
    '  float bandPattern = 0.0;',
    '',
    '  // Unrolled loop for ink drops (no variable array indexing)',
    '  // Drop 0',
    '  {',
    '    vec2 c = inkCenter(0);',
    '    float phase = t * speed * 0.15 + 0.0;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.8;',
    '  }',
    '  // Drop 1',
    '  {',
    '    vec2 c = inkCenter(1);',
    '    float phase = t * speed * 0.12 + 2.1;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.9;',
    '  }',
    '  // Drop 2',
    '  {',
    '    vec2 c = inkCenter(2);',
    '    float phase = t * speed * 0.18 + 4.2;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.7;',
    '  }',
    '  // Drop 3',
    '  {',
    '    vec2 c = inkCenter(3);',
    '    float phase = t * speed * 0.14 + 6.3;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.85;',
    '  }',
    '  // Drop 4',
    '  {',
    '    vec2 c = inkCenter(4);',
    '    float phase = t * speed * 0.16 + 1.5;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.75;',
    '  }',
    '  // Drop 5',
    '  {',
    '    vec2 c = inkCenter(5);',
    '    float phase = t * speed * 0.11 + 3.7;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.65;',
    '  }',
    '  // Drop 6',
    '  {',
    '    vec2 c = inkCenter(6);',
    '    float phase = t * speed * 0.13 + 5.9;',
    '    float rings = inkRings(warped, c, density, phase);',
    '    inkAmount += rings;',
    '    bandPattern += rings * 0.7;',
    '  }',
    '',
    '  // Normalize accumulated ink',
    '  inkAmount = clamp(inkAmount * 0.35, 0.0, 1.0);',
    '  bandPattern = clamp(bandPattern * 0.35, 0.0, 1.0);',
    '',
    '  // ── Create crisp band edges via sharpening ──',
    '  // Step the band pattern to get distinct ink/paper regions',
    '  float crispBands = smoothstep(0.20, 0.28, bandPattern);',
    '  float midBands = smoothstep(0.38, 0.55, bandPattern);',
    '  float brightBands = smoothstep(0.60, 0.72, bandPattern);',
    '',
    '  // ── Color palette: warm amber tones ──',
    '  // Paper background: warm cream-amber',
    '  vec3 paperColor = vec3(0.12, 0.09, 0.06);',
    '',
    '  // Subtle paper texture',
    '  float paper = paperTexture(uv);',
    '  paperColor *= 0.85 + paper * 0.3;',
    '',
    '  // Ink colors: dark to light amber',
    '  vec3 darkInk = vec3(0.03, 0.02, 0.01);',
    '  vec3 midInk = vec3(0.50, 0.35, 0.20);',
    '  vec3 brightInk = vec3(0.85, 0.65, 0.40);',
    '',
    '  // ── Composite the marble pattern ──',
    '  vec3 col = paperColor;',
    '',
    '  // Dark ink bands',
    '  col = mix(col, darkInk, crispBands * 0.85);',
    '',
    '  // Medium amber bands',
    '  col = mix(col, midInk, midBands * 0.6);',
    '',
    '  // Bright amber/gold highlights',
    '  col = mix(col, brightInk, brightBands * 0.45);',
    '',
    '  // ── Band edge glow ──',
    '  // Slight brightness at the transition between bands',
    '  float edgeGlow = abs(bandPattern - 0.30);',
    '  edgeGlow = 1.0 - smoothstep(0.0, 0.06, edgeGlow);',
    '  float edgeGlow2 = abs(bandPattern - 0.55);',
    '  edgeGlow2 = 1.0 - smoothstep(0.0, 0.05, edgeGlow2);',
    '  float totalEdge = max(edgeGlow, edgeGlow2);',
    '  col += vec3(0.15, 0.10, 0.05) * totalEdge * 0.4;',
    '',
    '  // ── Secondary warp creates veining between ink bands ──',
    '  float vein = fbm(warped * 4.0 + vec2(3.3, 7.1), t * speed * 0.3);',
    '  vein = smoothstep(-0.1, 0.2, vein) * (1.0 - crispBands) * 0.15;',
    '  col += vec3(0.08, 0.06, 0.03) * vein;',
    '',
    '  // ── Interference patterns where drops overlap ──',
    '  float interference = sin(inkAmount * 25.0 + warp.x * 10.0) * 0.5 + 0.5;',
    '  interference = smoothstep(0.4, 0.6, interference);',
    '  float interMask = smoothstep(0.4, 0.7, inkAmount);',
    '  col = mix(col, col * 1.15 + vec3(0.03, 0.02, 0.01), interference * interMask * 0.3);',
    '',
    '  // ── Film grain ──',
    '  float grain = (hash(gl_FragCoord.xy + fract(t * 43.0) * 1000.0) - 0.5) * 0.015;',
    '  col += grain;',
    '',
    '  // ── Subtle vignette ──',
    '  float vig = length(uv);',
    '  float vignette = 1.0 - smoothstep(0.5, 1.3, vig);',
    '  col *= 0.85 + 0.15 * vignette;',
    '',
    '  // ── Warm tone correction ──',
    '  col = max(col, vec3(0.0));',
    '  col = pow(col, vec3(0.95, 1.0, 1.05));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uSwirlSpeed = gl.getUniformLocation(prog, 'u_swirlSpeed');
  var uRingDensity = gl.getUniformLocation(prog, 'u_ringDensity');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    var scale = 1.0 / pixelScale;
    var w = Math.round(canvas.clientWidth * dpr * scale);
    var h = Math.round(canvas.clientHeight * dpr * scale);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  var running = true;

  function render(now) {
    if (!running) { requestAnimationFrame(render); return; }
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uSwirlSpeed, SWIRL_SPEED);
    gl.uniform1f(uRingDensity, RING_DENSITY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  // ── Pause when offscreen ──
  document.addEventListener('visibilitychange', function () {
    running = !document.hidden;
  });

  // ── PostMessage API for parameter control ──
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'SWIRL_SPEED': SWIRL_SPEED = e.data.value; break;
        case 'RING_DENSITY': RING_DENSITY = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
