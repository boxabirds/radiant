<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soap Film</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Soap Film</div>
<canvas id="canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_filmSpeed;',
    'uniform float u_iridescence;',
    '',
    '// --- Simplex noise (Ashima Arts) ---',
    'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec2 mod289v2(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
    '',
    'float snoise(vec2 v){',
    '  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
    '  vec2 i=floor(v+dot(v,C.yy));',
    '  vec2 x0=v-i+dot(i,C.xx);',
    '  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
    '  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;',
    '  i=mod289v2(i);',
    '  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
    '  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);',
    '  m=m*m; m=m*m;',
    '  vec3 x=2.0*fract(p*C.www)-1.0;',
    '  vec3 h=abs(x)-0.5;',
    '  vec3 ox=floor(x+0.5);',
    '  vec3 a0=x-ox;',
    '  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
    '  vec3 g;',
    '  g.x=a0.x*x0.x+h.x*x0.y;',
    '  g.yz=a0.yz*x12.xz+h.yz*x12.yw;',
    '  return 130.0*dot(m,g);',
    '}',
    '',
    '// Fractional Brownian motion with domain warping',
    'float fbm(vec2 p){',
    '  float f=0.0;',
    '  f+=0.5000*snoise(p); p*=2.02;',
    '  f+=0.2500*snoise(p); p*=2.03;',
    '  f+=0.1250*snoise(p); p*=2.01;',
    '  f+=0.0625*snoise(p);',
    '  return f;',
    '}',
    '',
    '// Domain-warped noise for organic film thickness',
    'float warpedNoise(vec2 p, float t){',
    '  vec2 q=vec2(fbm(p+vec2(0.0,0.0)+t*0.12),',
    '              fbm(p+vec2(5.2,1.3)+t*0.1));',
    '  vec2 r=vec2(fbm(p+4.0*q+vec2(1.7,9.2)+t*0.08),',
    '              fbm(p+4.0*q+vec2(8.3,2.8)+t*0.09));',
    '  return fbm(p+3.5*r);',
    '}',
    '',
    '// Thin-film interference color calculation',
    '// d = film thickness, theta = viewing angle (from normal)',
    'vec3 thinFilmColor(float d, float theta){',
    '  float n=1.33; // refractive index of soap film',
    '  float cosTheta=cos(theta);',
    '',
    '  // Optical path difference',
    '  float opd=2.0*n*d*cosTheta;',
    '',
    '  // Phase for each RGB wavelength (in nm)',
    '  // Red ~650nm, Green ~510nm, Blue ~475nm',
    '  float phaseR=6.283185*opd/650.0;',
    '  float phaseG=6.283185*opd/510.0;',
    '  float phaseB=6.283185*opd/475.0;',
    '',
    '  // Interference: intensity ~ cos^2(phase/2) = (1 + cos(phase)) / 2',
    '  float r=0.5+0.5*cos(phaseR);',
    '  float g=0.5+0.5*cos(phaseG);',
    '  float b=0.5+0.5*cos(phaseB);',
    '',
    '  return vec3(r,g,b);',
    '}',
    '',
    '// Smooth bubble shape — signed distance to a circle',
    'float bubbleSDF(vec2 p, vec2 center, float radius){',
    '  return length(p-center)-radius;',
    '}',
    '',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy)/u_res;',
    '  vec2 aspect=vec2(u_res.x/u_res.y, 1.0);',
    '  vec2 p=(uv-0.5)*aspect;',
    '  float t=u_time*u_filmSpeed;',
    '',
    '  // Start with zero thickness',
    '  float thickness=0.0;',
    '  float filmMask=0.0;',
    '',
    '  // --- Multiple overlapping bubble surfaces ---',
    '  // Bubble 0',
    '  vec2 bc0=vec2(sin(t*0.13)*0.15, cos(t*0.11)*0.1);',
    '  float br0=0.35+0.05*sin(t*0.17);',
    '  float bd0=bubbleSDF(p, bc0, br0);',
    '  float bm0=smoothstep(0.01, -0.01, bd0);',
    '  float edgeFade0=smoothstep(0.0, 0.12, br0+bd0);',
    '',
    '  // Bubble 1',
    '  vec2 bc1=vec2(-0.2+sin(t*0.09)*0.12, 0.15+cos(t*0.14)*0.08);',
    '  float br1=0.28+0.04*sin(t*0.21+1.0);',
    '  float bd1=bubbleSDF(p, bc1, br1);',
    '  float bm1=smoothstep(0.01, -0.01, bd1);',
    '  float edgeFade1=smoothstep(0.0, 0.1, br1+bd1);',
    '',
    '  // Bubble 2',
    '  vec2 bc2=vec2(0.22+cos(t*0.12)*0.1, -0.18+sin(t*0.08)*0.12);',
    '  float br2=0.32+0.04*cos(t*0.15+2.0);',
    '  float bd2=bubbleSDF(p, bc2, br2);',
    '  float bm2=smoothstep(0.01, -0.01, bd2);',
    '  float edgeFade2=smoothstep(0.0, 0.11, br2+bd2);',
    '',
    '  // Bubble 3',
    '  vec2 bc3=vec2(-0.1+sin(t*0.16+3.0)*0.08, -0.1+cos(t*0.1+1.5)*0.12);',
    '  float br3=0.25+0.03*sin(t*0.19+4.0);',
    '  float bd3=bubbleSDF(p, bc3, br3);',
    '  float bm3=smoothstep(0.01, -0.01, bd3);',
    '  float edgeFade3=smoothstep(0.0, 0.09, br3+bd3);',
    '',
    '  // Bubble 4 (large background)',
    '  vec2 bc4=vec2(cos(t*0.07)*0.05, sin(t*0.06)*0.05);',
    '  float br4=0.55+0.05*sin(t*0.1);',
    '  float bd4=bubbleSDF(p, bc4, br4);',
    '  float bm4=smoothstep(0.01, -0.01, bd4);',
    '  float edgeFade4=smoothstep(0.0, 0.18, br4+bd4);',
    '',
    '  // Combine film mask (union of all bubbles)',
    '  filmMask=max(max(max(bm0, bm1), max(bm2, bm3)), bm4);',
    '',
    '  // --- Film thickness variation ---',
    '  // Base warped noise gives large flowing patterns',
    '  float baseThickness=warpedNoise(p*2.5, t)*0.5+0.5;',
    '',
    '  // Per-bubble thickness: thinner at edges (gravity draining)',
    '  // Use radial gradient + noise for each bubble',
    '  float t0=(1.0-edgeFade0*0.6)*baseThickness+snoise(p*8.0+t*0.2)*0.15;',
    '  float t1=(1.0-edgeFade1*0.5)*baseThickness+snoise(p*7.0+vec2(3.0,0.0)+t*0.18)*0.15;',
    '  float t2=(1.0-edgeFade2*0.55)*baseThickness+snoise(p*9.0+vec2(0.0,5.0)+t*0.22)*0.15;',
    '  float t3=(1.0-edgeFade3*0.45)*baseThickness+snoise(p*6.0+vec2(7.0,2.0)+t*0.15)*0.15;',
    '  float t4=(1.0-edgeFade4*0.4)*baseThickness+snoise(p*5.0+vec2(2.0,8.0)+t*0.12)*0.12;',
    '',
    '  // Blend thicknesses weighted by bubble masks',
    '  float totalWeight=bm0+bm1+bm2+bm3+bm4+0.001;',
    '  thickness=(t0*bm0+t1*bm1+t2*bm2+t3*bm3+t4*bm4)/totalWeight;',
    '',
    '  // Scale thickness to physical range (~200-800nm for visible interference)',
    '  thickness=200.0+thickness*600.0;',
    '',
    '  // Add slow undulating swirls via additional noise',
    '  float swirl=snoise(p*3.0+vec2(t*0.15, t*0.12))*80.0;',
    '  thickness+=swirl;',
    '',
    '  // Gravity drainage: film thins at top, thickens at bottom',
    '  thickness+=p.y*120.0;',
    '',
    '  // --- Viewing angle (approximation based on position on bubble) ---',
    '  // For the dominant bubble, compute angle from center',
    '  float theta=0.0;',
    '  if(bm0>0.5){',
    '    theta=length(p-bc0)/br0*0.5;',
    '  } else if(bm1>0.5){',
    '    theta=length(p-bc1)/br1*0.5;',
    '  } else if(bm2>0.5){',
    '    theta=length(p-bc2)/br2*0.5;',
    '  } else if(bm3>0.5){',
    '    theta=length(p-bc3)/br3*0.5;',
    '  } else {',
    '    theta=length(p-bc4)/br4*0.4;',
    '  }',
    '',
    '  // --- Compute thin-film interference color ---',
    '  vec3 filmColor=thinFilmColor(thickness, theta);',
    '',
    '  // Boost iridescence intensity',
    '  filmColor=mix(vec3(0.5), filmColor, u_iridescence);',
    '',
    '  // Subtle pink/gold bias for Sabrina palette',
    '  filmColor+=vec3(0.06, 0.02, 0.04)*filmColor;',
    '  filmColor*=vec3(1.04, 0.98, 1.02);',
    '',
    '  // Edge brightening (Fresnel-like effect)',
    '  float fresnel=1.0-cos(theta);',
    '  fresnel=fresnel*fresnel;',
    '  filmColor+=vec3(0.15, 0.12, 0.18)*fresnel;',
    '',
    '  // Apply film mask (only show color where bubbles exist)',
    '  vec3 col=vec3(0.039, 0.039, 0.039); // #0a0a0a background',
    '  col=mix(col, filmColor, filmMask);',
    '',
    '  // --- Specular highlights on each bubble ---',
    '  // Highlight on bubble 0',
    '  float spec0=smoothstep(0.06, 0.0, length(p-bc0+vec2(br0*0.35, -br0*0.35)));',
    '  col+=vec3(1.0,0.95,0.9)*spec0*0.25*bm0;',
    '',
    '  // Highlight on bubble 1',
    '  float spec1=smoothstep(0.05, 0.0, length(p-bc1+vec2(br1*0.35, -br1*0.35)));',
    '  col+=vec3(1.0,0.95,0.9)*spec1*0.2*bm1;',
    '',
    '  // Highlight on bubble 2',
    '  float spec2=smoothstep(0.055, 0.0, length(p-bc2+vec2(br2*0.35, -br2*0.35)));',
    '  col+=vec3(1.0,0.95,0.9)*spec2*0.22*bm2;',
    '',
    '  // Highlight on bubble 4 (large)',
    '  float spec4=smoothstep(0.08, 0.0, length(p-bc4+vec2(br4*0.3, -br4*0.3)));',
    '  col+=vec3(1.0,0.97,0.92)*spec4*0.15*bm4;',
    '',
    '  // --- Bubble edge rims (bright outlines) ---',
    '  float rim0=smoothstep(0.015, 0.0, abs(bd0))*bm0;',
    '  float rim1=smoothstep(0.012, 0.0, abs(bd1))*bm1;',
    '  float rim2=smoothstep(0.013, 0.0, abs(bd2))*bm2;',
    '  float rim3=smoothstep(0.011, 0.0, abs(bd3))*bm3;',
    '  float rim4=smoothstep(0.018, 0.0, abs(bd4))*bm4;',
    '  float rims=rim0+rim1+rim2+rim3+rim4;',
    '  col+=vec3(0.35, 0.3, 0.4)*rims*0.4;',
    '',
    '  // --- Vignette ---',
    '  float vig=1.0-smoothstep(0.3, 1.1, length(p*vec2(0.9, 1.0)));',
    '  col*=0.6+0.4*vig;',
    '',
    '  // --- Film grain ---',
    '  float grain=(fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233))+fract(u_time*0.1)*100.0)*43758.5453)-0.5)*0.018;',
    '  col+=grain;',
    '',
    '  // Tone mapping: slight S-curve for richness',
    '  col=col*col*(3.0-2.0*col);',
    '',
    '  gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFilmSpeed = gl.getUniformLocation(prog, 'u_filmSpeed');
  var uIridescence = gl.getUniformLocation(prog, 'u_iridescence');
  var filmSpeedVal = 0.5;
  var iridescenceVal = 1.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var running = true;

  function resize() {
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
    }
  }

  function render(now) {
    if (!running) return;
    resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uFilmSpeed, filmSpeedVal);
    gl.uniform1f(uIridescence, iridescenceVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'FILM_SPEED': filmSpeedVal = e.data.value; break;
        case 'IRIDESCENCE': iridescenceVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>
